// ===== STATUS LIST (ステータス一覧) =====
function renderStatusList(){
  // 今日から翌月末 + 全提出週（過去分も含む）を表示
  let allWks=[];
  try{
    const today=new Date();
    // 翌月末
    const nextMonthEnd=new Date(today.getFullYear(),today.getMonth()+2,0);
    // 今週の月曜日から開始
    const start=new Date(today);
    const dow=start.getDay();
    start.setDate(start.getDate()-(dow===0?6:dow-1));
    start.setHours(0,0,0,0);
    const cur=new Date(start);
    const wkSet=new Set();
    // 今週〜翌月末
    while(cur<=nextMonthEnd){
      wkSet.add(getWeekKey(new Date(cur)));
      cur.setDate(cur.getDate()+7);
    }
    // 全提出週を追加（今週以降のみ）
    Object.keys(S.submissions).forEach(k=>{
      const m=k.match(/_(\d{4}-\d{2}-\d{2})$/);
      if(!m)return;
      const [y,mo,d]=m[1].split('-').map(Number);
      const wk=getWeekKey(new Date(y,mo-1,d,12,0,0));
      if(wk>=getWeekKey(today)) wkSet.add(wk);
    });
    allWks=[...wkSet].sort();
  }catch(e){allWks=[getCurrWk(),getNextWk()];}
  if(!allWks.length||!slWeekKey||!allWks.includes(slWeekKey)){try{slWeekKey=getCurrWk();}catch(e){slWeekKey='';}}

  const sMap=STATUS_LABEL;
  const bMap=STATUS_BADGE;

  // フィルター定義
  const filters=[
    {key:'all',     label:'すべて',       badge:''},
    {key:'waiting', label:'入力待ち',     badge:'badge-warning'},
    {key:'inputting',label:'内勤入力中',  badge:'badge-info'},
    {key:'confirmed',label:'確定',        badge:'badge-success'},
    {key:'change_unlocked',label:'変更可能',badge:'badge-purple'},
    {key:'change_submitted',label:'変更入力待ち',badge:'badge-danger'},
    {key:'change_inputting',label:'変更入力中',badge:'badge-info'},
    {key:'change_confirmed',label:'変更確定',badge:'badge-success'},
    {key:'unsubmitted',label:'未提出',    badge:'badge-danger'},
    {key:'today_input', label:'📅 本日入力可能', badge:'badge-info'},
  ];

  const statusDescList=[
    {badge:'badge-warning',label:'入力待ち',desc:'提出完了。順次内勤が入力するのをお待ちください。2週間以内のシフトを提出したのに1日経過してもステータスが変わっていない等あればLINEにてお知らせください。'},
    {badge:'badge-info',label:'内勤入力中',desc:'内勤が入力中です。全媒体入力完了後、確定ステータスへ変わります。'},
    {badge:'badge-success',label:'確定',desc:'全媒体への入力が完了しました。'},
    {badge:'badge-purple',label:'変更可能',desc:'内勤がシフト変更を許可しました。'},
    {badge:'badge-danger',label:'変更入力待ち',desc:'変更後のシフトを提出しました。内勤スタッフの確認をお待ちください。'},
    {badge:'badge-info',label:'変更入力中',desc:'変更シフトを入力中。キャスト編集不可。全媒体完了後、変更確定になります。'},
    {badge:'badge-success',label:'変更確定',desc:'変更後のシフトが確定しました。'},
    {badge:'badge-danger',label:'未提出',desc:'まだシフトが提出されていません。'},
  ];
  let html=`<div class="card" style="margin-bottom:10px">
    <div class="accordion-header" onclick="toggleAccordion('accStatusDesc')" style="padding:6px 0">
      <div style="font-size:13px;font-weight:700">📌 ステータス説明</div>
      <span class="accordion-arrow" id="arrowAccStatusDesc">▼</span>
    </div>
    <div class="accordion-body" id="accStatusDesc"><div style="display:flex;flex-direction:column;gap:7px;padding-top:10px;font-size:12px">
      ${statusDescList.map(s=>`<div style="display:flex;align-items:flex-start;gap:8px">
        <span class="badge ${s.badge}" style="flex-shrink:0;margin-top:2px;white-space:nowrap">${s.label}</span>
        <span style="color:var(--text2);line-height:1.6">${s.desc}</span>
      </div>`).join('')}
    </div></div>
  </div>`;

  // 週タブ＋フィルタをstickyで固定
  html+=`<div style="position:sticky;top:96px;z-index:90;background:var(--bg);padding:6px 0 4px;margin-bottom:4px;border-bottom:1px solid var(--border)">`;
  html+=`<div class="week-selector" style="margin-bottom:6px">`;
  allWks.forEach(wk=>{
    const _isCurrWkSL=wk===getCurrWk(),_isNextWkSL=wk===getNextWk();
    const _wkLabelSL=_isCurrWkSL?`今週 ${getWeekLabel(wk)}`:_isNextWkSL?`来週 ${getWeekLabel(wk)}`:getWeekLabel(wk);
    html+=`<button class="week-btn ${slWeekKey===wk?'active':''} ${_isCurrWkSL?'currwk':''}" onclick="slWeekKey='${wk}';renderStatusList()">${_wkLabelSL}</button>`;
  });
  html+=`</div>`;

  // フィルタータブ
  html+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px">`;
  filters.forEach(f=>{
    let cnt=0;
    if(f.key==='all') cnt=S.castList.length;
    else if(f.key==='unsubmitted') cnt=S.castList.filter(u=>!S.submissions[u.name+'_'+slWeekKey]).length;
    else if(f.key==='today_input'){
      // castList生成前なので直接計算
      cnt=S.castList.filter(u=>{
        const _td2=new Date();_td2.setHours(0,0,0,0);
        const _ld2=new Date(_td2);_ld2.setDate(_ld2.getDate()+14);
        const _st2=['waiting','inputting','change_submitted','change_inputting'];
        return Object.entries(S.submissions).some(([k,sub])=>{
          if(!k.startsWith(u.name+'_'))return false;
          if(!_st2.includes(sub.status))return false;
          const _wk2=k.slice(u.name.length+1);
          return getWeekDates(_wk2).some(ds=>{
            const _d2=new Date(ds);_d2.setHours(0,0,0,0);
            if(_d2<_td2||_d2>_ld2)return false;
            const _sh2=S.shifts[u.name+'_'+ds];
            if(!_sh2||_sh2.start==null)return false;
            const _items2=[...new Set(['記録簿',...(S.castStores[u.name]||[])])];
            return _items2.some(it=>{const cd=S.checkData[u.name+'_'+_wk2+'_'+ds+'_'+it];return!cd||!cd.checked;});
          });
        });
      }).length;
    }
    else cnt=S.castList.filter(u=>{const s=S.submissions[u.name+'_'+slWeekKey];return s&&s.status===f.key;}).length;
    html+=`<button onclick="slFilter='${f.key}';renderStatusList()"
      style="padding:5px 12px;border-radius:20px;border:2px solid ${slFilter===f.key?'var(--pink)':'var(--border)'};background:${slFilter===f.key?'#fdf2f8':'#fff'};font-size:12px;font-weight:${slFilter===f.key?'700':'500'};cursor:pointer;color:${slFilter===f.key?'var(--pink)':'var(--text2)'};transition:all .15s">
      ${f.label} <span style="background:${slFilter===f.key?'var(--pink)':'var(--border)'};color:${slFilter===f.key?'#fff':'var(--text2)'};border-radius:10px;padding:1px 6px;font-size:11px;margin-left:2px">${cnt}</span>
    </button>`;
  });
  html+=`</div></div>`;

  // フィルター適用済みキャストリスト
  // 本日から14日以内の日付リストを生成
  const _todayDate=new Date();_todayDate.setHours(0,0,0,0);
  const _limitDate=new Date(_todayDate);_limitDate.setDate(_limitDate.getDate()+14);
  const _todayInputStatuses=['waiting','inputting','change_submitted','change_inputting'];

  let castList=[...S.castList].sort((a,b)=>a.name.localeCompare(b.name,'ja')).filter((u,i)=>{
    if(slFilter==='all')return true;
    if(slFilter==='unsubmitted')return!S.submissions[u.name+'_'+slWeekKey];
    if(slFilter==='today_input'){
      // 全週を対象に「今日〜14日以内に未チェックの日がある」キャストを抽出
      return Object.entries(S.submissions).some(([k,sub])=>{
        if(!k.startsWith(u.name+'_'))return false;
        if(!_todayInputStatuses.includes(sub.status))return false;
        const wk=k.slice(u.name.length+1);
        const dates=getWeekDates(wk);
        return dates.some(ds=>{
          const d=new Date(ds);d.setHours(0,0,0,0);
          if(d<_todayDate||d>_limitDate)return false;
          const sh=S.shifts[u.name+'_'+ds];
          if(!sh||sh.start==null)return false;
          const stores=S.castStores[u.name]||[];
          const items=[...new Set(['記録簿',...stores])];
          return items.some(it=>{
            const cd=S.checkData[u.name+'_'+wk+'_'+ds+'_'+it];
            return !cd||!cd.checked;
          });
        });
      });
    }
    const s=S.submissions[u.name+'_'+slWeekKey];
    return s&&s.status===slFilter;
  });

  // すべてタブのみ行ジャンプ表示
  if(slFilter==='all'&&castList.length){
    const jumpGroups=KANA_GROUPS.filter(g=>castList.some(u=>g.chars.includes(u.name[0])));
    const hasOther=castList.some(u=>!KANA_GROUPS.some(g=>g.chars.includes(u.name[0])));
    if(jumpGroups.length>0||hasOther){
      html+=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;padding:6px 8px;background:#f8fafc;border-radius:8px;border:1px solid var(--border)">
        <span style="font-size:10px;color:var(--text2);font-weight:600;align-self:center;margin-right:2px">ジャンプ：</span>
        ${jumpGroups.map(g=>`<a href="#sl-group-${g.label}" onclick="event.preventDefault();(()=>{const el=document.getElementById('sl-group-${g.label}');if(!el)return;const offset=el.getBoundingClientRect().top+window.scrollY-200;window.scrollTo({top:offset,behavior:'smooth'});})()" style="font-size:11px;font-weight:700;color:var(--navy);padding:2px 8px;background:#fff;border:1px solid var(--border);border-radius:12px;cursor:pointer;text-decoration:none">${g.label}行</a>`).join('')}
        ${hasOther?`<a href="#sl-group-その他" onclick="event.preventDefault();(()=>{const el=document.getElementById('sl-group-その他');if(!el)return;const offset=el.getBoundingClientRect().top+window.scrollY-200;window.scrollTo({top:offset,behavior:'smooth'});})()" style="font-size:11px;font-weight:700;color:var(--navy);padding:2px 8px;background:#fff;border:1px solid var(--border);border-radius:12px;cursor:pointer;text-decoration:none">その他</a>`:''}
      </div>`;
    }
  }
  html+=`<div class="card">`;
  html+=`<div style="font-size:12px;color:var(--text2);margin-bottom:8px">${getWeekLabel(slWeekKey)}　${filters.find(f=>f.key===slFilter)?.label||'すべて'}　${castList.length}名</div>`;

  if(!castList.length){
    html+=`<p style="color:var(--text2);font-size:13px;padding:8px 0">該当するキャストはいません</p>`;
  } else {
    // コンパクトカード型（3列・グループ別）
    const groups=KANA_GROUPS.map(g=>({
      ...g,
      members:castList.filter(u=>g.chars.includes(u.name[0]))
    })).filter(g=>g.members.length>0);
    const others=castList.filter(u=>!KANA_GROUPS.some(g=>g.chars.includes(u.name[0])));
    if(others.length) groups.push({label:'その他',members:others});

    groups.forEach((g,gi)=>{
      html+=`<div style="margin-bottom:10px">
        <div id="sl-group-${g.label}" style="font-size:13px;font-weight:800;color:#4a4080;background:#e6e6fa;margin-bottom:6px;padding:3px 12px;border-radius:20px;display:inline-block">${g.label}行</div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:4px">`;
      g.members.forEach(u=>{
        const sub=S.submissions[u.name+'_'+slWeekKey];
        const idx=S.castList.indexOf(u);
        const isReminded=S.remindedCasts&&S.remindedCasts[u.name+'_'+slWeekKey];
        const showRemind=slFilter==='unsubmitted'&&slWeekKey===getNextWk();
        const badgeCls=sub?bMap[sub.status]||'badge-gray':'badge-danger';
        const statusTxt=sub?sMap[sub.status]||sub.status:'未提出';
        html+=`<div style="background:#fff;border:1px solid var(--border);border-radius:7px;padding:6px 8px;cursor:pointer"
          onclick="jumpToInputCheck('${u.name}','${slWeekKey}')">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:4px">
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:12px;color:var(--navy);text-decoration:underline;text-underline-offset:2px">${u.name}</div>
              <span class="badge ${badgeCls}" style="font-size:10px;padding:1px 5px;white-space:nowrap;margin-top:2px;display:inline-block">${statusTxt}</span>
              ${slFilter==='today_input'?(()=>{
                const _td=new Date();_td.setHours(0,0,0,0);
                const _ld=new Date(_td);_ld.setDate(_ld.getDate()+14);
                const _inputDates=[];
                Object.entries(S.submissions).forEach(([k,s])=>{
                  if(!k.startsWith(u.name+'_'))return;
                  if(!_todayInputStatuses.includes(s.status))return;
                  const _wk=k.slice(u.name.length+1);
                  getWeekDates(_wk).forEach(ds=>{
                    const _d=new Date(ds);_d.setHours(0,0,0,0);
                    if(_d<_td||_d>_ld)return;
                    const _sh=S.shifts[u.name+'_'+ds];
                    if(!_sh||_sh.start==null)return;
                    const _stores=S.castStores[u.name]||[];
                    const _items=[...new Set(['記録簿',..._stores])];
                    const _hasUnchecked=_items.some(it=>{const cd=S.checkData[u.name+'_'+_wk+'_'+ds+'_'+it];return!cd||!cd.checked;});
                    if(_hasUnchecked)_inputDates.push(ds);
                  });
                });
                if(!_inputDates.length)return '';
                const _fmt=ds=>{const d=new Date(ds);return `${d.getMonth()+1}/${d.getDate()}(${DOWNAMES[(d.getDay()+6)%7]})`;};
                return `<div style="font-size:9px;color:#2563eb;margin-top:2px">📅 ${_inputDates.map(_fmt).join('・')}</div>`;
              })():''}
              ${showRemind?`<label onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:2px;margin-top:3px;font-size:9px;color:var(--text2);cursor:pointer"><input type="checkbox" ${isReminded?'checked':''} onchange="toggleReminded('${u.name}','${slWeekKey}',this.checked)" style="accent-color:var(--pink2);width:10px;height:10px">催促</label>`:''}
            </div>
            <div style="font-size:9px;color:var(--text2);text-align:right;flex-shrink:0;line-height:1.8">
              <div>提出：${sub?.submittedAt?sub.submittedAt.slice(5,16):'—'}</div>
              <div>確定：${sub?.confirmedAt?sub.confirmedAt.slice(5,16):'—'}</div>
            </div>
          </div>
        </div>`;
      });
      html+=`</div></div>`;
    });
  }
  html+=`</div>`;

  document.getElementById('mainContent').innerHTML=html;
}

function toggleReminded(castName,wk,checked){
  if(!S.remindedCasts)S.remindedCasts={};
  const key=castName+'_'+wk;
  if(checked){S.remindedCasts[key]=true;}
  else{delete S.remindedCasts[key];}
  saveState(false);
  renderDashboard();
}

function renderInputCheck(){
  // 提出データのある全週 + 今週・来週・翌々週 をまとめて週選択に表示
  const submittedWks=new Set();
  Object.keys(S.submissions).forEach(k=>{
    // key形式: "キャスト名_YYYY-MM-DD"
    // キャスト名に _ が含まれる可能性があるので、末尾の日付部分だけ取る
    const m=k.match(/_(\d{4}-\d{2}-\d{2})$/);
    if(!m)return;
    const wkCandidate=m[1];
    // 必ず getWeekKey() を通して月曜に正規化（ズレ防止）
    const [y,mo,d]=wkCandidate.split('-').map(Number);
    const normalized=getWeekKey(new Date(y,mo-1,d,12,0,0));
    submittedWks.add(normalized);
  });
  // 今週・来週・翌々週も常に含める
  [getCurrWk(),getNextWk(),getNextNextWk()].forEach(w=>submittedWks.add(w));
  // 今週以降 + 全提出週（今週以降のみ）を表示
  const currWkForFilter=getCurrWk();
  const wks=[...submittedWks].sort().filter(w=>w>=currWkForFilter);
  // デフォルトは今週（なければ最新週）
  const currWkDef=getCurrWk();
  if(!icWeekKey||!wks.includes(icWeekKey)){
    icWeekKey=wks.includes(currWkDef)?currWkDef:(wks[wks.length-1]||currWkDef);
  }

  // グループ選択モード
  if(icGroupMode){
    renderInputCheckGroupSelect(wks);
    return;
  }

  // 現在の内勤スタッフ選択者の色
  const staffEntry=S.staffList.find(s=>s.name===currentStaffName);
  const currentColor=staffEntry?staffEntry.color:'#34d399';

  const staffOpts=S.staffList.map(s=>`<option value="${s.name}" style="color:${s.color};font-weight:700;background:${s.color}15">${s.name}</option>`).join('');
  const wkBtns=wks.map(wk=>{const _isCW=wk===getCurrWk(),_isNW=wk===getNextWk();const _lbl=_isCW?`今週 ${getWeekLabel(wk)}`:_isNW?`来週 ${getWeekLabel(wk)}`:getWeekLabel(wk);return `<button class="week-btn ${icWeekKey===wk?'active':''} ${_isCW?'currwk':''}" onclick="icWeekKey='${wk}';renderInputCheck()">${_lbl}</button>`;}).join('');

  // 固定ヘッダーを icFixedHeader に描画
  const fixedEl=document.getElementById('icFixedHeader');
  if(fixedEl){
    fixedEl.style.display='block';
    fixedEl.innerHTML=`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" onclick="icGroupMode=true;renderInputCheck()">← グループ選択</button>
        <span style="font-size:12px;color:var(--text2);font-weight:600">グループ：${icSelectedGroup}</span>
      </div>
      <div class="week-selector" style="margin-bottom:7px">${wkBtns}</div>
      <div class="staff-selector-bar" style="margin-bottom:7px">
        <label>入力者：</label>
        <select class="form-select" id="icStaffSel" style="width:auto;min-width:120px;border-color:${currentColor};color:var(--text);font-weight:600" onchange="currentStaffName=this.value;renderInputCheck()">
          <option value="">— 選択 —</option>${staffOpts}
        </select>
        ${currentStaffName?`<span style="width:12px;height:12px;border-radius:50%;background:${currentColor};display:inline-block;margin-left:4px"></span><span style="font-size:12px;font-weight:700;color:${currentColor};margin-left:4px">${currentStaffName}</span>`:''}
      </div>
      <div class="search-bar" style="margin-bottom:0">
        <input type="text" id="icSearch" placeholder="🔍 キャスト名（苗字は省略）で検索..." value="${icSearchQuery}" oninput="icSearchQuery=this.value;renderInputCheckBody()">
      </div>`;
    // スタッフ選択値を復元
    const sel=fixedEl.querySelector('#icStaffSel');
    if(sel)sel.value=currentStaffName||'';
  }

  let html=`<div id="icBody"></div>`;
  document.getElementById('mainContent').innerHTML=html;

  // staffSelectの値を復元
  const sel=document.getElementById('icStaffSel');
  if(sel&&currentStaffName)sel.value=currentStaffName;

  renderInputCheckBody();
}

      const cellOnclick=(isRestDay||_isHolidayCell||isChangedDay&&dsub&&dsub.status==='change_unlocked')?'':`onclick="icToggleCheck('${u.name}','${dsWk}','${ds}','${it}')"`;

            onkeydown="icCellKeyNav(event,'${u.name}','${ds}',${itmIdx},${items.length},'${dsWk}')">

      }

      const isEven=dsIdx%2===1;

      const noShiftCls=(!sh||sh.start==null)?' ic-row-noshift':'';
      const effectiveRowClass=noShiftCls?' ':rowClass; // シフトなしは他クラスを無効化

            onclick="icRequestChange('${u.name}','${icWeekKey}','${ds}')">

          </button>
        </td>
        <td class="ic-date-cell ${dateCls}" rowspan="2" style="position:sticky;left:116px;z-index:1;vertical-align:middle;text-align:center;min-width:88px;width:88px;border-right:2px solid var(--border)!important;padding:4px 3px!important">
          <div style="font-size:10px;font-weight:600;color:#1e2a3a">${d.getMonth()+1}/${d.getDate()}<span style="color:${(isSun||isHol)?'#dc2626':isSat?'#2563eb':'#1e2a3a'}">(${DOWNAMES[dow]}${isHol?'祝':''})</span></div>
          ${isHolidayChange
            ?`<div style="font-size:11px;font-weight:700;color:#9d174d;margin-top:3px;background:#fce7f3;border-radius:4px;padding:2px 5px;display:inline-block">🚫 休日変更中</div>`
            :shiftLabel
              ?`<div style="font-size:12px;font-weight:700;color:#1e2a3a;margin-top:3px;background:#e8f4fd;border-radius:4px;padding:2px 5px;display:inline-block">⌚ ${shiftLabel}</div>`
              :`<div style="font-size:11px;color:#94a3b8;margin-top:2px">—</div>`}
          ${sh&&sh.memo?`<div style="font-size:9px;color:var(--pink2);margin-top:1px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px">📝${escHtml(sh.memo.length>15?sh.memo.slice(0,15)+'…':sh.memo)}</div>`:''}
          ${sub.checkedDates&&sub.checkedDates[ds]?`<div style="font-size:8px;color:#94a3b8;margin-top:2px;line-height:1.3">${typeof sub.checkedDates[ds]==="object"?sub.checkedDates[ds].datetime:sub.checkedDates[ds]}</div>`:''}
        </td>
        <td class="ic-bulk-cell" rowspan="2" style="padding:3px 2px!important;min-width:32px;border-right:1px solid var(--border)!important;vertical-align:middle">

      </tr>`;
    });
    html+=`</tbody></table></div>`;
    html+=`<div style="font-size:11px;color:var(--text2);margin-top:4px">${doneChecks}/${totalChecks} チェック済み</div>`;
    html+=`</div>`;
  });

  icBodyEl.innerHTML=html;

  // スクロール位置復元
  displayCasts.forEach(u=>{
    const wrap=document.getElementById('wrap_'+u.name);
    if(wrap&&icScrollPositions[u.name]!=null)wrap.scrollLeft=icScrollPositions[u.name];
  });

  // 折りたたみ状態を再適用（DOM再生成後）
  Object.keys(_restCollapsed).forEach(castName=>{
    if(!_restCollapsed[castName])return;
    const tbl=document.getElementById('tbl_'+castName);
    if(!tbl)return;
    tbl.querySelectorAll('tr[data-rest="1"][data-cast="'+castName+'"]').forEach(tr=>{
      tr.style.display='none';

  });

// テーブルごとのスクロール位置を保持
const icScrollPositions={};

function icSaveScrollPositions(){
  Object.keys(S.castStores||{}).forEach(name=>{
    const wrap=document.getElementById('wrap_'+name);
    if(wrap)icScrollPositions[name]=wrap.scrollLeft;
  });
}

function icToggleCheck(castName,wk,ds,item){
  // 入力者未選択チェック
  if(!currentStaffName){
    // チェックボックスを即座に元の状態に戻す
    const cdKey=castName+'_'+wk+'_'+ds+'_'+item;
    const cd=S.checkData[cdKey]||{checked:false};
    // クリックされたチェックボックスを元に戻す
    setTimeout(()=>{
      document.querySelectorAll('.ic-checkbox').forEach(cb=>{
        const td=cb.closest('td');
        if(td&&td.getAttribute('onclick')&&td.getAttribute('onclick').includes(`'${ds}'`)&&td.getAttribute('onclick').includes(`'${item}'`)){
          cb.checked=!!cd.checked;
        }
      });
    },0);
    openInfoModal('⚠️ 入力者を選択してください<br><span style="font-size:12px;color:var(--text2)">上部の「入力者」プルダウンから選択してください</span>');
    return;
  }
  icSaveScrollPositions();
  const cdKey=castName+'_'+wk+'_'+ds+'_'+item;
  if(!S.checkData[cdKey])S.checkData[cdKey]={checked:false,checkedBy:'',color:''};
  const cd=S.checkData[cdKey];
  cd.checked=!cd.checked;
  if(cd.checked){
    cd.checkedBy=currentStaffName;
    const st=S.staffList.find(s=>s.name===currentStaffName);
    cd.color=st?st.color:'';
  } else {
    cd.checkedBy='';cd.color='';
  }
  // チェックが1つでも入ったらステータスを inputting に
  const subKey=castName+'_'+wk;
  if(S.submissions[subKey]&&S.submissions[subKey].status==='waiting'){
    S.submissions[subKey].status='inputting';
  }
  saveState(false);renderInputCheckBody();
}

// 一括チェック（日付単位）
function icBulkCheck(castName,wk,ds,checked){
  if(!currentStaffName){
    openInfoModal('⚠️ 先に入力者を選択してください');
    renderInputCheckBody();
    return;
  }
  if(checked){
    // チェックをONにする前に確認モーダル
    const stores_=S.castStores[castName]||[];
    const items_=[...new Set(['記録簿',...stores_])];
    openModal(`<div class="modal-title" style="font-size:14px">🧐 全店舗入力しましたか？</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:8px">${castName} さんの入力する店舗は以下の通りです：</p>
      <div style="background:#f0f4ff;border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:12px;line-height:1.9">
        <div style="font-weight:700;color:#3730a3;margin-bottom:4px">在籍店舗一覧</div>
        ${items_.map(s=>`<span style="display:inline-block;background:#fff;border:1px solid #c7d2fe;border-radius:12px;padding:1px 8px;margin:2px;font-size:11px">${s}</span>`).join('')}
      </div>
      <p style="font-size:12px;color:#92400e;font-weight:600;margin-bottom:12px">すべての店舗への入力が完了している場合のみ「はい」を押してください</p>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal();icUndoBulkCheck('${castName}','${wk}','${ds}')">いいえ</button>
        <button class="btn btn-success" onclick="closeModal();icDoBulkCheck('${castName}','${wk}','${ds}',true)">はい、全店舗入力済みです</button>
      </div>`);
  } else {
    // チェックOFF → その日の全項目をクリア
    icSaveScrollPositions();
    icDoBulkCheck(castName,wk,ds,false);
  }
}

function icUndoBulkCheck(castName,wk,ds){
  // ポップアップでいいえを押した → チェックを戻す（再レンダリングでuncheckedに）
  icSaveScrollPositions();
  renderInputCheckBody();
}

function icDoBulkCheck(castName,wk,ds,checked){
  if(!currentStaffName){openInfoModal('⚠️ 先に入力者を選択してください');return;}
  icSaveScrollPositions();
  const stores=S.castStores[castName]||[];
  const items=[...new Set(['記録簿',...stores])];
  items.forEach(it=>{
    const cdKey=castName+'_'+wk+'_'+ds+'_'+it;
    if(!S.checkData[cdKey])S.checkData[cdKey]={checked:false,checkedBy:'',color:''};
    const cd=S.checkData[cdKey];
    if(checked){
      cd.checked=true;
      if(currentStaffName){
        cd.checkedBy=currentStaffName;
        const st=S.staffList.find(s=>s.name===currentStaffName);
        cd.color=st?st.color:'';
      }
    } else {
      cd.checked=false;cd.checkedBy='';cd.color='';
    }
  });
  saveState(false);renderInputCheckBody();
}

// 残り一括チェック（未チェックの媒体のみチェック）
function icBulkCheckRemaining(castName,wk){
  if(!currentStaffName){openInfoModal('⚠️ 先に入力者を選択してください');return;}
  icSaveScrollPositions();
  const stores=S.castStores[castName]||[];
  const items=[...new Set(['記録簿',...stores])];
  const dates=getWeekDates(wk);
  let changed=0;
  dates.forEach(ds=>{
    const sh=S.shifts[castName+'_'+ds];
    if(!sh||sh.start==null)return; // シフトなしはスキップ
    items.forEach(it=>{
      const cdKey=castName+'_'+wk+'_'+ds+'_'+it;
      if(!S.checkData[cdKey])S.checkData[cdKey]={checked:false,checkedBy:'',color:''};
      const cd=S.checkData[cdKey];
      if(!cd.checked){
        cd.checked=true;
        cd.checkedBy=currentStaffName;
        const st=S.staffList.find(s=>s.name===currentStaffName);
        cd.color=st?st.color:'';
        changed++;
      }
    });
  });
  if(changed===0){openInfoModal('未チェックの媒体はありませんでした');return;}
  saveState(false);renderInputCheckBody();
}

// Enter/Tab キーボードナビゲーション
function icCellKeyNav(e,castName,ds,itmIdx,itemLen,wk){
  if(e.key==='Enter'||e.key===' '){
    e.preventDefault();
    // スペース/Enterでチェック切り替えはブラウザデフォルトに任せる
    return;
  }
  if(e.key==='Tab'){
    e.preventDefault();
    icSaveScrollPositions();
    // 次のチェックセルへフォーカス
    const dates=getWeekDates(wk);
    const dIdx=dates.indexOf(ds);
    let nextDIdx=dIdx,nextIIdx=itmIdx+(e.shiftKey?-1:1);
    if(nextIIdx>=itemLen){nextIIdx=0;nextDIdx=dIdx+1;}
    if(nextIIdx<0){nextIIdx=itemLen-1;nextDIdx=dIdx-1;}
    if(nextDIdx<0||nextDIdx>=dates.length)return;
    const nextDs=dates[nextDIdx];
    const nextId=`ic_${castName}_${nextDs}_${nextIIdx}`;
    const nextCell=document.getElementById(nextId);
    if(nextCell){
      const cb=nextCell.querySelector('input[type=checkbox]');
      if(cb)cb.focus();
      // テーブルラッパーのスクロールを調整
      const wrap=nextCell.closest('.ic-table-wrap');
      if(wrap){
        const cellRect=nextCell.getBoundingClientRect();
        const wrapRect=wrap.getBoundingClientRect();
        if(cellRect.right>wrapRect.right)wrap.scrollLeft+=cellRect.right-wrapRect.right+10;
        if(cellRect.left<wrapRect.left+110)wrap.scrollLeft-=wrapRect.left+110-cellRect.left;
      }
    }
  }
}

function saveTmpl(castName,dow,key,val){
  if(!S.castTemplates)S.castTemplates={};
if(!S.staffShifts)S.staffShifts={};
  if(!S.castTemplates[castName])S.castTemplates[castName]={};
  if(!S.castTemplates[castName][dow])S.castTemplates[castName][dow]={};
  if(key==='off'){
    S.castTemplates[castName][dow].off=val;
  } else if(key==='start'||key==='end'){
    S.castTemplates[castName][dow][key]=val===''?null:parseInt(val);
  }
  saveState(false);
}

function applyTemplate(name,y,m){
  // その月の未入力の日にテンプレートを適用
  const tmpl=S.castTemplates&&S.castTemplates[name]||{};
  if(!Object.keys(tmpl).length){openInfoModal('⚠️ 基本シフトが設定されていません\nマスタ設定→基本シフトテンプレートから設定してください');return;}
  const lastDay=new Date(y,m+1,0).getDate();
  let cnt=0;
  for(let d=1;d<=lastDay;d++){
    const date=new Date(y,m,d,12,0,0);
    const dow=(date.getDay()+6)%7; // 0=月〜6=日
    const ds=localDateStr(date);
    const t=tmpl[dow];
    if(!t)continue; // この曜日のテンプレートなし
    if(t.off)continue; // 休みの日
    if(t.start==null||t.end==null)continue; // 未設定
    if(isConfirmed(name,ds))continue; // 確定済みはスキップ
    if(S.shifts[name+'_'+ds])continue; // 既入力はスキップ
    S.shifts[name+'_'+ds]={start:t.start,end:t.end,memo:''};
    cnt++;
  }
  if(cnt===0){openInfoModal('適用できる日がありませんでした\n（既入力・確定済み・テンプレート未設定の日はスキップ）');return;}
  saveState();
  openInfoModal(`✅ ${cnt}日分の基本シフトを適用しました`,renderCal);
}

function saveCastTmpl(name){
  if(!S.castTemplates)S.castTemplates={};
if(!S.staffShifts)S.staffShifts={};
  if(!S.castTemplates[name])S.castTemplates[name]={};
  [0,1,2,3,4,5,6].forEach(dow=>{

    const eEl=document.getElementById('ts_'+dow+'_e');
    const offEl=document.getElementById('ts_'+dow+'_off');
    const isOff=offEl&&offEl.checked;
    const sv=sEl&&sEl.value!==''?parseInt(sEl.value):null;
    const ev=eEl&&eEl.value!==''?parseInt(eEl.value):null;
    if(isOff){
      S.castTemplates[name][dow]={off:true};
    } else if(sv!=null&&ev!=null){

    } else {
      delete S.castTemplates[name][dow];
    }
  });
  saveState(false);
  closeModal();
  openInfoModal('✅ 基本シフトを保存しました\n「📋 基本適用」で未入力の日に一括適用できます');
}

// 「確定」ボタン
function confShiftIC(castName,wk){
  const k=castName+'_'+wk;
  if(!S.submissions[k]){openInfoModal('提出データがありません');return;}
  const sub=S.submissions[k];

  // pendingChanges がある場合は変更許可処理
  const pk=castName+'_'+wk;
  if(_pendingChanges[pk]&&_pendingChanges[pk].size>0){
    const dates=[..._pendingChanges[pk]];
    const stores=S.castStores[castName]||[];
    const items=[...new Set(['記録簿',...stores])];
    dates.forEach(ds=>{
      items.forEach(it=>{
        const cdKey=castName+'_'+wk+'_'+ds+'_'+it;
        if(S.checkData[cdKey])S.checkData[cdKey]={checked:false,checkedBy:'',color:''};
      });
    });
    const existing=sub.changedDates||[];
    sub.changedDates=[...new Set([...existing,...dates])];
    sub.status='change_unlocked';
    // 再変更許可時は休日変更フラグをリセット（前回の確定状態を引き継がない）
    sub.holidayChangeDates=[];
    sub.confirmedHolidayDates=[];
    delete _pendingChanges[pk];
    addLog('change_unlock',castName,wk,dates.join(','));
    showSyncOverlay('変更許可中...');
    saveState(false).then(()=>{
      hideSyncOverlay();
      const labels=dates.map(d=>{const dt=new Date(d);return (dt.getMonth()+1)+'/'+(dt.getDate());}).join('・');
      openInfoModal(`🔓 ${castName}さん（${labels}）の変更を許可しました。キャストにシフト再提出を促してください。`,renderInputCheck);
    });
    return;
  }

  const stores=S.castStores[castName]||[];
  const items=[...new Set(['記録簿',...stores])];
  const items2=items; // checkedDates用エイリアス
  const dates=getWeekDates(wk);

  // 休日変更の日が残っている場合はchange_inputtingに遷移してポップアップ
  const _unconfirmedHolidays=(sub.holidayChangeDates||[]).filter(ds=>dates.includes(ds)&&!(sub.confirmedHolidayDates||[]).includes(ds));
  if(_unconfirmedHolidays.length>0){
    const _labels=_unconfirmedHolidays.map(d=>{const dt=new Date(d);return `${dt.getMonth()+1}/${dt.getDate()}`;}).join('・');
    sub.status='change_inputting';
    saveState(false);
    renderInputCheck();
    openInfoModal(`⚠️ ${_labels} の休日変更ボタンが押されていません。変更入力中ステータスになります。休日変更ボタンを押して確定してください。`);
    return;
  }

  // シフトが入っている日のみを対象にチェック数を計算
  const shiftDates=dates.filter(ds=>{
    const sh=S.shifts[castName+'_'+ds];
    return sh&&sh.start!=null;
  });

  // シフトなし週の場合は全日を対象にする
  const targetDates=shiftDates.length>0?shiftDates:dates;
  const totalChecks=targetDates.length*items.length;

  const doneChecks=targetDates.reduce((acc,ds)=>
    acc+items.filter(it=>{
      const cd=S.checkData[castName+'_'+wk+'_'+ds+'_'+it];
      return cd&&cd.checked;
    }).length
  ,0);

  const allDone=totalChecks>0&&doneChecks===totalChecks;
  // 変更フロー中かどうか（change_inputting も含む）
  const isChangeFlow=['change_submitted','change_unlocked','change_inputting'].includes(sub.status);

  if(allDone){
    sub.status=isChangeFlow?'change_confirmed':'confirmed';
  } else if(doneChecks>0){
    // 一部チェック済み
    sub.status=isChangeFlow?'change_inputting':'inputting';
  } else {
    // チェックなし（更新ボタンだけ押した）
    sub.status=isChangeFlow?'change_inputting':'inputting';
  }
  sub.confirmedBy=currentStaffName||'内勤';
  sub.confirmedAt=new Date().toLocaleString('ja-JP');
  addLog('confirm',castName,wk,`更新→${STATUS_LABEL[sub.status]||sub.status}（${doneChecks}/${totalChecks}）`);
  // 更新ボタンを押した日時をシフトのある日に記録
  if(!sub.checkedDates)sub.checkedDates={};
  const _now=new Date();
  const _datetime=_now.toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const _h=_now.getHours();
  const _bizDate=(_h>=0&&_h<11)
    ? new Date(_now-86400000).toLocaleString('ja-JP',{month:'numeric',day:'numeric'})
    : _now.toLocaleString('ja-JP',{month:'numeric',day:'numeric'});
  getWeekDates(wk).forEach(ds=>{
    const sh2=S.shifts[castName+'_'+ds];
    if(sh2&&sh2.start!=null){
      const prev=sub.checkedDates[ds];
      // 既存の履歴を引き継ぎ
      let history=[];
      if(prev){
        history=Array.isArray(prev.history)?[...prev.history]:(prev.bizDate?[prev.bizDate]:[]);
        // 同じ日付は追加しない
        if(!history.includes(_bizDate))history.push(_bizDate);
        // 最大5件に制限
        if(history.length>5)history=history.slice(-5);
      } else {
        history=[_bizDate];
      }
      sub.checkedDates[ds]={datetime:_datetime,bizDate:_bizDate,history};
    }
  });
  // 保存中なら完了を待ってから実行
  waitForSave().then(()=>{
  try{localStorage.setItem('shiftSysV8',JSON.stringify(S));}catch(e){}
  showSyncOverlay('更新中...');
  const body=new FormData();
  body.append('action','save');
  body.append('token','sakura2025shift');
  body.append('data',JSON.stringify(S));
  fetch(GAS_URL,{method:'POST',body})
    .then(r=>r.json())
    .then(result=>{
      hideSyncOverlay();
      const statusLabel={confirmed:'確定済み',change_confirmed:'変更確定',inputting:'内勤入力中',change_inputting:'変更入力中',change_confirmed:'変更確定'}[sub.status]||STATUS_LABEL[sub.status]||sub.status;
      if(result&&result.error){
        console.warn('GAS update error:',result.error); // 内部エラーはコンソールのみ
        openInfoModal('⚠️ 保存に失敗しました。時間をおいて再試行してください。', renderInputCheck);
      } else {
        openInfoModal(`✅ 更新・保存しました<br><span style="font-size:12px;color:var(--text2)">${castName}：${statusLabel}（${doneChecks}/${totalChecks}チェック）</span>`, renderInputCheck);
      }
    })
    .catch(e=>{
      hideSyncOverlay();
      const statusLabel=STATUS_LABEL[sub.status]||sub.status;
      openInfoModal(`⚠️ 保存に失敗しました（ローカルには保存済み）<br><span style="font-size:12px;color:var(--text2)">${castName}：${statusLabel}</span><br><span style="font-size:11px;color:#dc2626">📱 ログアウト → 再ログイン → 同期ボタンで復旧できます</span>`, renderInputCheck);
    });
  }); // end waitForSave
}

// 特定日・特定時間（h〜h+1）の在籍人数
function countHour(ds, h){
  let c=0;
  S.castList.forEach(u=>{
    const sh=S.shifts[u.name+'_'+ds];
    if(!sh||sh.start==null)return;
    // h=29（翌5時）は退勤がちょうど29の人もカウント
    if(h===29){
      if(sh.start<=29 && sh.end>=29) c++;
    } else {
      if(sh.start<=h && sh.end>h) c++;
    }
  });
  return c;
}

// 時間帯人数タブ：週ごとの備考をGASに保存
function saveHourlyMemo(wk){
  if(!S.hourlyMemo)S.hourlyMemo={};
  // 画面上の入力値を最終同期（念のため）
  const dates=getWeekDates(wk);
  dates.forEach(ds=>{
    const el=document.getElementById('hmInput_'+ds);
    if(el)S.hourlyMemo[ds]=el.value;
  });
  // ボタンを「保存中」状態に
  const btns=[document.getElementById('hmSaveBtn_'+wk)];
  btns.forEach(b=>{if(b){b.disabled=true;b.textContent='⏳ 保存中...';}});
  saveState(true).then(ok=>{
    btns.forEach(b=>{
      if(!b)return;
      b.disabled=false;
      if(ok===false){
        b.style.background='linear-gradient(135deg,#f87171,#dc2626)';
        b.textContent='❌ 保存失敗 — 再試行';
      } else {
        b.style.background='linear-gradient(135deg,#34d399,#059669)';
        b.textContent='✅ 保存完了';
        setTimeout(()=>{
          b.style.background='';
          b.textContent='💾 この週の備考を保存';
        },2500);
      }
    });
  });
}

// ============================================================
// 事前申告休暇（castAbsence）ヘルパー
// ============================================================
function getCastAbsences(castName){
  return (S.castAbsence&&S.castAbsence[castName])||[];
}
function isAbsenceDate(castName, ds){
  return getCastAbsences(castName).some(a=>a.from<=ds&&ds<=a.to);
}
function getAbsenceForDate(castName, ds){
  return getCastAbsences(castName).find(a=>a.from<=ds&&ds<=a.to)||null;
}
function addCastAbsence(castName, from, to, reason){
  if(!S.castAbsence)S.castAbsence={};
  if(!S.castAbsence[castName])S.castAbsence[castName]=[];
  S.castAbsence[castName].push({from,to,reason:reason||''});
  saveState(false);
  renderSettings();
}
function removeCastAbsence(castName, idx){
  if(!S.castAbsence||!S.castAbsence[castName])return;
  S.castAbsence[castName].splice(idx,1);
  if(!S.castAbsence[castName].length)delete S.castAbsence[castName];
  saveState(false);
  renderSettings();
}
function openAbsenceModal(castName){
  const absences=getCastAbsences(castName);

// キャスト管理
function castNameKeydown(e){
  if(e.key!=='Enter')return;
  // モーダルが開いているときは無視
  if(!document.getElementById('modalOverlay').classList.contains('hidden'))return;
  e.preventDefault();
  const pw=document.getElementById('newCastPw');
  if(!pw)return;
  if(!pw.value){
    genRandomPw();
    pw.focus();
  } else {
    addCast();
  }
}

function genRandomPw(){
  // 既存のPW一覧を取得
  const usedPws=new Set(S.castList.map(u=>String(u.pw)));
  // 未使用のPWをリストアップ（10〜99）
  const available=[];
  for(let i=10;i<=99;i++){
    if(!usedPws.has(String(i)))available.push(String(i));
  }
  if(available.length===0){
    openInfoModal('⚠️ 使用可能なPWがありません（全90通り使用済み）');
    return;
  }
  const pw=available[Math.floor(Math.random()*available.length)];
  const el=document.getElementById('newCastPw');
  if(el){el.value=pw;el.type='text';}
}

function addCast(){
  const nameEl=document.getElementById('newCastName');
  const pwEl=document.getElementById('newCastPw');
  const name=(nameEl?nameEl.value:'').trim();
  let pw=(pwEl?pwEl.value:'').trim();
  if(!name){openInfoModal('キャスト名を入力してください');return;}
  if(!pw) pw=String(Math.floor(10+Math.random()*90));
  if(!/^\d{2}$/.test(pw)){openInfoModal('パスワードは2桁の数字で入力してください');return;}
  if(S.castList.find(u=>u.name===name)){openInfoModal('同じ名前のキャストが既に存在します');return;}
  S.castList.push({name,pw});
  S.castStores[name]=[...STORES];
  // フォームを即クリア（ポップアップ表示前）
  if(nameEl)nameEl.value='';
  if(pwEl)pwEl.value='';
  saveState(false);renderSettings();
  // ポップアップ表示（OKボタンにautofocus → Enterで閉じられる）
  openModal(`<div class="modal-title">✅ ${name} を追加しました</div>
    <div style="text-align:center;margin:12px 0">
      <div style="font-size:13px;color:var(--text2);margin-bottom:6px">パスワード</div>
      <div style="font-size:28px;font-weight:800;letter-spacing:.2em;color:var(--pink)">${pw}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:6px">※キャストに伝えてください</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" autofocus onclick="closeModal();setTimeout(()=>{const el=document.getElementById('newCastName');if(el){el.focus();}},50)">OK（Enter）</button>
    </div>`);
}
function unlockCast(name){
  clearLock('cast_'+name);
  openInfoModal(`🔓 ${name} のロックを解除しました`,renderSettings);
}
function unlockCastByStaff(name){
  if(!S.castLocks)S.castLocks={};
  // unlockedByStaffフラグを立てる→キャスト次回ログイン時にlocalStorageのロックを解除
  S.castLocks[name]={...S.castLocks[name],unlockedByStaff:true,unlockedAt:Date.now()};
  saveState(false).then(()=>{
    openInfoModal(`🔓 ${name} のロックを解除しました。\nキャストが次回ログインすると反映されます。`,renderSettings);
  });
}
function removeCast(name){
  openConfirmModal(`「${name}」を削除しますか？\n（シフトデータも削除されます）`,()=>{
    S.castList=S.castList.filter(u=>u.name!==name);
    delete S.castStores[name];
    Object.keys(S.shifts).forEach(k=>{if(k.startsWith(name+'_'))delete S.shifts[k];});
    Object.keys(S.submissions).forEach(k=>{if(k.startsWith(name+'_'))delete S.submissions[k];});
    saveState(false);renderSettings();
  });
}


function setBizWeekly(dow,type,val){
  if(!S.businessHours.weekly[dow])S.businessHours.weekly[dow]={open:12,close:29};
  S.businessHours.weekly[dow][type]=parseInt(val);
  saveState(false);
}
function addClosedDay(){
  const d=document.getElementById('closedDateInput').value;
  if(!d)return;
  if(!S.businessHours.closed)S.businessHours.closed=[];
  if(!S.businessHours.closed.includes(d)){S.businessHours.closed.push(d);saveState(false);}
  renderSettings();
}
function removeClosedDay(d){
  S.businessHours.closed=(S.businessHours.closed||[]).filter(x=>x!==d);
  saveState(false);renderSettings();
}
function addSpecialDay(){
  const d=document.getElementById('specialDateInput').value;
  const open=parseInt(document.getElementById('specialOpen').value);
  const close=parseInt(document.getElementById('specialClose').value);
  if(!d||open>=close)return openInfoModal('日付と時間を正しく入力してください');
  if(!S.businessHours.special)S.businessHours.special={};
  S.businessHours.special[d]={open,close};
  saveState(false);renderSettings();
}
function removeSpecialDay(d){
  delete S.businessHours.special[d];
  saveState(false);renderSettings();
}
function toggleAccordionById(bodyId,arrowId){
  const body=document.getElementById(bodyId);
  const arrow=document.getElementById(arrowId);
  if(!body)return;
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  if(arrow)arrow.classList.toggle('open',!isOpen);
}

function toggleAccordion(id){
  const body=document.getElementById(id);
  const arrow=document.getElementById('arrow'+id.charAt(0).toUpperCase()+id.slice(1));
  if(!body)return;
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  if(arrow)arrow.classList.toggle('open',!isOpen);
}
function togStore(n,s){
  if(!S.castStores[n])S.castStores[n]=[];
  const a=S.castStores[n],i=a.indexOf(s);
  if(i>=0)a.splice(i,1);else a.push(s);
  saveState(false);
  // 全画面再描画せず、該当キャストのチップだけ更新
  const accEl=document.querySelector('.accordion-body[data-cast-name="'+n+'"]');
  const chipsEl=accEl?accEl.querySelector('.store-chips'):null;
  if(chipsEl){
    chipsEl.innerHTML=STORES.map(st=>`<span class="store-chip ${S.castStores[n].includes(st)?'active':''}" onclick="togStore('${n}','${st}')">${st}</span>`).join('');
    // 在籍数も更新
    const countEl=document.querySelector('[data-store-count="'+n+'"]');
    if(countEl)countEl.textContent=S.castStores[n].length+'店舗';
  } else {
    renderSettings(); // フォールバック
  }
}
function setMin(h,v){S.minPeople[h]=parseInt(v)||0;saveState(false);}

// 内勤スタッフ管理
function addStaff(){
  const name=document.getElementById('newStaffName').value.trim();
  const color=document.getElementById('newStaffColor').value;
  if(!name){openInfoModal('スタッフ名を入力してください');return;}
  S.staffList.push({name,color});saveState(false);renderSettings();
}
function removeStaff(i){
  openConfirmModal(`「${S.staffList[i].name}」を削除しますか？`,()=>{S.staffList.splice(i,1);saveState(false);renderSettings();});
}
function updateStaffName(i,v){S.staffList[i].name=v;saveState(false);}
function updateStaffColor(i,v){S.staffList[i].color=v;saveState(false);}
function saveAllSettings(){
  // 内勤PW
  const pwEl=document.getElementById('staffPwInput');
  if(pwEl&&pwEl.value.trim()) S.staffPw=String(pwEl.value.trim());
  addLog('settings','','','マスタ設定保存');
  saveState(false);
  openInfoModal('✅ マスタ設定を保存しました');
}

function saveStaffPw(){
  const v=String((document.getElementById('staffPwInput').value||'').trim());
  if(!v){openInfoModal('パスワードを入力してください');return;}
  S.staffPw=v;saveState(false);openInfoModal('パスワードを保存しました');
}

function previewNoticeImage(type){
  const inputId=type==='global'?'noticeImageInput':'personalNoticeImageInput';
  const previewId=type==='global'?'noticeImagePreview':'personalNoticeImagePreview';
  const file=document.getElementById(inputId)?.files[0];
  if(!file)return;

  const prev=document.getElementById(previewId);
  if(prev)prev.innerHTML=`<div style="font-size:11px;color:var(--text2);margin-top:6px">🔄 処理中...</div>`;

  compressImage(file, 1048576, (compressed, sizeBefore, sizeAfter)=>{
    const prevEl=document.getElementById(previewId);
    const wasCompressed=sizeBefore>sizeAfter;
    const sizeLabel=sizeAfter>1024*1024
      ?`${(sizeAfter/1024/1024).toFixed(1)}MB`
      :`${Math.round(sizeAfter/1024)}KB`;
    if(prevEl)prevEl.innerHTML=`
      <div style="margin-top:6px">
        <img src="${compressed}" style="max-width:100%;max-height:200px;border-radius:8px;border:1px solid var(--border)">
        <div style="font-size:10px;color:${wasCompressed?'#059669':'var(--text2)'};margin-top:3px">
          ${wasCompressed
            ?`✅ 圧縮完了：${Math.round(sizeBefore/1024)}KB → ${sizeLabel}`
            :`📁 ${sizeLabel}`}
        </div>
      </div>`;
    if(type==='global') window._pendingNoticeImage=compressed;
    else window._pendingPersonalImage=compressed;
  });
}

// 画像圧縮（Canvas APIで品質を下げながらmaxBytes以下に）
function compressImage(file, maxBytes, callback){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      // 最大幅1200pxにリサイズ
      let w=img.width,h=img.height;
      const maxW=1200;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);

      const sizeBefore=file.size;
      // 品質を下げながら目標サイズ以下を目指す
      let quality=0.9;
      const tryCompress=()=>{
        const data=canvas.toDataURL('image/jpeg',quality);
        const sizeAfter=Math.round(data.length*0.75); // base64→バイト概算
        if(sizeAfter<=maxBytes||quality<=0.3){
          callback(data,sizeBefore,sizeAfter);
        } else {
          quality=Math.round((quality-0.1)*10)/10;
          tryCompress();
        }
      };
      tryCompress();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

      html+=`</tbody></table></div>`;
    }

  } else {
    // 操作ログ：先にページを描画してからGASログを非同期で取得

    // まずlocalStorageのログで即表示
    html+=buildLogHtml(S.operationLog||[]);

    // GASから非同期で取得してマージ

        .then(result=>{
          const gasLogs=result.logs||[];

          (S.operationLog||[]).forEach(l=>{

              allLogs.push(l);
            }
          });
          allLogs.sort((a,b)=>b.time.localeCompare(a.time));
          // DOMを直接更新

        });
    } else {
      const msg=document.getElementById('logLoadingMsg');
      if(msg) msg.remove();

    return; // innerHTML は上で設定済み

  document.getElementById('mainContent').innerHTML=html;

// ===== 内勤シフトカレンダー =====
let staffCalY=new Date().getFullYear(),staffCalM=new Date().getMonth();

// テンプレートと実シフトが異なるか判定
function isSpecialShift(staffName,ds){
  if(!S.staffShifts||!S.staffShifts[staffName+'_'+ds])return false;
  const sh=S.staffShifts[staffName+'_'+ds];
  const tmpl=S.castTemplates&&S.castTemplates[staffName]||{};
  const date=new Date(ds.split('-')[0],ds.split('-')[1]-1,ds.split('-')[2],12,0,0);
  const dow=date.getDay(); // 0=日〜6=土
  // GAS経由でキーが文字列化される場合も考慮
  const t=tmpl[dow]||tmpl[String(dow)];
  if(!t)return true; // テンプレなし→特別
  if(t.off)return true; // テンプレが休みなのに入っている
  return Math.abs((t.start||0)-(sh.start||0))>0.01||Math.abs((t.end||0)-(sh.end||0))>0.01;
}

function fmtShift(sh){
  if(!sh||sh.start==null)return '';
  const fs=h=>h===11.5?'11:30':(h>=24?String(h-24):String(h));
  return fs(sh.start)+'-'+fs(sh.end);
}

function renderStaffCal(){
  if(!S.staffList)S.staffList=[];
  const today=new Date();
  const first=new Date(staffCalY,staffCalM,1);
  const last=new Date(staffCalY,staffCalM+1,0);
  const DLBL_SUN=['日','月','火','水','木','金','土'];

  // 今週（日曜始まり）
  const todayCopy=new Date(today);
  const weekStart=new Date(todayCopy);
  weekStart.setDate(todayCopy.getDate()-todayCopy.getDay());
  const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);

  let html='';

  // ===== 今週セクション =====

  // ===== 月カレンダー =====

  const startDowSun=first.getDay(); // 0=日
  for(let i=0;i<startDowSun;i++){
    html+=`<div style="min-height:80px;border-radius:6px;background:#f8fafc;border:1px solid #e2e8f0"></div>`;
  }

  for(let day=1;day<=last.getDate();day++){
    const date=new Date(staffCalY,staffCalM,day,12,0,0);
    const ds=localDateStr(date);
    const isToday=date.toDateString()===today.toDateString();
    const isSun=date.getDay()===0,isSat=date.getDay()===6;
    const isHol=HOLIDAYS.includes(ds);
    const dateColor=isSun||isHol?'#f87171':isSat?'#60a5fa':'var(--text)';

    // 特別シフトがある人がいるか

// 日付クリックで全スタッフのシフトを編集するモーダル
function openDayStaffModal(ds){
  const [y,m,d]=ds.split('-').map(Number);
  const date=new Date(y,m-1,d,12,0,0);
  const DLBL2=['日','月','火','水','木','金','土'];
  const dayLabel=`${m}/${d}(${DLBL2[date.getDay()]})`;

  let html=`<div class="modal-title">📅 ${dayLabel} シフト</div>`;
  S.staffList.forEach(s=>{
    const sh=S.staffShifts&&S.staffShifts[s.name+'_'+ds]||{};
    const _dH=[11.5,...Array.from({length:18},(_,i)=>i+12)];
    const _dFmt=h=>h===11.5?'11:30':(h>=24?h-24+'(翌)':h)+'時';
    const sOpts=_dH.slice(0,-1).map(h=>`<option value="${h}" ${sh.start===h?'selected':''}>${_dFmt(h)}</option>`).join('');
    const eOpts=_dH.slice(1).map(h=>`<option value="${h}" ${sh.end===h?'selected':''}>${_dFmt(h)}</option>`).join('');
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
      <span style="font-weight:700;color:${s.color};min-width:40px">${s.name}</span>
      <select id="dss_${s.name}_s" style="padding:3px 5px;border:1px solid var(--border);border-radius:5px;font-size:12px">
        <option value="">休み</option>${sOpts}
      </select>
      <span>〜</span>
      <select id="dss_${s.name}_e" style="padding:3px 5px;border:1px solid var(--border);border-radius:5px;font-size:12px">
        <option value="">-</option>${eOpts}
      </select>
    </div>`;
  });
  html+=`<div class="modal-actions" style="margin-top:12px">
    <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
    <button class="btn btn-primary" onclick="saveDayStaffShifts('${ds}')">💾 保存</button>
  </div>`;
  openModal(html);
}

function saveDayStaffShifts(ds){
  if(!S.staffShifts)S.staffShifts={};
  S.staffList.forEach(s=>{
    const sv=document.getElementById('dss_'+s.name+'_s')?.value;
    const ev=document.getElementById('dss_'+s.name+'_e')?.value;
    const key=s.name+'_'+ds;
    if(!sv){delete S.staffShifts[key];}
    else if(ev&&parseFloat(ev)>parseFloat(sv)){S.staffShifts[key]={start:parseFloat(sv),end:parseFloat(ev),memo:''};}
  });
  saveState(false);closeModal();renderStaffCal();
}

function openStaffShiftModal(ds,staffName){
  const sname=staffName||S.staffList[0]?.name;
  if(!sname)return;
  const sh=S.staffShifts&&S.staffShifts[sname+'_'+ds]||{};
  const [y,m,d]=ds.split('-').map(Number);
  const date=new Date(y,m-1,d,12,0,0);
  const DLBL2=['日','月','火','水','木','金','土'];
  const staffObj=S.staffList.find(s=>s.name===sname)||{color:'#666'};
  const _sh2=[11.5,...Array.from({length:18},(_,i)=>i+12)];
  const _fmt2=h=>h===11.5?'11:30':(h>=24?h-24+'(翌)':h)+'時';
  const sOpts=_sh2.slice(0,-1).map(h=>`<option value="${h}" ${sh.start===h?'selected':''}>${_fmt2(h)}</option>`).join('');
  const eOpts=_sh2.slice(1).map(h=>`<option value="${h}" ${sh.end===h?'selected':''}>${_fmt2(h)}</option>`).join('');
  openModal(`<div class="modal-title" style="color:${staffObj.color}">${sname}　${m}/${d}(${DLBL2[date.getDay()]})</div>
    <div class="form-row" style="margin-bottom:12px">
      <div><label class="form-label">出勤</label>
        <select id="ssStart" class="form-select"><option value="">休み</option>${sOpts}</select></div>
      <div><label class="form-label">退勤</label>
        <select id="ssEnd" class="form-select"><option value="">-</option>${eOpts}</select></div>
    </div>
    <div style="margin-bottom:14px">
      <label class="form-label">メモ</label>
      <input type="text" id="ssMemo" class="form-input" value="${escHtml(sh.memo||'')}" placeholder="備考など">
    </div>
    <div class="modal-actions">
      ${sh.start!=null?`<button class="btn btn-danger btn-sm" onclick="saveStaffShift('${ds}','${sname}',null,null,'')">削除</button>`:''}
      <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveStaffShiftFromModal('${ds}','${sname}')">保存</button>
    </div>`);
}

function saveStaffShiftFromModal(ds,sname){
  const sv=document.getElementById('ssStart').value;
  const ev=document.getElementById('ssEnd').value;
  const memo=document.getElementById('ssMemo').value;
  if(sv===''){ saveStaffShift(ds,sname,null,null,''); return; }
  if(ev===''||parseFloat(ev)<=parseFloat(sv)){openInfoModal('退勤時間を正しく入力してください');return;}
  saveStaffShift(ds,sname,parseFloat(sv),parseFloat(ev),memo);
}

function saveStaffShift(ds,sname,start,end,memo){
  const _action=start==null?'削除':'保存';
  addLog('staff_shift',sname,'',`内勤シフト${_action}：${ds} ${sname}`);
  if(!S.staffShifts)S.staffShifts={};
  const key=sname+'_'+ds;
  if(start==null){delete S.staffShifts[key];}
  else{S.staffShifts[key]={start,end,memo:memo||''};}
  saveState(false);closeModal();renderStaffCal();
}

// 内勤テンプレ設定モーダル
function openStaffTmplModal(sname){
  const tmpl=S.castTemplates&&S.castTemplates[sname]||{};
  const DLBL3=['日','月','火','水','木','金','土'];
  const staffObj=S.staffList.find(s=>s.name===sname)||{color:'#666'};
  let html=`<div class="modal-title" style="color:${staffObj.color}">📋 ${sname} 基本シフト</div>
    <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px">
      <thead><tr>
        <th style="padding:5px;background:#f8fafc;font-weight:600">曜日</th>
        <th style="padding:5px;background:#f8fafc">出勤</th>
        <th style="padding:5px;background:#f8fafc">退勤</th>
        <th style="padding:5px;background:#f8fafc;font-size:10px">休み</th>
      </tr></thead><tbody>`;
  [0,1,2,3,4,5,6].forEach(dow=>{
    const t=tmpl[dow]||{};
    const isOff=t.off===true;
    // 内勤テンプレは11:30スタート可能（11.5で表現）
    const staffHours=[11.5,...Array.from({length:18},(_,i)=>i+12)];
    const fmt30=h=>h===11.5?'11:30':(h>=24?h-24+'(翌)':h)+'時';
    const sOpts=staffHours.slice(0,-1).map(h=>`<option value="${h}" ${t.start===h?'selected':''}>${fmt30(h)}</option>`).join('');
    const eOpts=staffHours.slice(1).map(h=>`<option value="${h}" ${t.end===h?'selected':''}>${fmt30(h)}</option>`).join('');
    html+=`<tr style="border-bottom:1px solid #e2e8f0;${isOff?'opacity:.4':''}">
      <td style="padding:5px;font-weight:700;color:${dow===0?'#f87171':dow===6?'#60a5fa':'inherit'}">${DLBL3[dow]}</td>
      <td style="padding:3px"><select id="stmpl_${sname}_${dow}_s" style="padding:3px;border:1px solid #cbd5e1;border-radius:5px;font-size:11px" ${isOff?'disabled':''}>
        <option value="">-</option>${sOpts}</select></td>
      <td style="padding:3px"><select id="stmpl_${sname}_${dow}_e" style="padding:3px;border:1px solid #cbd5e1;border-radius:5px;font-size:11px" ${isOff?'disabled':''}>
        <option value="">-</option>${eOpts}</select></td>
      <td style="padding:3px;text-align:center">
        <input type="checkbox" id="stmpl_${sname}_${dow}_off" ${isOff?'checked':''}
          style="width:15px;height:15px;accent-color:#f87171"
          onchange="this.closest('tr').style.opacity=this.checked?'.4':'1';['s','e'].forEach(x=>document.getElementById('stmpl_${sname}_${dow}_'+x).disabled=this.checked)">
      </td>
    </tr>`;
  });
  html+=`</tbody></table>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveStaffTmpl('${sname}')">💾 保存</button>
    </div>`;
  openModal(html);
}

function saveStaffTmpl(sname){
  if(!S.castTemplates)S.castTemplates={};
  if(!S.castTemplates[sname])S.castTemplates[sname]={};
  [0,1,2,3,4,5,6].forEach(dow=>{
    const sEl=document.getElementById('stmpl_'+sname+'_'+dow+'_s');
    const eEl=document.getElementById('stmpl_'+sname+'_'+dow+'_e');
    const offEl=document.getElementById('stmpl_'+sname+'_'+dow+'_off');
    const isOff=offEl&&offEl.checked;
    const sv=sEl&&sEl.value!==''?parseFloat(sEl.value):null;
    const ev=eEl&&eEl.value!==''?parseFloat(eEl.value):null;
    if(isOff){S.castTemplates[sname][dow]={off:true};}
    else if(sv!=null&&ev!=null){S.castTemplates[sname][dow]={start:sv,end:ev,off:false};}
    else{delete S.castTemplates[sname][dow];}
  });
  saveState(false);closeModal();
  openInfoModal(`✅ ${sname}の基本シフトを保存しました`);
}


function printStaffCal(){
  const today=new Date();
  const first=new Date(staffCalY,staffCalM,1);
  const last=new Date(staffCalY,staffCalM+1,0);
  const DLBL_SUN=['日','月','火','水','木','金','土'];
  const startDowSun=first.getDay();

  // スタッフの色マップ
  const colorMap={};
  S.staffList.forEach(s=>colorMap[s.name]=s.color);

  let rows='';
  let cells=[];
  // 前月パッド
  for(let i=0;i<startDowSun;i++) cells.push('<td style="border:1px solid #ccc;background:#f8f8f8"></td>');

  for(let day=1;day<=last.getDate();day++){
    const date=new Date(staffCalY,staffCalM,day,12,0,0);
    const ds=localDateStr(date);
    const isSun=date.getDay()===0,isSat=date.getDay()===6;
    const isHol=HOLIDAYS.includes(ds);
    const isToday=date.toDateString()===today.toDateString();
    const dateColor=isSun||isHol?'#dc2626':isSat?'#2563eb':'#111';

    // スタッフシフト
    let shiftLines='';
    // 出勤時間が早い順にソート
    [...S.staffList]
      .map(s=>({s,sh:S.staffShifts&&S.staffShifts[s.name+'_'+ds]}))
      .filter(({sh})=>sh&&sh.start!=null)
      .sort((a,b)=>a.sh.start-b.sh.start)
      .forEach(({s,sh})=>{
        const special=isSpecialShift(s.name,ds);
        shiftLines+=`<div style="font-size:9px;font-weight:700;background:${special?'#ff9800':colorMap[s.name]+'22'};color:${special?'#fff':colorMap[s.name]};border:${special?'1px solid #f57c00':'none'};border-radius:2px;padding:1px 3px;margin-bottom:1px;white-space:nowrap">${s.name} ${fmtShift(sh)}</div>`;
      });

    cells.push(`<td style="border:1px solid #ccc;vertical-align:top;padding:3px;min-height:60px;background:${isToday?'#f0fdf4':'#fff'}">
      <div style="font-size:10px;font-weight:700;color:${dateColor};margin-bottom:2px">${day}${isHol?'<span style="font-size:7px;color:#dc2626">祝</span>':''}</div>
      ${shiftLines}
    </td>`);

    if(date.getDay()===6||day===last.getDate()){
      // 末日が土曜でなければ空セルを埋める
      if(day===last.getDate()&&date.getDay()!==6){
        const rem=6-date.getDay();
        for(let i=0;i<rem;i++) cells.push('<td style="border:1px solid #ccc;background:#f8f8f8"></td>');
      }
      rows+=`<tr>${cells.join('')}</tr>`;
      cells=[];
    }
  }

  // 凡例
  const legend=S.staffList.map(s=>`<span style="display:inline-flex;align-items:center;gap:3px;margin-right:10px;font-size:10px"><span style="width:10px;height:10px;border-radius:50%;background:${s.color};display:inline-block"></span>${s.name}</span>`).join('');

  const printHtml=`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>${staffCalY}年${staffCalM+1}月 内勤シフト</title>
  <style>
    @page { size: A4 landscape; margin: 12mm; }
    body { font-family: 'Hiragino Sans','Meiryo',sans-serif; margin:0; }
    table { width:100%; border-collapse:collapse; table-layout:fixed; }
    td { width:calc(100%/7); }
    h2 { margin:0 0 8px; font-size:16px; }
    .legend { margin-bottom:6px; }
    .note { font-size:8px;color:#888;margin-top:6px; }
    .yellow-note { display:inline-block;background:#fef08a;padding:1px 6px;border-radius:3px;font-size:9px;margin-left:8px; }
  </style>
  </head><body>
  <h2>📅 ${staffCalY}年${staffCalM+1}月 内勤シフト表</h2>
  <div class="legend">${legend}<span class="yellow-note">⭐ テンプレ外シフト</span></div>
  <table>
    <thead><tr>${DLBL_SUN.map((d,i)=>`<th style="background:${i===0?'#fee2e2':i===6?'#dbeafe':'#1e2a3a'};color:${i===0?'#dc2626':i===6?'#2563eb':'#fff'};padding:4px;font-size:11px;border:1px solid #ccc">${d}</th>`).join('')}</tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="note">印刷日時：${new Date().toLocaleString('ja-JP')} ／ ⭐は基本シフト以外の特別シフト</div>
  
</body></html>`;

  const win=window.open('','_blank','width=900,height=700');
  win.document.write(printHtml);
  win.document.close();
  win.onload=()=>{ win.print(); };
}
function applyStaffTemplates(){
  if(!S.staffShifts)S.staffShifts={};
  const last=new Date(staffCalY,staffCalM+1,0).getDate();
  let cnt=0;
  S.staffList.forEach(s=>{
    const tmpl=S.castTemplates&&S.castTemplates[s.name]||{};
    for(let d=1;d<=last;d++){
      const date=new Date(staffCalY,staffCalM,d,12,0,0);
      const ds=localDateStr(date);
      const dow=date.getDay();
      const t=tmpl[dow]||tmpl[String(dow)];
      if(!t||t.off||t.start==null||t.start===undefined)continue;
      // 既存のメモは保持しつつ上書き適用
      const existingMemo=(S.staffShifts[s.name+'_'+ds]||{}).memo||'';
      S.staffShifts[s.name+'_'+ds]={start:t.start,end:t.end,memo:existingMemo};
      cnt++;
    }
  });
  if(cnt===0){openInfoModal('テンプレートが設定されていません');return;}
  saveState(false);
  openInfoModal(`✅ ${cnt}件のシフトを適用しました`,renderStaffCal);
}

  const el=document.getElementById('castInfoText');

  if(!el)return;

    if(btn){btn.textContent='✅ コピー済み';}

  }).catch(()=>{
    // フォールバック
    el.select();document.execCommand('copy');
    showToast('✅ コピーしました！');
  });
}

  setLoginType('cast');
  // URLパラメータでキャスト名自動入力
  const _params=new URLSearchParams(window.location.search);
  const _castName=_params.get('cast');
  if(_castName){
    const nameEl=document.getElementById('loginName');
    if(nameEl){nameEl.value=decodeURIComponent(_castName);}
  }
  // URLパラメータでロック解除
  const params=new URLSearchParams(window.location.search);
  if(params.get('unlock')==='staff'){
    clearStaffLock();
    const err=document.getElementById('loginError');
    if(err){err.textContent='✅ 内勤ロックを解除しました';err.style.color='#059669';}
    // URLからパラメータを除去
    history.replaceState({},'',window.location.pathname);
  }
});
