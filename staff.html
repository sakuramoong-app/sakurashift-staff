  // 変更申請のある最初の日にジャンプ（必要なら月切り替え）
  async function _jumpToChangeRequest(name){
    // 全月から change_requested の週を探す
    const allWeeks=[];
    for(let i=-1;i<3;i++){
      let [y,m]=viewYM.split('-').map(Number);
      m+=i; if(m<1){m+=12;y--;} if(m>12){m-=12;y++;}
      weeksInMonth(`${y}-${String(m).padStart(2,'0')}`).forEach(wk=>{ if(!allWeeks.includes(wk)) allWeeks.push(wk); });
    }
    allWeeks.sort();
    let targetDs=null;
    for(const wk of allWeeks){
      const w=Store.getWeek(name,wk);
      if(!w || w.status!=='change_requested' || !w.changeRequest) continue;
      // 変更申請のある最初の日付
      const days=Object.keys(w.changeRequest).sort();
      if(days.length>0){ targetDs=days[0]; break; }
    }
    if(!targetDs){ _jumpToFirstEditableWithMonthSwitch(name); return; }
    // 別月なら切り替え
    const targetYM=targetDs.slice(0,7);
    if(targetYM!==viewYM){
      viewYM=targetYM;
      const lbl=document.getElementById('staffMonthLabel');
      if(lbl){const[y,m]=viewYM.split('-').map(Number);lbl.textContent=`${y}年 ${m}月`;}
      setBusy(true,'読み込み中…');
      await StaffGas.loadMonthAll(viewYM);
      setBusy(false);
      expandedCast=name;
      renderCastList();
    }
    setTimeout(()=>{
      const castEl=document.getElementById('cast-'+cssEscape(name));
      if(!castEl) return;
      const row=castEl.querySelector(`.check-row[data-ds="${targetDs}"]`);
      if(row){ row.scrollIntoView({behavior:'smooth',block:'center'}); row.classList.add('row-spin'); setTimeout(()=>row.classList.remove('row-spin'),2000); }
      else castEl.scrollIntoView({behavior:'smooth',block:'center'});
    },140);
  }

  async function _jumpToFirstEditableWithMonthSwitch(name){
    const today = ymd(new Date());
    const weeks = [];
    for(let i=0;i<3;i++){
      let [y,m]=viewYM.split('-').map(Number);
      m+=i; if(m>12){m-=12;y++;}
      weeksInMonth(`${y}-${String(m).padStart(2,'0')}`).forEach(wk=>{
        if(!weeks.includes(wk)) weeks.push(wk);
      });
    }
    weeks.sort();
    let targetDs=null, targetWk=null;
    for(const wk of weeks){
      const w=Store.getWeek(name,wk);
      if(!w) continue;
      if(!['waiting','inputting','change_inputting','confirmed','change_confirmed'].includes(w.status)) continue;
      for(const ds of weekDates(wk)){
        if(ds>=today&&w.shifts[ds]){targetDs=ds;targetWk=wk;break;}
      }
      if(targetDs) break;
    }
    if(!targetDs){ setTimeout(()=>_jumpToFirstEditable(name),120); return; }
    // 別月なら切り替え
    const targetYM=targetDs.slice(0,7);
    if(targetYM!==viewYM){
      viewYM=targetYM;
      const lbl=document.getElementById('staffMonthLabel');
      if(lbl){const[y,m]=viewYM.split('-').map(Number);lbl.textContent=`${y}年 ${m}月`;}
      setBusy(true,'読み込み中…');
      await StaffGas.loadMonthAll(viewYM);
      setBusy(false);
      expandedCast=name;
      renderCastList();
    }
    setTimeout(()=>_jumpToFirstEditable(name),120);
  }

  function makeMonthChecks(c){
    const weeks=weeksInMonth(viewYM);
    return weeks.map(wk=>makeWeekCheck(c,wk)).join('');
  }

  function makeWeekCheck(c, wk){
    const w=Store.getWeek(c.name,wk);
    const castStores=Store.getCastStores(c.name);
    const st=w?w.status:'unsubmitted';
    const ds7=weekDates(wk);
    const dows=['月','火','水','木','金','土','日'];

    const ROW1=['記録簿','サクラムーン','ラナ鶯谷','ラナ錦糸町','ドレスガーデン','ピーチムーン','逆AF倶楽部','キューティー'];
    const ROW2=['18','極門','ヘブンラナ','ヘブンサクラ','(キュ)ぴゅあらば','(キュ)情報局','(極)ぴゅあらば','(極)情報局'];
    const allStores=[...ROW1,...ROW2];

    let actions='';
    const hasShift = w && w.shifts && Object.keys(w.shifts).length>0;
    if(hasShift){
      // 残り一括ボタンは日付横の一括ボタンに統合したため削除
    }
    if(st==='waiting'||st==='inputting'){
      actions+=`<button class="btn-sm btn-update confirm-btn" data-confirm-wk="${wk}" onclick="StaffApp.confirmWeek('${esc(c.name)}','${wk}')">🔄 確定する</button>`;
    } else if(st==='change_requested'){
      actions+=`<button class="btn-sm btn-accept" onclick="StaffApp.acceptChange('${esc(c.name)}','${wk}')">✅ 受理</button>
               <button class="btn-sm btn-reject" onclick="StaffApp.rejectChange('${esc(c.name)}','${wk}')">🙅 却下</button>`;
    } else if(st==='change_inputting'){
      actions+=`<button class="btn-sm btn-update confirm-btn" data-confirm-wk="${wk}" onclick="StaffApp.confirmWeek('${esc(c.name)}','${wk}')">🔄 変更を反映して確定</button>`;
    }

    let crInfo='';
    if(w && w.changeRequest && (st==='change_requested'||st==='change_inputting')){
      const keys=Object.keys(w.changeRequest);
      // 全日の理由を集める
      const reasons=keys.map(ds=>(w.changeRequest[ds]&&w.changeRequest[ds].reason||'').trim()).filter(Boolean);
      const uniqueReasons=[...new Set(reasons)];
      const allSame = uniqueReasons.length===1 && reasons.length===keys.length;

      const lines=keys.map(ds=>{
        const ch=w.changeRequest[ds];
        const d=new Date(ds+'T12:00:00');
        const label=ch.type==='holiday'?'お休みに変更':`${fmtShift(ch.start,ch.end)}に変更`;
        // 理由がバラバラなら各行に理由を添える
        const perReason = (!allSame && ch.reason) ? ` <span style="color:#C71585">（理由：${esc(ch.reason)}）</span>` : '';
        return `${d.getMonth()+1}/${d.getDate()}(${dows[(d.getDay()+6)%7]}) → ${label}${perReason}`;
      });
      // 全日同じ理由なら最後に1つだけまとめて表示
      const reasonLine = allSame ? `<br>📝 理由：${esc(uniqueReasons[0])}` : '';
      crInfo=`<div class="cr-info">🔄 変更希望：<br>${lines.join('<br>')}${reasonLine}</div>`;
    }

    let rows='';
    const _today_check=ymd(new Date());
    ds7.forEach((ds,i)=>{
      const isPast=ds<_today_check;
      const sh=w&&w.shifts[ds];
      const isRest=!sh;
      const d=new Date(ds+'T12:00:00');
      const md=`${d.getMonth()+1}/${d.getDate()}`;
      const holiday=isJpHoliday(ds);
      const dcls=holiday?'day-sun':(i===5?'day-sat':i===6?'day-sun':'');
      const dayMemo=(w&&w.dayMemos&&w.dayMemos[ds])||'';
      const kanzen=(w&&w.kanzen&&w.kanzen[ds])||false;
      const vacation=(w&&w.vacations&&w.vacations[ds])||null;
      const vacReq=(w&&w.vacationRequests&&w.vacationRequests.find(r=>r.ds===ds))||null;
      const dateCell=`<div class="day-fixed ${isRest?'rest':''} ${vacation?'day-vacation':''}">
        <div class="day-date"><span class="d-md">${md}</span><span class="d-dow ${dcls}">(${dows[i]})</span></div>
        ${vacation
          ? `<div class="vacation-label">🏖 ${esc(vacation.memo||'休暇')} <span onclick="event.stopPropagation();StaffApp.cancelVacationDay('${esc(c.name)}','${wk}','${ds}')" title="取り消し" style="cursor:pointer;color:#E05260;font-weight:900;margin-left:4px;">✕</span></div>`
          : vacReq
            ? `<div class="vacation-req-label">🏖 申請中</div>`
            : sh
              ? `<div class="shift-big">⏰ ${fmtShift(sh.start,sh.end)}${kanzen?'<span class="kanzen-ico"> 完🔵</span>':''}</div>`
              : '<div class="rest-cell">お休み</div>'
        }
        ${dayMemo?`<div class="day-memo-line">📝 ${esc(dayMemo)}</div>`:''}
      </div>`;

      let bulkCell='';
      if(!isRest){
        const dayStores=allStores.filter(m=>castStores.includes(m));
        const allChecked=dayStores.length>0 && dayStores.every(m=>w.checks[ds+'_'+m]&&w.checks[ds+'_'+m].checked);
        bulkCell=`<div class="bulk-cell"><span class="chk bulk ${allChecked?'checked':''}" style="${allChecked?'background:'+(staffColor(staffName)||'#5FD0A0'):''}"
          title="この日を一括" onclick="StaffApp.toggleDayAll('${esc(c.name)}','${wk}','${ds}')">${allChecked?'✓':''}</span></div>`;
      } else {
        bulkCell='<div class="bulk-cell"></div>';
      }

      let storeCells='';
      if(isRest){
        storeCells=`<div class="store-rest">— お休み —</div>`;
      }else{
        const makeChip=(m)=>{
          if(!castStores.includes(m)) return `<div class="store-chip-cell off"><div class="store-chip-name">${esc(STORE_SHORT[m]||m)}</div></div>`;
          const ck=w.checks[ds+'_'+m];
          const checked=ck&&ck.checked;
          const color=checked?(staffColor(ck.by)||'#5FD0A0'):'';
          const updDate=checked&&ck.at?fmtCheckDate(ck.at):'';
          return `<div class="store-chip-cell ${checked?'on':''}">
            <div class="store-chip-name">${esc(STORE_SHORT[m]||m)}</div>
            <span class="chk ${checked?'checked':''}" style="${checked?'background:'+color:''}" title="${checked?esc(ck.by||''):''}"
              onclick="StaffApp.toggleCheck('${esc(c.name)}','${wk}','${ds}','${esc(m)}')">${checked?'✓':''}</span>
            <div class="chk-date">${updDate||'&nbsp;'}</div>
          </div>`;
        };
        const row1=ROW1.map(makeChip).join('');
        const row2=ROW2.map(makeChip).join('');
        storeCells=`<div class="store-grid2"><div class="store-row">${row1}</div><div class="store-row">${row2}</div></div>`;
      }

      rows+=`<div class="check-row ${isRest?'row-rest':''} ${isRest&&hideRest?'row-hidden':''} ${isPast?'past-day':''}" data-ds="${ds}">${dateCell}${bulkCell}<div class="store-area">${storeCells}</div></div>`;
    });

    const isCurrentWeek = wk===currentWeekKey();
    const alias18=Store.getCastAlias(c.name,'18');
    const aliasGm=Store.getCastAlias(c.name,'極門');
    let aliasBadges='';
    if(aliasGm) aliasBadges+=`<span class="alias-badge gm">極:${esc(aliasGm)}</span>`;
    if(alias18) aliasBadges+=`<span class="alias-badge n18">18:${esc(alias18)}</span>`;
    const staffMemo=(w&&w.staffMemo)||'';
    return `<div class="week-block" data-wk="${wk}">
      <div class="week-head">
        <span class="week-label ${isCurrentWeek?'current':''}">
          <span class="wk-cast-name">${esc(c.name)}</span>${aliasBadges}
          <span class="wk-range">${esc(weekLabel(wk))}</span>
          <span class="badge ${statusBadge(st)}">${statusLabel(st)}</span>
        </span>
        <div class="week-actions">${actions}</div>
      </div>
      ${crInfo}
      <div class="staff-memo-row">
        <span class="staff-memo-label">🗒 内勤メモ</span>
        <input class="staff-memo-input" value="${esc(staffMemo)}" placeholder="このキャストの今週のメモ（キャストには見えません）"
          onchange="StaffApp.saveStaffMemo('${esc(c.name)}','${wk}',this.value)">
      </div>
      <div class="check-rows">${rows}</div>
    </div>`;
  }

  function fmtCheckDate(iso){
    if(!iso) return '';
    const d=new Date(iso);
    if(isNaN(d)) return '';
    return `${d.getMonth()+1}/${d.getDate()}`;
  }

  /* ============ 操作 ============ */
  async function toggleCheck(cast, wk, ds, media){
    const w=Store.getWeek(cast,wk);
    const cur = w && w.checks[ds+'_'+media] && w.checks[ds+'_'+media].checked;
    const r=Store.dispatch('SET_CHECK',{cast,wk,ds,media,checked:!cur,by:staffName,color:staffColor(staffName)});
    if(r.error){ toast(errorMessage(r.error)); return; }
    renderCastList();
    autoSave();
  }

  const STORE_ORDER=['記録簿','サクラムーン','ラナ鶯谷','ラナ錦糸町','ドレスガーデン','ピーチムーン','逆AF倶楽部','キューティー','18','極門','ヘブンラナ','ヘブンサクラ','(キュ)ぴゅあらば','(キュ)情報局','(極)ぴゅあらば','(極)情報局'];

  async function toggleDayAll(cast, wk, ds){
    const w=Store.getWeek(cast,wk);
    if(!w || !w.shifts[ds]) return;
    const dayStores=STORE_ORDER.filter(m=>Store.getCastStores(cast).includes(m));
    if(dayStores.length===0) return;
    // 「残り一括」：未チェックの店舗だけを自分のチェックにする（他人のチェックは触らない）
    const unchecked=dayStores.filter(m=>{ const ck=w.checks[ds+'_'+m]; return !ck || !ck.checked; });
    if(unchecked.length>0){
      // 未チェックがある → 未チェック分を自分のチェックで埋める
      unchecked.forEach(m=>{
        Store.dispatch('SET_CHECK',{cast,wk,ds,media:m,checked:true,by:staffName,color:staffColor(staffName)});
      });
    } else {
      // 全部チェック済み → 自分がチェックした分だけ解除（他人の分は残す）
      dayStores.forEach(m=>{
        const ck=w.checks[ds+'_'+m];
        if(ck && ck.checked && ck.by===staffName){
          Store.dispatch('SET_CHECK',{cast,wk,ds,media:m,checked:false,by:staffName});
        }
      });
    }
    renderCastList();
    autoSave();
  }

  async function fillRemaining(cast, wk){
    const w=Store.getWeek(cast,wk);
    if(!w) return;
    const stores=Store.getCastStores(cast);
    let count=0;
    weekDates(wk).forEach(ds=>{
      if(!w.shifts[ds]) return;
      stores.forEach(m=>{
        const ck=w.checks[ds+'_'+m];
        if(!ck || !ck.checked){
          Store.dispatch('SET_CHECK',{cast,wk,ds,media:m,checked:true,by:staffName,color:staffColor(staffName)});
          count++;
        }
      });
    });
    renderCastList();
    autoSave();
    toast(count>0?count+'件を一括チェックしました✅':'すでに全部チェック済みです');
  }

  /* 一括確定（waitingのみ・change_requestedは対象外） */
  async function bulkConfirmAll(){
    const items=collectInbox().filter(it=>it.type==='submit');
    if(items.length===0){ toast('確定できる提出がありません'); return; }
    if(!confirm(`受信ボックスの提出済み ${items.length}件 を一括確定します。\n変更申請・長期休暇申請は対象外です。\nよろしいですか？`)) return;
    let done=0;
    items.forEach(it=>{
      const r=Store.dispatch('CONFIRM_WEEK',{cast:it.cast,wk:it.wk,by:staffName});
      if(!r.error) done++;
    });
    renderAll();
    await saveNow();
    // 各キャストに通知（まとめて送る）
    items.forEach(it=>{
      StaffGas.notify(it.cast,'done','シフトが確定しました（'+_wkShortRange(it.wk)+'）');
    });
    toast(`${done}件を一括確定しました✅`);
  }

  async function confirmWeek(cast, wk){
    // 確定前のステータスで「変更後の確定」かを判定
    const wBefore = Store.getWeek(cast, wk);
    const wasChange = wBefore && (wBefore.status==='change_inputting' || wBefore.status==='change_requested');
    const r=Store.dispatch('CONFIRM_WEEK',{cast,wk,by:staffName});
    if(r.error){ toast(errorMessage(r.error)); return; }
    renderAll();
    await saveNow();
    // 週の範囲ラベル（6/1〜6/7形式）
    const wkRange = _wkShortRange(wk);
    // ★ 文言を分ける：変更後の確定か通常の確定か
    if(wasChange){
      StaffGas.notify(cast,'change_done','変更申請が受理されました（'+wkRange+'）');
      toast(cast+'さんの'+weekLabel(wk)+'を更新・確定しました✅');
    } else {
      StaffGas.notify(cast,'done','シフトが確定しました（'+wkRange+'）');
      toast(cast+'さんの'+weekLabel(wk)+'を確定しました✅');
    }
  }

  /* 週キー → "6/1〜6/7" 短縮範囲 */
  function _wkShortRange(wk){
    const ds = weekDates(wk);
    const f=(s)=>{ const d=new Date(s+'T12:00:00'); return `${d.getMonth()+1}/${d.getDate()}`; };
    return f(ds[0])+'〜'+f(ds[6]);
  }

  async function acceptChange(cast, wk){
    const r=Store.dispatch('ACCEPT_CHANGE',{cast,wk});
    if(r.error){ toast(errorMessage(r.error)); return; }
    renderAll();
    await saveNow();
    // ★ 変更受理通知（新規追加）
    StaffGas.notify(cast,'change','変更申請を確認中です');
    toast('受理しました。内容を修正して「変更を反映して確定」を押してください');
  }

  async function rejectChange(cast, wk){
    if(!confirm(cast+'さんの'+weekLabel(wk)+'の変更リクエストを却下しますか？\n（元のシフトのまま確定に戻ります）'))return;
    const r=Store.dispatch('REJECT_CHANGE',{cast,wk});
    if(r.error){ toast(errorMessage(r.error)); return; }
    renderAll();
    await saveNow();
    // ★ 却下通知（既存）
    StaffGas.notify(cast,'reject','変更申請が否認されました');
    toast('却下しました（元のシフトのまま）');
  }

  async function acceptVacation(cast, dates, memo){
    if(!confirm(`${cast}さんの長期休暇（${dates[0]}〜${dates[dates.length-1]}）を受理しますか？`))return;
    const r=Store.dispatch('ACCEPT_VACATION',{cast, dates, memo, by:staffName});
    if(r.error){ toast(errorMessage(r.error)); return; }
    renderAll();
    await saveNow();
    StaffGas.notify(cast,'vacation_accepted','長期休暇が承認されました');
    toast(`${cast}さんの長期休暇を受理しました✅`);
  }

  async function rejectVacation(cast, dates, memo){
    if(!confirm(`${cast}さんの長期休暇申請を却下しますか？`))return;
    const r=Store.dispatch('REJECT_VACATION',{cast, dates, by:staffName});
    if(r.error){ toast(errorMessage(r.error)); return; }
    renderAll();
    await saveNow();
    StaffGas.notify(cast,'vacation_rejected','長期休暇申請が否認されました');
    toast(`${cast}さんの長期休暇申請を却下しました`);
  }

  async function cancelVacationDay(cast, wk, ds){
    if(!confirm(`${cast}さんの${ds}の長期休暇を取り消しますか？`))return;
    const r=Store.dispatch('CANCEL_VACATION',{cast, wk, dates:[ds]});
    if(r.error){ toast(errorMessage(r.error)); return; }
    renderAll();
    await saveNow();
    toast(`${cast}さんの${ds}の長期休暇を取り消しました`);
  }

  /* ---------- 保存 ---------- */
  let _saveTimer=null;
  function autoSave(){
    setSaveState('saving');
    if(_saveTimer)clearTimeout(_saveTimer);
    _saveTimer=setTimeout(async ()=>{
      const ok=await StaffGas.flushNow();
      setSaveState(ok?'saved':'error');
    }, 600);
  }
  async function saveNow(){
    if(_saveTimer){clearTimeout(_saveTimer);_saveTimer=null;}
    setSaveState('saving');
    const ok=await StaffGas.flushNow();
    setSaveState(ok?'saved':'error');
    return ok;
  }
  function setSaveState(s){
    const el=document.getElementById('staffSaveState');
    if(!el)return;
    const map={saved:'✅ 保存済み',saving:'<span class="spinner"></span>保存中…',error:'⚠️ 保存に失敗（再試行します）'};
    el.innerHTML=map[s]||'✅ 保存済み';
    el.style.color=s==='error'?'#E05260':'';
  }

  async function openLogs(){
    const existing=document.getElementById('logsModal');
    if(existing) existing.remove();
    const modal=document.createElement('div');
    modal.id='logsModal';
    modal.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
    modal.innerHTML=`
      <div style="position:absolute;inset:0;background:rgba(0,0,0,.4)" id="logsModalBg"></div>
      <div style="position:relative;background:#fff;border-radius:18px;max-width:600px;width:100%;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.25)">
        <div style="padding:16px 20px;border-bottom:2px solid var(--line);display:flex;justify-content:space-between;align-items:center">

        </div>
        <div style="padding:12px 20px 8px;border-bottom:1px solid var(--line)">
          <input type="text" id="logsSearch" placeholder="🔍 キャスト名・内勤名で検索" style="width:100%;padding:9px 12px;border-radius:10px;border:2px solid var(--line);font-family:inherit;font-size:13px;margin-bottom:8px">
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="log-filter-chip active" data-lf="all" style="padding:5px 11px;border-radius:99px;border:2px solid var(--mint);background:var(--mint-deep);color:#fff;font-size:11px;font-weight:800;cursor:pointer">すべて</button>
            <button class="log-filter-chip" data-lf="CAST_SUBMIT" style="padding:5px 11px;border-radius:99px;border:2px solid var(--line);background:#fff;color:var(--text2);font-size:11px;font-weight:800;cursor:pointer">シフト提出</button>
            <button class="log-filter-chip" data-lf="CONFIRM_WEEK" style="padding:5px 11px;border-radius:99px;border:2px solid var(--line);background:#fff;color:var(--text2);font-size:11px;font-weight:800;cursor:pointer">確定</button>
            <button class="log-filter-chip" data-lf="ACCEPT_CHANGE" style="padding:5px 11px;border-radius:99px;border:2px solid var(--line);background:#fff;color:var(--text2);font-size:11px;font-weight:800;cursor:pointer">変更受理</button>
            <button class="log-filter-chip" data-lf="DELETE_CAST" style="padding:5px 11px;border-radius:99px;border:2px solid var(--line);background:#fff;color:var(--text2);font-size:11px;font-weight:800;cursor:pointer">キャスト削除</button>
          </div>
        </div>
        <div id="logsBody" style="padding:14px 20px;overflow-y:auto;flex:1">
          <div style="color:var(--text2);font-size:13px">読み込み中…</div>
        </div>
      </div>`;
    document.body.appendChild(modal);
    modal.querySelector('#logsModalBg').addEventListener('click',()=>modal.remove());
    modal.querySelector('#logsClose').addEventListener('click',()=>modal.remove());

    let _allLogs=[];
    let _logFilter='all';
    let _logSearch='';

    function renderLogs(){
      const body=modal.querySelector('#logsBody');
      let logs=_allLogs;
      if(_logFilter!=='all') logs=logs.filter(l=>l.type===_logFilter);
      if(_logSearch) logs=logs.filter(l=>(l.cast||'').includes(_logSearch)||(l.by||'').includes(_logSearch));
      if(logs.length===0){ body.innerHTML='<div style="color:var(--text2);font-size:13px">該当するログはありません</div>'; return; }
      body.innerHTML='';
      logs.forEach(l=>{
        const d=new Date(l.time);
        const dstr=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        // タイプ別の色タグ
        const tagColor = l.type==='CAST_SUBMIT'?'#5FD0A0':l.type==='CONFIRM_WEEK'?'#4A9EE0':l.type==='ACCEPT_CHANGE'?'#E9A23B':(l.type==='DELETE_WEEK'||l.type==='DELETE_CAST')?'#E05260':'#999';
        const row=document.createElement('div');
        row.style.cssText='padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;line-height:1.5';
        row.innerHTML=`<span style="color:var(--text2);font-size:11px">${dstr}</span> `
          +`<span style="display:inline-block;background:${tagColor};color:#fff;font-size:10px;font-weight:800;padding:1px 7px;border-radius:99px;margin:0 4px">${esc(_auditDetail({action:l.type}))}</span> `
          +`<span style="font-weight:800;color:var(--mint-deep)">${esc(l.by||'?')}</span>`
          +(l.cast?` → <span style="font-weight:700">${esc(l.cast)}</span>`:'')
          +(l.detail&&l.detail!==_auditDetail({action:l.type})?`<div style="color:var(--text2);font-size:12px;margin-top:3px;white-space:pre-wrap;line-height:1.5;padding-left:8px">${esc(l.detail)}</div>`:'');
        body.appendChild(row);
      });
    }

    // 検索・フィルターのイベント
    modal.querySelector('#logsSearch').addEventListener('input',(e)=>{ _logSearch=e.target.value.trim(); renderLogs(); });
    modal.querySelectorAll('.log-filter-chip').forEach(chip=>{
      chip.addEventListener('click',()=>{
        _logFilter=chip.dataset.lf;
        modal.querySelectorAll('.log-filter-chip').forEach(c=>{
          const active=c.dataset.lf===_logFilter;
          c.style.background=active?'var(--mint-deep)':'#fff';
          c.style.color=active?'#fff':'var(--text2)';
          c.style.borderColor=active?'var(--mint)':'var(--line)';
        });
        renderLogs();
      });
    });

    try{
      const r=await StaffGas._get({action:'getLogs'});
      _allLogs=(r&&r.logs)||[];
      renderLogs();
    }catch(e){
      modal.querySelector('#logsBody').innerHTML='<div style="color:#C62828;font-size:13px">ログの読み込みに失敗しました</div>';
    }
  }

  async function changeMonth(delta){
    let [y,m]=viewYM.split('-').map(Number);
    m+=delta; if(m<1){m=12;y--;} if(m>12){m=1;y++;}
    viewYM=`${y}-${String(m).padStart(2,'0')}`;
    const lbl=document.getElementById('staffMonthLabel');
    if(lbl)lbl.textContent=`${y}年 ${m}月`;
    setBusy(true,'読み込み中…');
    await StaffGas.loadMonthAll(viewYM);
    setBusy(false);
    renderAll();
  }

  function setFilter(f){
    filter=f;
    renderFilterChips();
    // 本日入力可能：対象キャストのアコーディオンを全部開いてから点滅
    if(f==='today'){
      const today = ymd(new Date());
      const targets = Store.getCastList().filter(c=>_hasUncheckedToday(c.name));
      // 対象が1件なら開く、複数なら expandedCast はそのまま（全員開くと重い）
      if(targets.length===1) expandedCast = targets[0].name;
      renderCastList();
      setTimeout(()=>{
        targets.forEach(c=>_jumpToFirstEditable(c.name));
      }, 150);
    } else {
      renderCastList();
    }
  }
  function setSearch(q){ searchQuery=(q||'').trim(); renderCastList(); }
  function renderFilterChips(){
    const todayN = countFilter('today');
    const waitN  = countFilter('waiting');
    const changeN= countFilter('change');
    document.querySelectorAll('.filter-chip').forEach(ch=>{
      ch.classList.toggle('active', ch.dataset.f===filter);
      const f=ch.dataset.f;
      if(f==='today'){
        ch.textContent='本日入力可能'+(todayN?` (${todayN})`:'');
        ch.classList.toggle('has-alert', todayN>0 && filter!=='today');
      }
      if(f==='waiting') ch.textContent='入力待ち'+(waitN?` (${waitN})`:'');
      if(f==='change'){
        ch.textContent='変更申請中'+(changeN?` (${changeN})`:'');
        ch.classList.toggle('has-alert', changeN>0 && filter!=='change');
      }
    });
  }

  function renderAll(){
    renderInbox();
    renderFilterChips();
    renderCastList();
  }

  /* ============================================================
     人数確認モジュール
     ============================================================ */
  let _staffNotes = {};  // { wk: {remindedCasts:[], memo:''} }
  let _headcountTab = 0; // 0=今週 1=来週 2=再来週

  function _targetWks(){
    return [0,1,2].map(n=>{
      const [y,m,d] = currentWeekKey().split('-').map(Number);
      const date = new Date(y,m-1,d,12,0,0);
      date.setDate(date.getDate()+7*n);
      return ymd(date);
    });
  }

  async function initHeadcount(){
    const wks = _targetWks();
    setBusy(true,'人数データを読み込み中…');
    await Promise.all([
      StaffGas.loadAllWeeks(),   // 全週データ（vacationsを確実に含む）
      (async()=>{ _staffNotes = await StaffGas.loadStaffNotes(wks); })(),
    ]);
    setBusy(false);
    renderHeadcount();
  }

  function renderHeadcount(){
    const cont = document.getElementById('headcountCont');
    if(!cont) return;
    const wks = _targetWks();
    const tabLabels = ['今週','来週','再来週','📅 長期休暇'];
    const tabHtml = tabLabels.map((l,i)=>`
      <button class="hc-tab ${_headcountTab===i?'active':''}" onclick="StaffApp.switchHcTab(${i})">${l}</button>
    `).join('');

    // 長期休暇カレンダータブ
    if(_headcountTab===3){
      cont.innerHTML = `
        <div class="hc-tabs">${tabHtml}</div>
        ${renderVacationCalendar()}`;
      return;
    }

    const wk = wks[_headcountTab];
    const dates = weekDates(wk);
    const notes = _staffNotes[wk] || {remindedCasts:[], dateMemos:{}, memo:''};
    const settings = Store.getSettings();
    const castList = Store.getCastList();

    // 長期休暇中のキャスト（vacationsに対象日がある）
    function getVacationForCast(castName, ds){
      const cwk = weekKeyOf(ds);
      const w = Store.getWeek(castName, cwk);
      return (w && w.vacations && w.vacations[ds]) || null;
    }
    // 未提出キャスト（長期休暇中を除外）
    const unsubmitted = castList.filter(c=>{
      const hasVacation = dates.some(ds=>!!getVacationForCast(c.name, ds));
      if(hasVacation) return false;
      const w = Store.getWeek(c.name, wk);
      return !w || w.status==='unsubmitted';
    });
    const onVacation = castList.filter(c=>{
      return dates.some(ds=>!!getVacationForCast(c.name, ds));
    });

    // シフト時間の短縮ラベル（start-end、翌時間は24引く）
    function shortTime(sh){
      if(!sh || sh.start==null) return '';
      const f=(h)=>h>=24?(h-24):h;
      return `${f(sh.start)}-${f(sh.end)}`;
    }

    // ブロックセルのHTML（人数/必要数、不足は⚠️赤）
    function blockCell(info){
      if(!info || info.min===0) return `<td class="hc-cell hc-cell-none">—</td>`;
      const short = info.shortage>0;
      return `<td class="hc-cell ${short?'hc-cell-short':''}">
        <span class="hc-cell-num">${info.count}</span><span class="hc-cell-min">/${info.min}</span>${short?' ⚠️':''}
      </td>`;
    }

    // テーブルの各行（日付ごと）
    const rows = dates.map(ds=>{
      const biz = getBizOfDay(ds, settings);
      const dateMemo = (notes.dateMemos && notes.dateMemos[ds]) || '';
      const dlabel = fmtDateLabel(ds);
      if(!biz){
        return `<tr class="hc-trow">
          <td class="hc-date-cell">${dlabel}</td>
          <td class="hc-closed-cell" colspan="7">— 休業日 —</td>
        </tr>
        <tr class="hc-memo-trow"><td colspan="8">
          <input class="hc-date-memo" value="${esc(dateMemo)}" placeholder="備考：この日のメモ…" data-ds="${ds}" data-wk="${wk}"
            onchange="StaffApp.saveDateMemo('${wk}','${ds}',this.value)">
        </td></tr>`;
      }
      // 出勤予定（名前(開始-終了)を並べる）
      const working = castList.map(c=>{
        const w=Store.getWeek(c.name,wk);
        if(w && w.shifts && w.shifts[ds] && w.shifts[ds].start!=null){
          return `${c.name}(${shortTime(w.shifts[ds])})`;
        }
        return null;
      }).filter(Boolean);

      const cells = HC_BLOCKS.map(b=>blockCell(hcBlockInfo(b, ds, wk, castList, settings))).join('');
      const noonCell = blockCell(hcNoonStartInfo(ds, wk, castList, settings));
      const lastCell = blockCell(hcLastInfo(ds, wk, castList, settings));

      return `<tr class="hc-trow">
        <td class="hc-date-cell">${dlabel} <span class="hc-zoom" onclick="StaffApp.toggleHcDetail('${ds}')" title="1時間ごとの詳細">🔍</span></td>
        ${cells}
        ${noonCell}
        ${lastCell}
        <td class="hc-plan-cell">${working.length? working.map(w=>`<span class="hc-plan-chip">${esc(w)}</span>`).join('') : '<span class="hc-plan-none">—</span>'}</td>
      </tr>
      <tr class="hc-detail-trow" id="hcdr-${ds}" style="display:none">
        <td colspan="8"><div class="hc-detail-inner">${renderHcHours(ds, wk, castList, settings)}</div></td>
      </tr>
      <tr class="hc-memo-trow"><td colspan="8">
        <input class="hc-date-memo" value="${esc(dateMemo)}" placeholder="備考：この日のメモ…" data-ds="${ds}" data-wk="${wk}"
          onchange="StaffApp.saveDateMemo('${wk}','${ds}',this.value)">
      </td></tr>`;
    }).join('');

    // 未提出一覧
    const unsubHtml = unsubmitted.length===0
      ? '<div class="hc-none">✅ 全員提出済み</div>'
      : `<div class="hc-unsub-chips">${unsubmitted.map(c=>{
          const reminded = (notes.remindedCasts||[]).includes(c.name);
          return `<label class="hc-unsub-chip ${reminded?'reminded':''}">
            <input type="checkbox" ${reminded?'checked':''} onchange="StaffApp.toggleRemind('${wk}','${esc(c.name)}',this.checked)">
            ${esc(c.name)}${reminded?' ✓':''}
          </label>`;
        }).join('')}</div>`;

    // 長期休暇中一覧（アコーディオン・デフォルト閉じ）
    const vacHtml = onVacation.length===0 ? '' : `
      <div class="hc-vac-acc">
        <div class="hc-vac-acc-head" onclick="StaffApp.toggleVacAcc()">
          <span>🏖 長期休暇中 <span class="hc-unsub-count">${onVacation.length}人</span></span>
          <span id="hcVacArrow" style="transition:transform .2s">▶</span>
        </div>
        <div class="hc-vac-cal" id="hcVacBody" style="display:none;margin-top:10px">
          ${onVacation.map(c=>{
            const vacDays = dates.filter(ds=>!!getVacationForCast(c.name, ds));
            const memo = vacDays.length>0 ? (getVacationForCast(c.name, vacDays[0]).memo||'') : '';
            const dayLabels = vacDays.map(ds=>{
              const d=new Date(ds+'T12:00:00'); return `${d.getMonth()+1}/${d.getDate()}`;
            }).join('・');
            return `<div class="hc-vac-row">
              <span class="hc-cast-name">${esc(c.name)}</span>
              <span class="hc-vac-days">${dayLabels}</span>
              ${memo?`<span class="hc-vac-memo">「${esc(memo)}」</span>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>`;

    cont.innerHTML = `
      <div class="hc-tabs">${tabHtml}</div>

      <div class="hc-section-title" style="margin-top:4px">

        <table class="hc-table">
          <thead>
            <tr>
              <th class="hc-th-date">日付</th>

        <textarea class="hc-memo" id="hcWeekMemo" placeholder="この週のメモ（内勤のみ）">${esc(notes.memo||'')}</textarea>
        <button class="hc-date-memo-btn" style="white-space:nowrap;padding:10px 14px" onclick="StaffApp.saveHcMemo('${wk}',document.getElementById('hcWeekMemo').value)">保存</button>

      </div>`;
  }

  function renderHcHours(ds, wk, castList, settings){
    const mp = getMinPeople(settings);
    const biz = getBizOfDay(ds, settings);
    // 縦棒グラフ（1時間ごと）
    const bars = TIME_ZONES.map(tz=>{
      const outOfHours = biz && (tz.h < biz.open || tz.h >= biz.close);
      const count = castList.filter(c=>{
        const w = Store.getWeek(c.name, wk);
        if(!w || !w.shifts || !w.shifts[ds]) return false;
        return isWorkingAt(w.shifts[ds], tz.h);
      }).length;
      const min = mp[tzMinKey(tz)] || 0;
      const shortage = !outOfHours && min > 0 && count < min;
      const shortLabel = tz.label.replace('時','').replace('(翌5時)','翌5');
      if(outOfHours){
        return `<div class="vbar-col out">
          <div class="vbar-val">–</div>
          <div class="vbar-track"><div class="vbar-fill vbar-out" style="height:4px"></div></div>
          <div class="vbar-label">${shortLabel}</div>
        </div>`;
      }
      // 棒の高さ：必要数を100%基準（最大は必要数の1.5倍で頭打ち）、色で充足判定
      const base = min>0 ? min : Math.max(count,1);
      const pct = Math.min(count/base*70, 100);
      const color = shortage ? 'vbar-short' : (count>=base ? 'vbar-full' : 'vbar-mid');
      return `<div class="vbar-col">
        <div class="vbar-val ${shortage?'vbar-val-short':''}">${count}${min>0?`<span class="vbar-min">/${min}</span>`:''}</div>
        <div class="vbar-track"><div class="vbar-fill ${color}" style="height:${Math.max(pct,6)}%"></div></div>
        <div class="vbar-label">${shortLabel}</div>
      </div>`;
    }).join('');
    return `<div class="vbar-chart">${bars}</div>`;
  }

  function fmtDateLabel(ds){
    const d = new Date(ds+'T12:00:00');
    const dows=['月','火','水','木','金','土','日'];
    const dow=(d.getDay()+6)%7;
    const cls = dow===5?'hc-sat':dow===6?'hc-sun':'';
    return `<span class="${cls}">${d.getMonth()+1}/${d.getDate()}(${dows[dow]})</span>`;
  }

  function switchHcTab(i){
    _headcountTab = i;
    renderHeadcount();
  }

  function toggleHcDetail(ds){
    const el = document.getElementById('hcdr-'+ds);
    if(!el) return;
    el.style.display = el.style.display==='none' ? '' : 'none';
  }

  function toggleVacAcc(){
    const body=document.getElementById('hcVacBody');
    const arrow=document.getElementById('hcVacArrow');
    if(!body) return;
    const open=body.style.display!=='none';
    body.style.display=open?'none':'';
    if(arrow) arrow.style.transform=open?'':'rotate(90deg)';
  }

  async function saveDateMemo(wk, ds, memo){
    const notes = _staffNotes[wk] || {remindedCasts:[], dateMemos:{}, memo:''};
    if(!notes.dateMemos) notes.dateMemos = {};
    notes.dateMemos[ds] = (memo||'').trim();
    _staffNotes[wk] = notes;
    await StaffGas.saveStaffNotes(wk, notes);
    toast('保存しました💾');
  }

  async function updateRecruitInfo(){
    const btn = document.querySelector('.hc-recruit-btn');
    if(btn){ btn.disabled=true; btn.textContent='計算中…'; }
    const settings = Store.getSettings();
    const mp = getMinPeople(settings);
    const castList = Store.getCastList();
    const wks = _targetWks();
    // 来週・再来週の不足時間帯を計算
    const shortages = [];
    [wks[1], wks[2]].forEach(wk=>{
      weekDates(wk).forEach(ds=>{
        const biz = getBizOfDay(ds, settings);
        if(!biz) return;
        const d = new Date(ds+'T12:00:00');
        const dows=['月','火','水','木','金','土','日'];
        const dateLabel=`${d.getMonth()+1}/${d.getDate()}(${dows[(d.getDay()+6)%7]})`;
        TIME_ZONES.forEach(tz=>{
          if(tz.h < biz.open || tz.h >= biz.close) return;
          const min = mp[tzMinKey(tz)] || 0;
          if(!min) return;
          const count = castList.filter(c=>{
            const w = Store.getWeek(c.name, wk);
            return w && w.shifts && w.shifts[ds] && isWorkingAt(w.shifts[ds], tz.h);
          }).length;
          if(count < min) shortages.push({ds, dateLabel, h:tz.h, label:tz.label, shortage:min-count, count, min});
        });
      });
    });
    // GASに保存
    const recruitData = {
      updatedAt: new Date().toISOString(),
      shortages,
    };
    try{
      await StaffGas._post({action:'saveRecruitInfo', data:JSON.stringify(recruitData)});
      toast(`📢 募集情報を更新しました（不足${shortages.length}件）`);
    }catch(e){ toast('更新に失敗しました'); }
    if(btn){ btn.disabled=false; btn.textContent='📢 募集情報を更新してキャストに通知'; }
  }

  /* ============ 長期休暇カレンダー ============ */
  let _vacCalYM = (function(){
    const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  })();

  function renderVacationCalendar(){
    const castList = Store.getCastList();
    const [y,m] = _vacCalYM.split('-').map(Number);
    const days = new Date(y,m,0).getDate();
    const dows = ['日','月','火','水','木','金','土'];

    // 年・月プルダウン別々
    const [selY, selM] = _vacCalYM.split('-').map(Number);
    const yearOpts = [];
    for(let yy=2025; yy<=2028; yy++){
      yearOpts.push(`<option value="${yy}" ${yy===selY?'selected':''}>${yy}年</option>`);
    }
    const monthOpts = [];
    for(let mm=1; mm<=12; mm++){
      monthOpts.push(`<option value="${mm}" ${mm===selM?'selected':''}>${mm}月</option>`);
    }

    // 日付ごとに長期休暇キャストを収集
    const rows = [];
    for(let d=1;d<=days;d++){
      const ds=`${_vacCalYM}-${String(d).padStart(2,'0')}`;
      const date=new Date(y,m-1,d,12,0,0);
      const dow=date.getDay();
      const isHoliday=isJpHoliday(ds);
      const dowCls=dow===0||isHoliday?'hvc-sun':dow===6?'hvc-sat':'';

      // その日に長期休暇受理済みのキャストを収集
      const vacCasts=[];
      castList.forEach(c=>{
        const wk=weekKeyOf(ds);
        const w=Store.getWeek(c.name,wk);
        if(!w||!w.vacations||!w.vacations[ds]) return;
        vacCasts.push({name:c.name, memo:w.vacations[ds].memo||''});
      });

      rows.push(`<div class="hvc-row ${vacCasts.length?'hvc-has-vac':''}">
        <div class="hvc-date ${dowCls}">${m}/${d}(${dows[dow]})</div>
        <div class="hvc-casts">
          ${vacCasts.length
            ? vacCasts.map(v=>`<span class="hvc-cast-chip">${esc(v.name)}${v.memo?'：'+esc(v.memo):''}<span onclick="StaffApp.removeVacation('${esc(v.name)}','${ds}')" style="cursor:pointer;color:#E05260;font-weight:900;margin-left:5px" title="削除">✕</span></span>`).join('')
            : '<span class="hvc-none-day">—</span>'
          }
          <button class="hvc-add-btn" onclick="StaffApp.openVacAdd('${ds}')" title="この日に長期休暇を追加">＋</button>
        </div>
      </div>`);
    }

    return `
      <div class="hvc-header">
        <select class="hvc-ym-sel" onchange="StaffApp.setVacCalY(this.value)">${yearOpts.join('')}</select>
        <select class="hvc-ym-sel" onchange="StaffApp.setVacCalM(this.value)">${monthOpts.join('')}</select>
      </div>
      <div class="hvc-cal">${rows.join('')}</div>`;
  }

  function setVacCalYM(ym){ _vacCalYM=ym; renderHeadcount(); }

  // 内勤が長期休暇を直接追加（日付指定→キャスト選択→理由）
  function openVacAdd(ds){
    const existing=document.getElementById('vacAddModal');
    if(existing) existing.remove();
    const castList=Store.getCastList();
    const d=new Date(ds+'T12:00:00');
    const dows=['日','月','火','水','木','金','土'];
    const dateLabel=`${d.getMonth()+1}/${d.getDate()}(${dows[d.getDay()]})`;
    const modal=document.createElement('div');
    modal.id='vacAddModal';
    modal.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
    modal.innerHTML=`
      <div style="position:absolute;inset:0;background:rgba(0,0,0,.4)" id="vacAddBg"></div>
      <div style="position:relative;background:#fff;border-radius:18px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.25);padding:22px">
        <div style="font-size:17px;font-weight:900;color:var(--text);margin-bottom:4px">🏖 長期休暇を追加</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:16px">${dateLabel} に長期休暇を登録します</div>
        <div style="font-size:12px;font-weight:800;color:var(--text2);margin-bottom:6px">キャストを選択</div>
        <select id="vacAddCast" style="width:100%;padding:11px;border:2px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:14px">
          ${castList.map(c=>`<option value="${esc(c.name)}">${esc(c.name)}</option>`).join('')}
        </select>
        <div style="font-size:12px;font-weight:800;color:var(--text2);margin-bottom:6px">理由（任意）</div>
        <input type="text" id="vacAddMemo" placeholder="例：里帰り、療養 など" style="width:100%;padding:11px;border:2px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:8px;box-sizing:border-box">
        <div style="font-size:12px;font-weight:800;color:var(--text2);margin-bottom:6px">終了日（任意・連続した休暇の場合）</div>
        <input type="date" id="vacAddEnd" value="${ds}" min="${ds}" style="width:100%;padding:11px;border:2px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:18px;box-sizing:border-box">
        <div style="display:flex;gap:10px">
          <button id="vacAddCancel" style="flex:1;padding:12px;border:2px solid var(--line);border-radius:10px;background:#fff;color:var(--text2);font-weight:800;cursor:pointer">キャンセル</button>
          <button id="vacAddSave" style="flex:1;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--mint),var(--mint-deep));color:#fff;font-weight:800;cursor:pointer">追加する</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    modal.querySelector('#vacAddBg').addEventListener('click',()=>modal.remove());
    modal.querySelector('#vacAddCancel').addEventListener('click',()=>modal.remove());
    modal.querySelector('#vacAddSave').addEventListener('click',async ()=>{
      const cast=modal.querySelector('#vacAddCast').value;
      const memo=modal.querySelector('#vacAddMemo').value.trim();
      const endDs=modal.querySelector('#vacAddEnd').value||ds;
      // ds〜endDsの全日付を作る
      const dates=[];
      let cur=new Date(ds+'T12:00:00'); const end=new Date(endDs+'T12:00:00');
      while(cur<=end){ dates.push(ymd(cur)); cur.setDate(cur.getDate()+1); }
      modal.remove();
      // 週ごとにACCEPT_VACATIONを発火
      const byWk={};
      dates.forEach(d2=>{ const wk=weekKeyOf(d2); if(!byWk[wk])byWk[wk]=[]; byWk[wk].push(d2); });
      let ok=true;
      for(const wk in byWk){
        const r=Store.dispatch('ACCEPT_VACATION',{cast, dates:byWk[wk], memo, by:staffName});
        if(r&&r.error){ toast(errorMessage(r.error)); ok=false; }
      }
      if(ok){
        renderHeadcount();
        await saveNow();
        toast(`${cast}さんの長期休暇を追加しました🏖`);
      }
    });
  }

  // 内勤が長期休暇を削除
  async function removeVacation(cast, ds){
    if(!confirm(`${cast}さんの${ds}の長期休暇を削除しますか？`)) return;
    const wk=weekKeyOf(ds);
    const r=Store.dispatch('CANCEL_VACATION',{cast, wk, dates:[ds]});
    if(r&&r.error){ toast(errorMessage(r.error)); return; }
    renderHeadcount();
    await saveNow();
    toast(`${cast}さんの長期休暇を削除しました`);
  }

  function setVacCalY(y){
    const m=_vacCalYM.split('-')[1];
    _vacCalYM=`${y}-${m}`;
    renderHeadcount();
  }
  function setVacCalM(m){
    const y=_vacCalYM.split('-')[0];
    _vacCalYM=`${y}-${String(m).padStart(2,'0')}`;
    renderHeadcount();
  }

  async function toggleRemind(wk, castName, checked){
    const notes = _staffNotes[wk] || {remindedCasts:[], memo:''};
    const arr = notes.remindedCasts || [];
    if(checked && !arr.includes(castName)) arr.push(castName);
    else if(!checked){ const i=arr.indexOf(castName); if(i>=0) arr.splice(i,1); }
    notes.remindedCasts = arr;
    _staffNotes[wk] = notes;
    await StaffGas.saveStaffNotes(wk, notes);
  }

  async function saveHcMemo(wk, memo){
    const notes = _staffNotes[wk] || {remindedCasts:[], memo:''};
    notes.memo = memo;
    _staffNotes[wk] = notes;
    await StaffGas.saveStaffNotes(wk, notes);
  }

  return {
    init, setStaffName, jumpToCast, toggleCast, openLogs,
    toggleCheck, toggleDayAll, fillRemaining,
    confirmWeek, bulkConfirmAll, acceptChange, rejectChange, autoConfirmPastWeeks,
    acceptVacation, rejectVacation, cancelVacationDay, openVacAdd, removeVacation,
    sync, changeMonth, setFilter, setSearch, renderAll,
    toggleHideRest, saveStaffMemo,
    initHeadcount, renderHeadcount, switchHcTab, toggleHcDetail, toggleVacAcc,
    toggleRemind, saveHcMemo, saveDateMemo, updateRecruitInfo,
    setVacCalYM, setVacCalY, setVacCalM,
    getViewYM:()=>viewYM,
  };
})();


// ページ切り替え
function switchPage(page){
  const check = document.getElementById('pageCheck');
  const hc = document.getElementById('pageHeadcount');
  const ptCheck = document.getElementById('ptabCheck');
  const ptHC = document.getElementById('ptabHC');
  if(page==='headcount'){
    check.style.display='none'; hc.style.display='';
    ptCheck.classList.remove('active'); ptHC.classList.add('active');
    StaffApp.initHeadcount();
  } else {
    hc.style.display='none'; check.style.display='';
    ptHC.classList.remove('active'); ptCheck.classList.add('active');
  }
}

// かなバー
const kanaBar=document.getElementById('kanaBar');
KANA_GROUPS.forEach(g=>{
  const b=document.createElement('button');
  b.className='kana-btn';b.textContent=g.label;
  b.onclick=()=>{const el=document.getElementById('grp-'+g.label);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});};

// 起動
(async function(){
  const ov=document.getElementById('loadingOverlay');
  const txt=document.getElementById('loadingText');
  if(txt)txt.textContent='読み込み中…';
  if(ov)ov.classList.add('show');

  // 認証チェック
  const urlParams = new URLSearchParams(location.search);
  const nameFromUrl = urlParams.get('name') || sessionStorage.getItem('staffName') || '';
  const authOk = sessionStorage.getItem('staffAuth')==='1';
  if(!authOk && location.hostname !== 'localhost' && location.protocol !== 'file:'){
    location.href = 'index.html';
  }

  // ⚙️ 設定画面へ移動（グローバル）
  window.goToSettings = function(){
    const cur = document.getElementById('staffSelect');
    const nm = (cur && cur.value) || sessionStorage.getItem('staffName') || '';
    location.href = 'settings.html' + (nm ? '?name='+encodeURIComponent(nm) : '');
  };

  const monthLbl=document.getElementById('staffMonthLabel');
  const ym=StaffApp.getViewYM().split('-');
  if(monthLbl)monthLbl.textContent=ym[0]+'年 '+Number(ym[1])+'月';

  await StaffApp.init({role:'staff', staffName: nameFromUrl});

  // 過去waitingを自動確定
  await StaffApp.autoConfirmPastWeeks();

  const sel=document.getElementById('staffSelect');
  const staff=Store.getStaffList();
  if(sel){
    sel.innerHTML=staff.map(s=>`<option value="${s.name}" ${s.name===nameFromUrl?'selected':''}>${s.name}</option>`).join('')||'<option>内勤</option>';
    if(nameFromUrl) StaffApp.setStaffName(nameFromUrl);
  }

  // ログアウトボタン
  const logoutBtn2 = document.getElementById('staffLogoutBtn');
  if(logoutBtn2) logoutBtn2.addEventListener('click',()=>{
    sessionStorage.removeItem('staffAuth');
    sessionStorage.removeItem('staffName');
    sessionStorage.removeItem('staffSession');
    location.href='index.html';
  });

  // ★ 自動ログアウト（30分無操作で即ログアウト）
  (function(){
    const IDLE_LIMIT = 30 * 60 * 1000; // 30分
    let idleTimer = null;
    function resetIdle(){
      if(idleTimer) clearTimeout(idleTimer);
      idleTimer = setTimeout(()=>{
        sessionStorage.removeItem('staffAuth');
        sessionStorage.removeItem('staffName');
        sessionStorage.removeItem('staffSession');
        alert('30分間操作がなかったため、自動ログアウトしました。');
        location.href='index.html';
      }, IDLE_LIMIT);
    }
    ['click','keydown','touchstart','scroll'].forEach(ev=>{
      document.addEventListener(ev, resetIdle, {passive:true});
    });
    resetIdle();
  })();
})();
</script>
