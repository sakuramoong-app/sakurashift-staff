<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サクラシフト 内勤</title>
<style>
  :root{
    --base:#F0FBF4;--card:#FFFFFF;--mint:#A7E8C8;--mint-deep:#5FD0A0;
    --pink:#FFC9DD;--pink-deep:#FF9EC0;--lemon:#FFE9A8;--sky:#BDE3FF;--lavender:#D9C9F5;
    --text:#4A5560;--text2:#9CAAB5;--rest:#EDEFF2;--line:#E4F4EC;--shadow:rgba(95,208,160,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Maru Gothic ProN','Hiragino Sans','Noto Sans JP',sans-serif;
    background:radial-gradient(circle at 12% 8%,#FFE4F0 0%,transparent 28%),radial-gradient(circle at 88% 12%,#DCF3FF 0%,transparent 26%),linear-gradient(170deg,#F0FBF4,#F6FBFF);
    background-attachment:fixed;color:var(--text);line-height:1.6;min-height:100vh;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spinner{display:inline-block;width:13px;height:13px;border:2px solid #D9F0E5;border-top-color:var(--mint-deep);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:5px;}
  .loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.6);backdrop-filter:blur(2px);z-index:9000;display:none;align-items:center;justify-content:center;}
  .loading-overlay.show{display:flex;}
  .loading-box{background:#fff;border-radius:20px;padding:26px 34px;box-shadow:0 10px 40px rgba(95,208,160,.25);text-align:center;border:2px solid var(--line);}
  .loading-spin{width:38px;height:38px;border:4px solid #E4F4EC;border-top-color:var(--mint-deep);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
  .loading-text{font-size:13px;font-weight:800;color:var(--mint-deep);}
  .top{background:rgba(255,255,255,.9);backdrop-filter:blur(10px);padding:13px 22px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px var(--shadow);position:sticky;top:0;z-index:50;border-bottom:2px solid var(--line);}
  .top-brand{display:flex;align-items:center;gap:10px;}
  .top-logo{width:38px;height:38px;border-radius:50% 50% 50% 14px;background:linear-gradient(135deg,var(--mint),var(--mint-deep));display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 4px 12px rgba(95,208,160,.4);}
  .top-name{font-size:16px;font-weight:800;letter-spacing:.05em;}
  .top-sub{font-size:11.5px;color:var(--mint-deep);font-weight:700;}
  .top-actions{display:flex;gap:8px;align-items:center;}
  .staff-select{padding:8px 12px;border-radius:12px;border:2px solid var(--mint);background:#F2FAF6;font-family:inherit;font-size:13px;font-weight:700;color:var(--mint-deep);}
  .btn{border:none;border-radius:12px;font-weight:800;cursor:pointer;font-family:inherit;font-size:13px;padding:8px 14px;transition:transform .1s;}
  .btn:active{transform:scale(.95);}
  .btn-soft{background:#F2FAF6;color:var(--mint-deep);border:1.5px solid var(--mint);}
  .save-state{font-size:12px;font-weight:700;color:var(--text2);min-width:80px;text-align:right;}
  .layout{display:flex;max-width:1100px;margin:0 auto;padding:16px;gap:14px;}
  .kana-bar{position:sticky;top:80px;align-self:flex-start;display:flex;flex-direction:column;gap:3px;background:#fff;border-radius:14px;padding:8px 6px;box-shadow:0 3px 12px var(--shadow);border:2px solid var(--line);}
  .kana-btn{width:32px;height:30px;border:none;background:transparent;border-radius:8px;font-weight:800;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;}
  .kana-btn:hover{background:#EAFBF2;color:var(--mint-deep);}
  .main{flex:1;min-width:0;}
  .inbox-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:14px;box-shadow:0 3px 12px var(--shadow);border:2px solid var(--lemon);}
  .inbox-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:7px;}
  .inbox-range{font-size:11px;color:var(--text2);font-weight:600;margin-left:2px;}
  .inbox-bulk-btn{margin-left:auto;padding:5px 12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--mint),var(--mint-deep));color:#fff;font-size:11.5px;font-weight:800;cursor:pointer;font-family:inherit;display:none;}
  .inbox-bulk-btn.show{display:inline-block;}
  .inbox-badge{background:var(--pink-deep);color:#fff;font-size:11px;font-weight:800;border-radius:10px;padding:1px 9px;}
  .inbox-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:11px;background:#FFFCF4;margin-bottom:6px;cursor:pointer;transition:background .15s;border:1.5px solid #FBEFC9;}
  .inbox-item:hover{background:#FFF6E0;}
  .inbox-item.change{background:#FFF0F6;border-color:#FAD9E7;}
  .inbox-item.change:hover{background:#FFE6F0;}
  .inbox-icon{font-size:16px;}
  .inbox-cast{font-weight:800;font-size:14px;min-width:70px;}
  .inbox-week{font-size:12px;color:var(--text2);flex:1;}
  .inbox-tag{font-size:10px;font-weight:800;padding:3px 10px;border-radius:8px;}
  .tag-submit{background:#FFF3D6;color:#C9912B;}
  .tag-change{background:#FFE0EC;color:#E0568A;}
  .inbox-empty{text-align:center;color:var(--text2);font-size:13px;padding:14px 0;font-weight:600;}
  .search-card{background:#fff;border-radius:16px;padding:12px 16px;margin-bottom:14px;box-shadow:0 3px 12px var(--shadow);border:2px solid var(--line);display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:72px;z-index:40;}
  .search-input{flex:1;min-width:160px;padding:10px 14px;border-radius:12px;border:2px solid var(--line);background:#F8FBF9;font-family:inherit;font-size:14px;color:var(--text);}
  .search-input:focus{outline:none;border-color:var(--mint);}
  .filter-chip{padding:7px 13px;border-radius:99px;border:2px solid var(--line);background:#fff;color:var(--text2);font-weight:800;font-size:12px;cursor:pointer;font-family:inherit;}
  .filter-chip.active{background:linear-gradient(135deg,var(--mint),var(--mint-deep));color:#fff;border-color:transparent;}
  .month-nav{display:flex;align-items:center;gap:10px;margin-left:auto;}
  .month-nav .arrow{width:34px;height:34px;border-radius:10px;border:none;background:#F2FAF6;color:var(--mint-deep);font-size:17px;font-weight:800;cursor:pointer;}
  .month-label{font-size:14px;font-weight:800;min-width:90px;text-align:center;}
  .kana-group{margin-bottom:14px;}
  .kana-group-title{font-size:13px;font-weight:800;color:var(--mint-deep);padding:4px 0 8px;border-bottom:2px solid var(--line);margin-bottom:10px;}
  .cast{margin-bottom:9px;background:#fff;border-radius:14px;box-shadow:0 3px 12px var(--shadow);border:2px solid var(--line);overflow:hidden;}
  .cast-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;transition:background .15s;}
  .cast-head:hover{background:#FAFDFB;}
  .cast-head-left{display:flex;align-items:center;gap:10px;}
  .cast-arrow{font-size:12px;color:var(--text2);transition:transform .2s;}
  .cast.open .cast-arrow{transform:rotate(90deg);}
  .cast-name{font-weight:800;font-size:15px;}
  .cast-badges{display:flex;gap:6px;align-items:center;}
  .wk-badge{font-size:10px;font-weight:700;color:var(--text2);}
  .badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px;}
  .badge-gray{background:#EDEFF2;color:#9CAAB5;}
  .badge-warning{background:#FFF3D6;color:#C9912B;}
  .badge-info{background:#DBF0FF;color:#4A90C2;}
  .badge-success{background:#D7F5E6;color:#3CA876;}
  .badge-pink{background:#FFE0EC;color:#E0568A;}
  .cast-body{display:none;border-top:2px solid var(--line);padding:14px 16px;background:#FBFDFC;}
  .cast.open .cast-body{display:block;}
  .week-block{margin-bottom:14px;}
  .week-block:last-child{margin-bottom:0;}
  .week-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;flex-wrap:wrap;gap:6px;}
  .week-label{font-size:13px;font-weight:800;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .week-label.current .wk-range{color:var(--pink-deep);}
  .wk-cast-name{font-size:15px;font-weight:800;color:var(--text);}
  .wk-range{font-size:13px;font-weight:800;}
  .alias-badge{font-size:10.5px;font-weight:800;padding:2px 9px;border-radius:8px;}
  .alias-badge.gm{background:#EDE4FA;color:#7E5BC4;}
  .alias-badge.n18{background:#FFE6D6;color:#D17A3A;}
  .week-actions{display:flex;gap:7px;}
  .btn-sm{font-size:12px;padding:7px 13px;border-radius:10px;border:none;font-weight:800;cursor:pointer;font-family:inherit;}
  .btn-update{background:linear-gradient(135deg,var(--mint),var(--mint-deep));color:#fff;}
  .btn-bulk{background:#fff;border:1.5px solid var(--mint-deep);color:var(--mint-deep);}
  .btn-accept{background:linear-gradient(135deg,#A7E8C8,#5FD0A0);color:#fff;}
  .btn-reject{background:#fff;border:1.5px solid #FFB9B9;color:#E0568A;}
  .btn-sm:active{transform:scale(.95);}
  .cr-info{background:#FFF0F6;border:1.5px solid #FAD9E7;border-radius:11px;padding:10px 13px;margin-bottom:10px;font-size:12.5px;font-weight:700;color:#C2185B;line-height:1.7;}
  .check-rows{display:flex;flex-direction:column;gap:3px;}
  .check-row{display:flex;gap:0;background:#fff;border-radius:10px;border:1.5px solid #CFE5DA;overflow:hidden;}
  .check-row.row-rest{background:#FAFBFC;opacity:.85;}
  .day-fixed{flex-shrink:0;width:88px;padding:3px 7px;background:#EAF7F0;border-right:2px solid #C4E2D3;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:0;}
  .day-fixed.rest{background:#F2F4F6;}
  .day-date{display:flex;align-items:baseline;gap:4px;justify-content:center;}
  .d-md{font-size:14px;font-weight:800;color:var(--text);}
  .d-dow{font-size:14px;font-weight:800;color:var(--text);}
  .d-dow.day-sat{color:#5B9BD5;}
  .d-dow.day-sun{color:var(--pink-deep);}
  .shift-big{font-size:14px;font-weight:800;color:var(--text);white-space:nowrap;letter-spacing:.02em;line-height:1.2;text-align:center;}
  .rest-cell{color:#B8C0C8;font-size:12px;font-weight:700;}
  .bulk-cell{flex-shrink:0;width:42px;display:flex;align-items:center;justify-content:center;background:#FDF6FB;border-right:2px solid #ECD9E6;}
  .chk.bulk{width:24px;height:24px;border-radius:7px;border:2px solid var(--pink);}
  .chk.bulk:hover{border-color:var(--pink-deep);}
  .store-area{flex:1;min-width:0;padding:4px 7px;background:#F4FAFF;}
  .store-grid2{display:flex;flex-direction:column;gap:3px;}
  .store-row{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;}
  .store-chip-cell{display:flex;flex-direction:column;align-items:center;gap:0;padding:2px 1px;border-radius:7px;background:#FBFDFC;border:1.5px solid #CBDDD4;min-width:0;}
  .store-chip-cell.on{background:linear-gradient(180deg,#FDF0F6,#FCE8F1);border-color:var(--pink-deep);}
  .store-chip-cell.off{opacity:.4;background:#F0F2F4;}
  .store-chip-name{font-size:9px;font-weight:800;color:#2A2F36;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center;line-height:1.3;}
  .store-chip-cell.on .store-chip-name{color:var(--pink-deep);}
  .chk{width:19px;height:19px;border-radius:6px;border:2px solid #D6DEE6;background:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:13px;color:#fff;transition:all .12s;}
  .chk:hover{border-color:var(--pink);transform:scale(1.08);}
  .chk.checked{border-color:transparent;box-shadow:0 2px 6px rgba(255,158,192,.4);}
  .check-row.past-day .chk{opacity:.35;cursor:not-allowed;pointer-events:none;}
  .check-row.past-day .bulk-cell .chk{opacity:.35;cursor:not-allowed;pointer-events:none;}
  .check-row.past-day .store-chip-cell.on{opacity:.6;}
  .check-row.past-day .chk-date{color:#9CAAB5;}
  .chk-date{font-size:8px;font-weight:800;color:#3CA876;line-height:1;height:9px;}
  .store-chip-cell.off .chk{visibility:hidden;}
  .store-chip-cell.off .chk-date{visibility:hidden;}
  .store-rest{padding:6px;text-align:center;color:#C4CCD4;font-weight:700;font-size:11px;}
  .row-hidden{display:none !important;}
  @keyframes flashPulse{0%,100%{background:transparent;}40%{background:#D32F2F;}70%{background:#FF6B6B;}}
  .flash-target{animation:flashPulse .5s ease 4 !important;border-radius:0;}
  /* 最短入力可能日：メタリックピンクくるくる3周 */
  @keyframes rowSpin{
    0%  {box-shadow: 3px 0   0 2px #FF69B4, 0  -3px 0 2px #FF1493;}
    25% {box-shadow: 0   3px 0 2px #FF1493, 3px 0   0 2px #C71585;}
    50% {box-shadow:-3px 0   0 2px #C71585, 0   3px 0 2px #FF69B4;}
    75% {box-shadow: 0  -3px 0 2px #FF69B4,-3px 0   0 2px #FF1493;}
    100%{box-shadow: 3px 0   0 2px #FF1493, 0  -3px 0 2px #C71585;}
  }
  .row-spin{animation:rowSpin .8s linear 3;position:relative;z-index:1;}
  /* 確定ボタンのメタリックキラキラ */
  @keyframes metalShine{
    0%{background-position:-200% center;}
    100%{background-position:200% center;}
  }
  @keyframes metalPulse{
    0%,100%{box-shadow:0 0 8px rgba(255,215,0,.5),0 3px 10px rgba(0,0,0,.2);transform:scale(1);}
    50%{box-shadow:0 0 20px rgba(255,215,0,.9),0 3px 14px rgba(0,0,0,.3);transform:scale(1.06);}
  }
  .confirm-btn.metal-glow{
    background:linear-gradient(110deg,#FFD700 0%,#FFF6C0 20%,#FFB800 40%,#FFF6C0 60%,#FFD700 80%,#FFB800 100%)!important;
    background-size:200% auto!important;
    color:#7A5C00!important;
    font-weight:900!important;
    border:2px solid #FFD700!important;
    animation:metalShine 2s linear infinite,metalPulse 1.2s ease-in-out infinite!important;
    text-shadow:0 1px 1px rgba(255,255,255,.6);
  }
  .week-block.row-spin{animation:rowSpin .8s linear 3;border-radius:12px;}
  /* フィルターボタンくるくる演出 */
  @keyframes borderSpin{
    0%  {box-shadow:0 0 0 2.5px #FF69B4,  2px -2px 0 2px #FF1493;}
    25% {box-shadow:0 0 0 2.5px #FF1493,  2px  2px 0 2px #C71585;}
    50% {box-shadow:0 0 0 2.5px #C71585, -2px  2px 0 2px #FF69B4;}
    75% {box-shadow:0 0 0 2.5px #FF69B4, -2px -2px 0 2px #FF1493;}
    100%{box-shadow:0 0 0 2.5px #FF1493,  2px -2px 0 2px #C71585;}
  }
  .filter-chip[data-f="today"].has-alert,
  .filter-chip[data-f="change"].has-alert{
    animation:borderSpin .8s linear infinite;
    color:#C71585 !important;
    border-color:transparent !important;
    font-weight:900 !important;
  }
  .day-vacation{background:#FFF0F8 !important;}
  .vacation-label{font-size:10px;font-weight:800;color:#C71585;background:#E1F5FE;border-radius:5px;padding:1px 5px;line-height:1.4;text-align:center;margin-top:1px;}
  .vacation-req-label{font-size:10px;font-weight:800;color:#E65100;background:#FFF3E0;border-radius:5px;padding:1px 5px;line-height:1.4;text-align:center;margin-top:1px;}
  .inbox-item.vacation{background:#F1F8E9;border-color:#A5D6A7;}
  .inbox-item.vacation:hover{background:#DCEDC8;}
  .inbox-vac-btns{display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .inbox-vac-btns span{cursor:pointer;}
  .day-memo-line{font-size:9px;font-weight:700;color:#0277BD;background:#E1F5FE;border-radius:4px;padding:1px 4px;margin-top:2px;word-break:break-all;line-height:1.4;}
  .kanzen-ico{font-size:10px;font-weight:800;color:var(--mint-deep);margin-left:3px;}
  /* 内勤メモ欄 */
  .staff-memo-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#FFFDF0;border-radius:10px;border:1.5px dashed #E8DFA0;margin-bottom:8px;}
  .staff-memo-label{font-size:11px;font-weight:800;color:#B5A030;white-space:nowrap;}
  .staff-memo-input{flex:1;padding:6px 10px;border-radius:9px;border:1.5px solid #E8DFA0;background:#fff;font-family:inherit;font-size:12px;color:var(--text);}
  .staff-memo-input:focus{outline:none;border-color:#C9A800;}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(74,85,96,.95);color:#fff;padding:11px 18px;border-radius:14px;font-size:13px;font-weight:700;z-index:10000;opacity:0;transition:all .3s;max-width:80%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  /* ページタブ */
  .page-tabs{display:flex;gap:4px;background:#F0F2F4;border-radius:12px;padding:4px;}
  .page-tab{padding:7px 14px;border:none;border-radius:9px;background:transparent;font-weight:800;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;}
  .page-tab.active{background:#fff;color:var(--mint-deep);box-shadow:0 2px 8px var(--shadow);}
  /* 人数確認 */
  .hc-tabs{display:flex;gap:6px;margin-bottom:14px;}
  /* ===== 人数確認 週テーブル ===== */
  .hc-table-title{font-size:16px;font-weight:900;color:var(--text);margin:18px 0 10px;display:flex;align-items:center;gap:8px;}
  .hc-table-sub{font-size:12px;color:var(--text2);font-weight:700;}
  .hc-table-wrap{overflow:auto;max-height:70vh;border-radius:16px;border:2px solid var(--pink-line);box-shadow:0 2px 12px rgba(232,106,155,.08);}
  .hc-table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px;background:#fff;}
  .hc-table thead th{
    background:linear-gradient(135deg,#5A6270,#3D4450);color:#fff;font-weight:800;font-size:12px;
    padding:11px 8px;text-align:center;white-space:nowrap;line-height:1.3;
    position:sticky;top:0;z-index:5;border-right:1px solid rgba(255,255,255,.18);
  }
  .hc-table thead th:first-child{border-top-left-radius:0;text-align:left;padding-left:14px;border-right:2px solid rgba(255,255,255,.35);}
  .hc-table thead th:last-child{border-right:none;}
  .hc-table thead th.hc-th-plan{border-left:2px solid rgba(255,255,255,.35);}
  .hc-th-date{min-width:96px;}
  .hc-th-plan{text-align:left!important;padding-left:14px!important;min-width:200px;}
  .hc-trow td{padding:10px 8px;text-align:center;border-bottom:1px solid #E6E6E6;border-right:1px solid #ECECEC;vertical-align:middle;}
  .hc-trow td:last-child{border-right:none;}
  /* 時間帯ブロック列に薄い交互の色 → 区切りを明確に */
  .hc-trow td:nth-child(2){background-color:rgba(143,217,192,.07);}
  .hc-trow td:nth-child(4){background-color:rgba(143,217,192,.07);}
  .hc-trow td:nth-child(6){background-color:rgba(255,143,184,.06);}
  .hc-trow{background:#fff;}
  .hc-trow:hover{background:#FFFAFC;}
  .hc-date-cell{text-align:left!important;padding-left:14px!important;font-weight:800;color:var(--text);white-space:nowrap;border-right:2px solid #D8D8D8!important;}
  .hc-zoom{cursor:pointer;font-size:13px;margin-left:3px;opacity:.7;}
  .hc-zoom:hover{opacity:1;}
  .hc-cell{font-weight:800;color:var(--mint-deep);white-space:nowrap;}
  .hc-cell-num{font-size:15px;color:var(--text);}
  .hc-cell-min{font-size:11px;color:var(--text2);font-weight:700;}
  .hc-cell-none{color:#CCC;}
  .hc-cell-short{background:#FFEEF0;border-radius:8px;}
  .hc-cell-short .hc-cell-num{color:#E0405A;}
  .hc-plan-cell{text-align:left!important;padding-left:14px!important;max-width:280px;line-height:1.9;border-left:2px solid #D8D8D8!important;}
  .hc-plan-chip{display:inline-block;background:var(--mint-soft);color:var(--mint-deep);border:1px solid var(--mint-line);border-radius:99px;padding:1px 8px;font-size:11px;font-weight:700;margin:1px 3px 1px 0;white-space:nowrap;}
  .hc-plan-none{color:#CCC;}
  .hc-closed-cell{color:var(--text2);font-weight:700;background:#F8F8F8;}
  .hc-memo-trow td{padding:0 14px 8px;border-bottom:2px solid #F5F5F5;background:#FAFAFA;}
  .hc-memo-trow .hc-date-memo{width:100%;padding:7px 11px;border:1.5px solid var(--line);border-radius:8px;font-size:12px;font-family:inherit;color:var(--text);background:#fff;box-sizing:border-box;}

<script>
/* ============================================================
   config.js — 定数とステータス定義（1箇所に集約）
   sakurashift v2
   ============================================================ */

/* ---------- GAS接続情報 ---------- */
const CONFIG = {
  GAS_URL: 'https://script.google.com/macros/s/AKfycbyvlg5JbvPsqxkdvztwRXYBqPkvWjknicwfm2ksTlIxIQ-7N1zd72cn09c6oSNIkIxw/exec',
  TOKEN: 'sakura2025shift',
  SAVE_DEBOUNCE_MS: 500,
  SAVE_RETRY: 3,
  AUTO_LOGOUT_MS: 30 * 60 * 1000,
  AUTO_LOGOUT_WARN_MS: 60 * 1000,
  NTF_POLL_MS: 2 * 60 * 1000,
};

/* ---------- 店舗・媒体 ---------- */
const STORES = ['記録簿','サクラムーン','ラナ鶯谷','ラナ錦糸町','ドレスガーデン','ピーチムーン','逆AF倶楽部','キューティー','18','極門','ヘブンラナ','ヘブンサクラ','(キュ)ぴゅあらば','(キュ)情報局','(極)ぴゅあらば','(極)情報局'];

const STORE_SHORT = {
  '記録簿':'記録簿','サクラムーン':'サクラ','ラナ鶯谷':'ラナ鶯','ラナ錦糸町':'ラナ錦糸',
  'ドレスガーデン':'ドレス','ピーチムーン':'ピーチ','逆AF倶楽部':'逆AF','キューティー':'キュティ',
  '18':'18','極門':'極門','ヘブンラナ':'ヘブンラナ','ヘブンサクラ':'ヘブンサクラ',
  '(キュ)ぴゅあらば':'(キュ)ぴゅ','(キュ)情報局':'(キュ)情報',
  '(極)ぴゅあらば':'(極)ぴゅ','(極)情報局':'(極)情報',
};

/* 新規キャスト追加時にデフォルトでオンにする店舗 */
const DEFAULT_STORES = ['記録簿','サクラムーン','ラナ鶯谷','ラナ錦糸町','ドレスガーデン','ピーチムーン','ヘブンラナ','ヘブンサクラ'];
/* 全キャスト必須・外せない店舗 */
const REQUIRED_STORES = ['記録簿'];

/* ---------- 時間帯（1時間ごと18項目：12時〜翌5時） ----------
   カウントルール：
   - 12〜28時：start <= h < end の人をカウント（退勤ちょうどは除く）
   - 29時（翌5時）：end===29 の人も含む（5時退勤はカウント対象）
   ---------------------------------------------------------- */
const TIME_ZONES = [
  {label:'12時',h:12},{label:'13時',h:13},{label:'14時',h:14},{label:'15時',h:15},
  {label:'16時',h:16},{label:'17時',h:17},{label:'18時',h:18},{label:'19時',h:19},
  {label:'20時',h:20},{label:'21時',h:21},{label:'22時',h:22},{label:'23時',h:23},
  {label:'24時',h:24},{label:'25時',h:25},{label:'26時',h:26},{label:'27時',h:27},
  {label:'28時',h:28},{label:'29時(翌5時)',h:29},
];

/* 時間hに出勤中かどうか判定 */
function isWorkingAt(shift, h){
  if(!shift || shift.start==null || shift.end==null) return false;
  if(h === 29) return shift.start <= 29 && shift.end >= 29; // 5時退勤も含む
  return shift.start <= h && h < shift.end; // 退勤ちょうどは除く
}

/* ---------- かな行（検索ジャンプ用） ---------- */
const KANA_GROUPS = [
  {label:'あ',chars:['あ','い','う','え','お']},
  {label:'か',chars:['か','き','く','け','こ','が','ぎ','ぐ','げ','ご']},
  {label:'さ',chars:['さ','し','す','せ','そ','ざ','じ','ず','ぜ','ぞ']},
  {label:'た',chars:['た','ち','つ','て','と','だ','ぢ','づ','で','ど']},
  {label:'な',chars:['な','に','ぬ','ね','の']},
  {label:'は',chars:['は','ひ','ふ','へ','ほ','ば','び','ぶ','べ','ぼ','ぱ','ぴ','ぷ','ぺ','ぽ']},
  {label:'ま',chars:['ま','み','む','め','も']},
  {label:'や',chars:['や','ゆ','よ']},
  {label:'ら',chars:['ら','り','る','れ','ろ']},
  {label:'わ',chars:['わ','を','ん']},
];

/* ---------- 営業時間デフォルト値 ---------- */
// dow: 0=日,1=月,2=火,3=水,4=木,5=金,6=土
const DEFAULT_BIZ_HOURS = {
  weekly: {
    0:{open:12,close:29}, 1:{open:12,close:22}, 2:{open:12,close:29},
    3:{open:12,close:29}, 4:{open:12,close:29}, 5:{open:12,close:29},
    6:{open:12,close:29},
  },
  special: {},   // {'2026-07-04':{open:15,close:25}} など
  closed:  [],   // ['2026-01-01'] など
};

/* ---------- 時間帯別最低人数デフォルト（1時間ごと18項目） ---------- */
const DEFAULT_MIN_PEOPLE = {
  h12:2, h13:2, h14:2, h15:2, h16:2, h17:2,
  h18:3, h19:3, h20:3,
  h21:4, h22:4, h23:4,
  h24:3, h25:3, h26:2, h27:2, h28:2, h29:2,
};

/* 時間帯キー変換 */
function tzMinKey(tz){ return `h${tz.h}`; }

/* ---------- 人数確認ブロック（募集バナーと完全一致） ----------
   キャスト側の出勤募集バナーと同じ区切り。数字が食い違わないよう共通化。
   各ブロックは「ブロック内で最も不足している時刻」の 人数/必要数 を表示。 */
const HC_BLOCKS = [
  { key:'noon',    label:'12-15', hours:[12,13,14,15] },
  { key:'evening', label:'16-19', hours:[16,17,18,19] },
  { key:'night',   label:'20-23', hours:[20,21,22,23] },
  { key:'late',    label:'24-27', hours:[24,25,26,27] },
];
// 5時ラスト（end>=29）は専用集計

// あるブロックの「最も不足している時刻」の情報を返す（募集ロジックと同一）
function hcBlockInfo(block, ds, wk, castList, settings){
  const mp = getMinPeople(settings);
  const biz = getBizOfDay(ds, settings);
  if(!biz) return null;
  let worstShort=-Infinity, wCount=0, wMin=0, hasData=false;
  block.hours.forEach(h=>{
    if(h < biz.open || h >= biz.close) return;
    const min = mp['h'+h] || 0;
    if(!min) return;
    hasData=true;
    const cnt = castList.filter(c=>{
      const w=Store.getWeek(c.name,wk);
      return w && w.shifts && w.shifts[ds] && isWorkingAt(w.shifts[ds], h);
    }).length;
    const short = min - cnt;
    if(short > worstShort){ worstShort=short; wCount=cnt; wMin=min; }
  });
  if(!hasData) return null;
  return { count:wCount, min:wMin, shortage:Math.max(worstShort,0) };
}

// 5時ラスト（end>=29）の集計
function hcLastInfo(ds, wk, castList, settings){
  const mp = getMinPeople(settings);
  const biz = getBizOfDay(ds, settings);
  if(!biz || biz.close < 29) return null;
  const min = mp['h29'] || 0;
  if(!min) return null;
  const cnt = castList.filter(c=>{
    const w=Store.getWeek(c.name,wk);
    return w && w.shifts && w.shifts[ds] && w.shifts[ds].end>=29;
  }).length;
  return { count:cnt, min:min, shortage:Math.max(min-cnt,0) };
}

// 12時出勤（start<=12）の集計 ※必要数はh12を流用
function hcNoonStartInfo(ds, wk, castList, settings){
  const mp = getMinPeople(settings);
  const biz = getBizOfDay(ds, settings);
  if(!biz) return null;
  const min = mp['h12'] || 0;
  const cnt = castList.filter(c=>{
    const w=Store.getWeek(c.name,wk);
    return w && w.shifts && w.shifts[ds] && w.shifts[ds].start!=null && w.shifts[ds].start<=12;
  }).length;
  return { count:cnt, min:min, shortage: min>0?Math.max(min-cnt,0):0 };
}
function getBizHours(settings){
  const bh = (settings && settings.businessHours) || {};
  return {
    weekly:  bh.weekly  || DEFAULT_BIZ_HOURS.weekly,
    special: bh.special || {},
    closed:  bh.closed  || [],
  };
}
function getMinPeople(settings){
  return (settings && settings.minPeople) || DEFAULT_MIN_PEOPLE;
}
function getBizOfDay(ds, settings){
  const bh = getBizHours(settings);
  if(bh.closed.includes(ds)) return null; // 休業日
  const special = bh.special[ds];
  if(special) return special;
  const dow = new Date(ds+'T12:00:00').getDay();
  return bh.weekly[dow] || {open:12,close:29};
}

/* ---------- 祝日 ---------- */
const DOWNAMES = ['月','火','水','木','金','土','日'];
const AVC = ['av-0','av-1','av-2','av-3','av-4'];

/* ============================================================
   ステータス定義（Q4の決定：1箇所に集約・判定は関数経由）
   ============================================================ */
const STATUS = {
  unsubmitted:      { label:'未提出',     badge:'badge-gray',   locked:false, inbox:false, editable:true  },
  waiting:          { label:'提出済み',   badge:'badge-warning',locked:false, inbox:true,  editable:true  }, // キャスト編集可能
  inputting:        { label:'内勤入力中', badge:'badge-info',   locked:true,  inbox:false, editable:false }, // 内勤が触ったらロック
  confirmed:        { label:'確定',       badge:'badge-success',locked:true,  inbox:false, editable:false },
  change_requested: { label:'変更申請中', badge:'badge-pink',   locked:true,  inbox:true,  editable:false },
  change_inputting: { label:'変更入力中', badge:'badge-info',   locked:true,  inbox:false, editable:false },
  change_confirmed: { label:'変更確定',   badge:'badge-success',locked:true,  inbox:false, editable:false },
};

/* ---------- ステータス遷移ルール ---------- */
const TRANSITIONS = {
  unsubmitted:      ['waiting'],
  waiting:          ['inputting','confirmed','unsubmitted'], // キャストが取り下げ可能
  inputting:        ['confirmed','waiting'],
  confirmed:        ['change_requested'],
  change_requested: ['change_inputting','confirmed'],
  change_inputting: ['change_confirmed','confirmed'],
  change_confirmed: ['change_requested'],
};

/* ---------- ステータス判定関数（ハードコード禁止） ---------- */
function statusLabel(s){ return (STATUS[s]||{}).label || s || '未提出'; }
function statusBadge(s){ return (STATUS[s]||{}).badge || 'badge-gray'; }

}

/* ============================================================
   utils.js — 共通ユーティリティ（週キー計算・日付・フォーマット）
   sakurashift v2
   純粋関数のみ。状態を持たない・副作用なし。
   ============================================================ */

function ymd(d){
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function weekKeyOf(dateOrStr){
  let d;
  if(typeof dateOrStr === 'string'){
    const [y,m,day] = dateOrStr.split('-').map(Number);
    d = new Date(y, m-1, day, 12, 0, 0);
  } else {
    d = new Date(dateOrStr);
    d.setHours(12,0,0,0);
  }
  const dow = d.getDay();
  const diffToMonday = dow===0 ? -6 : 1-dow;
  d.setDate(d.getDate() + diffToMonday);
  return ymd(d);
}

function weekDates(weekKey){
  const [y,m,day] = weekKey.split('-').map(Number);
  const monday = new Date(y, m-1, day, 12, 0, 0);
  const out = [];
  for(let i=0;i<7;i++){
    const d = new Date(monday);
    d.setDate(monday.getDate()+i);
    out.push(ymd(d));
  }
  return out;
}

function currentWeekKey(){ return weekKeyOf(new Date()); }
function nextWeekKey(n=1){
  const [y,m,day] = currentWeekKey().split('-').map(Number);
  const d = new Date(y, m-1, day, 12,0,0);
  d.setDate(d.getDate() + 7*n);
  return ymd(d);
}

function weekLabel(weekKey){
  const ds = weekDates(weekKey);
  const f = (s)=>{ const d=new Date(s+'T12:00:00'); return `${d.getMonth()+1}/${d.getDate()}(${DOWNAMES[(d.getDay()+6)%7]})`; };
  return `${f(ds[0])} 〜 ${f(ds[6])}`;
}

function relativeWeekLabel(weekKey){
  const cur = currentWeekKey();
  if(weekKey===cur) return '今週';
  const [y1,m1,d1]=cur.split('-').map(Number);
  const [y2,m2,d2]=weekKey.split('-').map(Number);
  const diffDays = Math.round((new Date(y2,m2-1,d2) - new Date(y1,m1-1,d1)) / 86400000);
  const weeks = Math.round(diffDays/7);
  if(weeks===1) return '来週';
  if(weeks>=2 && weeks<=8) return `${weeks}週間後`;
  if(weeks===-1) return '先週';
  return weekLabel(weekKey);
}

function weekTouchesMonth(weekKey, yearMonth){
  return weekDates(weekKey).some(ds => ds.slice(0,7)===yearMonth);
}

function weeksInMonth(yearMonth){
  // A方式：週の月曜日（週キー）が属する月の週だけを返す（月またぎ週は片方の月にだけ出す）
  const [y,m] = yearMonth.split('-').map(Number);
  const first = new Date(y, m-1, 1, 12,0,0);
  const last  = new Date(y, m,   0, 12,0,0);
  const out = new Set();
  for(let d=new Date(first); d<=last; d.setDate(d.getDate()+1)){
    const wk = weekKeyOf(ymd(d));
    // 週キー（月曜日）が yearMonth と同じ月のものだけ採用
    if(wk.slice(0,7) === yearMonth) out.add(wk);
  }
  return [...out].sort();
}

function fmtHour(h){
  if(h==null) return '';
  const hh = Math.floor(h);
  const mm = (h%1)*60;
  return `${hh}:${String(mm).padStart(2,'0')}`;
}
function fmtRange(start,end){
  if(start==null||end==null) return '休';
  return `${fmtHour(start)}〜${fmtHour(end)}`;
}

function fmtShiftHour(h){ return h>=25 ? (h-24) : h; }
function fmtShift(start,end){
  if(start==null) return 'お休み';
  return fmtShiftHour(start)+'-'+fmtShiftHour(end);
}

function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function nowIso(){ return new Date().toISOString(); }

function kanaGroupOf(name){
  const first = (name||'')[0];
  for(const g of KANA_GROUPS){ if(g.chars.includes(first)) return g.label; }
  return 'その他';
}


/* ============================================================
   validate.js — バリデーション（A4）
   sakurashift v2
   ============================================================ */

function validateShift(ds, shift){
  if(shift==null) return {ok:true};
  const {start,end} = shift;
  if(start==null && end==null) return {ok:true};
  if(start==null || end==null) return {ok:false, error:'VALIDATION:開始と終了の両方が必要'};
  if(typeof start!=='number' || typeof end!=='number') return {ok:false, error:'VALIDATION:時刻は数値'};
  if(start >= end) return {ok:false, error:'VALIDATION:開始<終了でない('+start+'>='+end+')'};
  if(start < 0 || end > 30) return {ok:false, error:'VALIDATION:時刻が範囲外'};
  return {ok:true};
}

function validateDateInWeek(ds, weekKey){
  if(weekKeyOf(ds) !== weekKey){
    return {ok:false, error:'VALIDATION:日付'+ds+'は週'+weekKey+'に属さない'};
  }
  return {ok:true};
}

function validateStatus(status){
  if(!STATUS[status]) return {ok:false, error:'VALIDATION:未定義のステータス('+status+')'};
  return {ok:true};
}

function validateCastExists(castName, castList){
  if(!castList || !castList.some(c=>c.name===castName)){
    return {ok:false, error:'VALIDATION:存在しないキャスト('+castName+')'};
  }
  return {ok:true};
}

function validateWeekData(cast, weekKey, w){
  const s = validateStatus(w.status);
  if(!s.ok) return s;

  for(const ds in (w.shifts||{})){
    const inWeek = validateDateInWeek(ds, weekKey);
    if(!inWeek.ok) return inWeek;
    const sh = validateShift(ds, w.shifts[ds]);
    if(!sh.ok) return sh;
  }

  if(w.changeRequest){
    for(const ds in w.changeRequest){
      const inWeek = validateDateInWeek(ds, weekKey);
      if(!inWeek.ok) return inWeek;
      const ch = w.changeRequest[ds];
      if(ch.type==='time'){
        const sh = validateShift(ds, {start:ch.start, end:ch.end});
        if(!sh.ok) return sh;
      }
    }
  }

  let warning = null;
  if(w.status==='confirmed' && Object.keys(w.shifts||{}).length===0){
    warning = 'confirmedだがシフトが空';
  }

  return {ok:true, warning};
}


/* ============================================================
   store.js — 状態管理（唯一の状態保管庫）
   sakurashift v2
   ============================================================ */

function emptyWeek(){
  return {
    status: 'unsubmitted',
    shifts: {},
    checks: {},
    memo: {},
    changeRequest: null,
    submittedAt: null,
    checkedBy: null,
    confirmedBy: null,
    updatedAt: null,
    updatedBy: null,
  };
}

const Store = (function(){
  let state = {
    weeks: {},
    castList: [],
    staffList: [],
    castStores: {},
    castAliases: {},
    notices: [],
    minPeople: {},
    settings: {},
    currentUser: null,
    currentStaffName: '',
  };

  const dirty = new Set();
  let _masterDirty = false;
  const listeners = [];
  const auditQueue = [];

  function _audit(action, cast, wk, before, after, by, role){
    auditQueue.push({
      at: nowIso(),
      by: by || (state.currentUser && state.currentUser.name) || state.currentStaffName || '',
      role: role || (state.currentUser && state.currentUser.type) || '',
      action, castName:cast, weekKey:wk,
      before: before||null, after: after||null,
    });
  }
  function _statusSnapshot(w){ return w ? {status:w.status, shiftDays:Object.keys(w.shifts||{}).length} : null; }

  function getWeek(cast, wk){
    return (state.weeks[cast] && state.weeks[cast][wk]) || null;
  }
  function getWeekOrEmpty(cast, wk){
    return getWeek(cast,wk) || emptyWeek();
  }
  function getCastWeeks(cast){
    return state.weeks[cast] || {};
  }
  function getState(){ return state; }

  function _ensureWeek(cast, wk){
    if(!state.weeks[cast]) state.weeks[cast] = {};
    if(!state.weeks[cast][wk]) state.weeks[cast][wk] = emptyWeek();
    return state.weeks[cast][wk];
  }

  function _touch(cast, wk, by){
    const w = _ensureWeek(cast, wk);
    w.updatedAt = nowIso();
    w.updatedBy = by || (state.currentUser && state.currentUser.name) || '';
    dirty.add(cast + '|' + wk);
  }

  function dispatch(action, payload){
    const p = payload || {};
    switch(action){

      case 'LOAD_WEEKS': {
        for(const cast in p.weeks){
          if(!state.weeks[cast]) state.weeks[cast] = {};
          for(const wk in p.weeks[cast]){
            state.weeks[cast][wk] = p.weeks[cast][wk];
          }
        }
        break;
      }
      case 'LOAD_MASTER': {
        if(p.castList) state.castList = p.castList;
        if(p.staffList) state.staffList = p.staffList;
        if(p.notices) state.notices = p.notices;
        if(p.minPeople) state.minPeople = p.minPeople;
        if(p.settings) state.settings = p.settings;
        if(p.castStores) state.castStores = p.castStores;
        if(p.castAliases) state.castAliases = p.castAliases;
        // 初回ロード以外（settingsのみ更新など）はdirtyにしない
        // → settings_app側でmarkUnsaved()を呼ぶので_masterDirtyはここではセットしない
        break;
      }

      case 'ADD_CAST': {
        if(p.role && !can(p.role,'editMaster') && !can(p.role,'editAllShifts')) return {error:'PERMISSION'};
        if(!p.name) return {error:'VALIDATION:名前が空'};
        if(state.castList.some(c=>c.name===p.name)) return {error:'VALIDATION:同名のキャストが存在'};
        state.castList.push({name:p.name, pw:p.pw||''});
        if(!state.castStores) state.castStores={};
        state.castStores[p.name] = [...DEFAULT_STORES];
        _masterDirty = true;
        break;
      }
      case 'REMOVE_CAST': {
        if(p.role && !can(p.role,'editMaster') && !can(p.role,'editAllShifts')) return {error:'PERMISSION'};
        state.castList = state.castList.filter(c=>c.name!==p.name);
        _masterDirty = true;
        break;
      }
      case 'UPDATE_CAST_PW': {
        if(p.role && !can(p.role,'editMaster') && !can(p.role,'editAllShifts')) return {error:'PERMISSION'};
        const c = state.castList.find(x=>x.name===p.name);
        if(c) c.pw = p.pw;
        _masterDirty = true;
        break;
      }
      case 'TOGGLE_CAST_STORE': {
        if(p.role && !can(p.role,'editMaster') && !can(p.role,'editAllShifts')) return {error:'PERMISSION'};
        if(REQUIRED_STORES.includes(p.store)) return {error:'VALIDATION:必須店舗は外せません'};
        if(!state.castStores) state.castStores={};
        if(!state.castStores[p.cast]) state.castStores[p.cast]=[];
        const arr = state.castStores[p.cast];
        const i = arr.indexOf(p.store);
        if(i>=0) arr.splice(i,1); else arr.push(p.store);
        _masterDirty = true;
        break;
      }
      case 'ADD_STAFF': {
        if(p.role && !can(p.role,'editMaster') && !can(p.role,'editAllShifts')) return {error:'PERMISSION'};
        if(!p.name) return {error:'VALIDATION:名前が空'};
        if(state.staffList.some(s=>s.name===p.name)) return {error:'VALIDATION:同名の内勤が存在'};
        state.staffList.push({name:p.name, color:p.color||'#5FD0A0'});
        _masterDirty = true;
        break;
      }
      case 'REMOVE_STAFF': {
        if(p.role && !can(p.role,'editMaster') && !can(p.role,'editAllShifts')) return {error:'PERMISSION'};
        state.staffList = state.staffList.filter(s=>s.name!==p.name);
        _masterDirty = true;
        break;
      }
      case 'UPDATE_STAFF': {
        if(p.role && !can(p.role,'editMaster') && !can(p.role,'editAllShifts')) return {error:'PERMISSION'};
        const s = state.staffList.find(x=>x.name===p.name);
        if(s){ if(p.newName!=null)s.name=p.newName; if(p.color!=null)s.color=p.color; }
        _masterDirty = true;
        break;
      }
      case 'SET_NOTICE': {
        if(p.role && !can(p.role,'editAllShifts') && !can(p.role,'editMaster')) return {error:'PERMISSION'};
        state.settings = state.settings || {};
        state.settings.notice = p.notice;
        _masterDirty = true;
        break;
      }
      case 'SET_CAST_ALIAS': {
        if(p.role && !can(p.role,'editAllShifts') && !can(p.role,'editMaster')) return {error:'PERMISSION'};
        if(!state.castAliases) state.castAliases = {};
        if(!state.castAliases[p.cast]) state.castAliases[p.cast] = {};
        if(p.alias) state.castAliases[p.cast][p.store] = p.alias;
        else delete state.castAliases[p.cast][p.store];
        _masterDirty = true;
        break;
      }

      case 'SET_USER': { state.currentUser = p.user; break; }
      case 'SET_STAFF_NAME': { state.currentStaffName = p.name; break; }

      case 'SET_SHIFT': {
        const wk = weekKeyOf(p.ds);
        const w = _ensureWeek(p.cast, wk);
        if(!canEditByStatus(w.status)) return {error:'LOCKED'};
        if(p.start!=null){
          const v = validateShift(p.ds, {start:p.start, end:p.end});
          if(!v.ok) return {error:v.error};
        }
        if(p.start==null){ delete w.shifts[p.ds]; }
        else { w.shifts[p.ds] = {start:p.start, end:p.end, memo:p.memo||''}; }
        _touch(p.cast, wk, p.cast);
        break;
      }

      // ① 日付ごと備考（キャストが書く・提出前のみ）
      case 'SET_DAY_MEMO': {
        const wk = weekKeyOf(p.ds);
        const w = _ensureWeek(p.cast, wk);
        if(isLocked(w.status)) return {error:'LOCKED'};
        if(!w.dayMemos) w.dayMemos = {};
        if(p.memo){ w.dayMemos[p.ds] = p.memo; }
        else { delete w.dayMemos[p.ds]; }
        _touch(p.cast, wk, p.cast);
        break;
      }

      // ③ 完全終了フラグ（キャストが書く・提出前のみ）
      case 'SET_KANZEN': {
        const wk = weekKeyOf(p.ds);
        const w = _ensureWeek(p.cast, wk);
        if(isLocked(w.status)) return {error:'LOCKED'};
        if(!w.kanzen) w.kanzen = {};
        if(p.value){ w.kanzen[p.ds] = true; }
        else { delete w.kanzen[p.ds]; }
        _touch(p.cast, wk, p.cast);
        break;
      }

      // ② 内勤メモ（内勤だけが書く）
      case 'SET_STAFF_MEMO': {
        const w = _ensureWeek(p.cast, p.wk);
        w.staffMemo = p.memo || '';
        _touch(p.cast, p.wk, state.currentStaffName);
        break;
      }

      // 長期休暇リクエスト送信（キャスト→内勤）
      case 'REQUEST_VACATION': {
        // p = {cast, dates:['2026-07-01',...], memo:'出稼ぎ 東京 〇〇店'}
        // 日付ごとに所属週のvacationRequestにセット
        const byWk = {};
        (p.dates||[]).forEach(ds=>{
          const wk = weekKeyOf(ds);
          if(!byWk[wk]) byWk[wk] = [];
          byWk[wk].push(ds);
        });
        for(const wk in byWk){
          const w = _ensureWeek(p.cast, wk);
          if(!w.vacationRequests) w.vacationRequests = [];
          // 重複除去してプッシュ
          byWk[wk].forEach(ds=>{
            if(!w.vacationRequests.find(r=>r.ds===ds)){
              w.vacationRequests.push({ds, memo:p.memo||'', requestedAt:nowIso()});
            }
          });
          _touch(p.cast, wk, p.cast);
        }
        break;
      }

      // 長期休暇受理（内勤）→ vacation フラグをセット
      case 'ACCEPT_VACATION': {
        // p = {cast, dates, memo, by}
        const byWk2 = {};
        (p.dates||[]).forEach(ds=>{
          const wk = weekKeyOf(ds);
          if(!byWk2[wk]) byWk2[wk] = [];
          byWk2[wk].push(ds);
        });
        for(const wk in byWk2){
          const w = _ensureWeek(p.cast, wk);
          if(!w.vacations) w.vacations = {};
          byWk2[wk].forEach(ds=>{
            w.vacations[ds] = {memo:p.memo||'', acceptedBy:p.by||state.currentStaffName, acceptedAt:nowIso()};
          });
          // vacationRequestsから該当日を削除
          if(w.vacationRequests){
            w.vacationRequests = w.vacationRequests.filter(r=>!byWk2[wk].includes(r.ds));
          }
          _touch(p.cast, wk, p.by||state.currentStaffName);
        }
        break;
      }

      // 長期休暇却下（内勤）→ vacationRequestsを削除
      case 'REJECT_VACATION': {
        const byWk3 = {};
        (p.dates||[]).forEach(ds=>{
          const wk = weekKeyOf(ds);
          if(!byWk3[wk]) byWk3[wk] = [];
          byWk3[wk].push(ds);
        });
        for(const wk in byWk3){
          const w = _ensureWeek(p.cast, wk);
          if(w.vacationRequests){
            w.vacationRequests = w.vacationRequests.filter(r=>!byWk3[wk].includes(r.ds));
          }
          _touch(p.cast, wk, p.by||state.currentStaffName);
        }
        break;
      }

      // 長期休暇取り消し（内勤）→ vacationsを削除
      case 'CANCEL_VACATION': {
        const byWk4 = {};
        (p.dates||[]).forEach(ds=>{
          const wk = weekKeyOf(ds);
          if(!byWk4[wk]) byWk4[wk] = [];
          byWk4[wk].push(ds);
        });
        for(const wk in byWk4){
          const w = _ensureWeek(p.cast, wk);
          if(w.vacations){
            byWk4[wk].forEach(ds=>{ delete w.vacations[ds]; });
          }
          _touch(p.cast, wk, p.by||state.currentStaffName);
        }
        break;
      }

      case 'SUBMIT_WEEK': {
        const w = _ensureWeek(p.cast, p.wk);
        if(!canTransition(w.status, 'waiting')) return {error:'BAD_TRANSITION'};
        const before = _statusSnapshot(w);
        w.status = 'waiting';
        w.submittedAt = nowIso();
        _touch(p.cast, p.wk, p.cast);
        _audit('SUBMIT_WEEK', p.cast, p.wk, before, _statusSnapshot(w));
        break;
      }

      case 'SET_CHECK': {
        const w = _ensureWeek(p.cast, p.wk);
        const ckey = p.ds + '_' + p.media;
        if(p.checked){ w.checks[ckey] = {checked:true, by:p.by||'', color:p.color||'', at:new Date().toISOString()}; }
        else { delete w.checks[ckey]; }
        if(w.status==='waiting' && canTransition('waiting','inputting')) w.status='inputting';
        _touch(p.cast, p.wk, p.by || (state.currentStaffName));
        break;
      }

      case 'CONFIRM_WEEK': {
        const w = _ensureWeek(p.cast, p.wk);
        const before = _statusSnapshot(w);
        if(w.status==='change_inputting'){
          _applyChangeRequest(w, p.cast, p.wk);
          w.status = 'change_confirmed';
        } else {
          if(!canTransition(w.status,'confirmed')) return {error:'BAD_TRANSITION'};
          w.status = 'confirmed';
        }
        w.confirmedBy = p.by || state.currentStaffName || '';
        _touch(p.cast, p.wk, p.by || state.currentStaffName);
        _audit('CONFIRM_WEEK', p.cast, p.wk, before, _statusSnapshot(w), p.by || state.currentStaffName, 'staff');
        break;
      }

      case 'REQUEST_CHANGE': {
        const w = _ensureWeek(p.cast, p.wk);
        if(!canTransition(w.status,'change_requested')) return {error:'BAD_TRANSITION'};
        w.changeRequest = p.changes;
        w.status = 'change_requested';
        _touch(p.cast, p.wk, p.cast);
        break;
      }

      case 'ACCEPT_CHANGE': {
        const w = _ensureWeek(p.cast, p.wk);
        if(!canTransition(w.status,'change_inputting')) return {error:'BAD_TRANSITION'};
        const before = _statusSnapshot(w);
        w.status = 'change_inputting';
        _touch(p.cast, p.wk, state.currentStaffName);
        _audit('ACCEPT_CHANGE', p.cast, p.wk, before, _statusSnapshot(w), p.by || state.currentStaffName, 'staff');
        break;
      }

      case 'REJECT_CHANGE': {
        const w = _ensureWeek(p.cast, p.wk);
        const before = _statusSnapshot(w);
        w.changeRequest = null;
        w.status = 'confirmed';
        _touch(p.cast, p.wk, state.currentStaffName);
        _audit('REJECT_CHANGE', p.cast, p.wk, before, _statusSnapshot(w), p.by || state.currentStaffName, 'staff');
        break;
      }

      case 'DELETE_WEEK': {
        if(p.role && !can(p.role, 'deleteData')) return {error:'PERMISSION'};
        const w = _ensureWeek(p.cast, p.wk);
        const before = _statusSnapshot(w);
        w.deletedAt = nowIso();
        w.deletedBy = p.by || state.currentStaffName || '';
        _touch(p.cast, p.wk, p.by);
        _audit('DELETE_WEEK', p.cast, p.wk, before, {deleted:true}, p.by, p.role);
        break;
      }
      case 'RESTORE_WEEK': {
        const w = _ensureWeek(p.cast, p.wk);
        delete w.deletedAt;
        delete w.deletedBy;
        _touch(p.cast, p.wk, p.by);
        _audit('RESTORE_WEEK', p.cast, p.wk, {deleted:true}, _statusSnapshot(w));
        break;
      }

      case 'CLEAR_DIRTY': {
        if(p.key) dirty.delete(p.key);
        else dirty.clear();
        break;
      }

      // ★ 通知用：週データへの通知フィールド追加
      case 'ADD_NOTIFICATION': {
        // p={role, castName, type, message}
        // GAS側に送るだけ（Storeは保持しない）
        break;
      }

      default:
        return {error:'UNKNOWN_ACTION:'+action};
    }
    _notify();
    return {ok:true};
  }

  function _applyChangeRequest(w, cast, wk){
    if(!w.changeRequest) return;
    for(const ds in w.changeRequest){
      const ch = w.changeRequest[ds];
      if(ch.type==='holiday'){
        delete w.shifts[ds];
      } else {
        w.shifts[ds] = {start:ch.start, end:ch.end, memo:(w.shifts[ds]&&w.shifts[ds].memo)||''};
      }
      for(const ckey in w.checks){
        if(ckey.indexOf(ds+'_')===0) delete w.checks[ckey];
      }
    }
    w.changeRequest = null;
  }

  function canEditByStatus(status){
    // unsubmitted（未提出）・waiting（提出済みだが内勤未操作）・change_inputting（変更受理後）は編集可能
    return status==='unsubmitted' || status==='waiting' || status==='change_inputting' || isEditable(status);
  }

  function subscribe(fn){ listeners.push(fn); }
  function _notify(){ listeners.forEach(fn=>{ try{fn(state);}catch(e){console.error(e);} }); }

  function getDirtyKeys(){ return [...dirty]; }
  function getDirtyWeek(key){
    const [cast,wk] = key.split('|');
    return { cast, wk, data: getWeek(cast,wk) };
  }

  function getAuditQueue(){ return [...auditQueue]; }
  function clearAuditQueue(){ auditQueue.length = 0; }

  function getCastList(){ return state.castList; }
  function getStaffList(){ return state.staffList; }
  function getCastStores(cast){ return (state.castStores && state.castStores[cast]) || []; }
  function getCastAlias(cast, store){ return (state.castAliases && state.castAliases[cast] && state.castAliases[cast][store]) || ''; }
  function getCastAliases(cast){ return (state.castAliases && state.castAliases[cast]) || {}; }
  function getSettings(){ return state.settings || {}; }
  function isMasterDirty(){ return _masterDirty; }
  function clearMasterDirty(){ _masterDirty = false; }
  function getMaster(){
    return {
      castList: state.castList,
      staffList: state.staffList,
      castStores: state.castStores,
      castAliases: state.castAliases,
      notices: state.notices,
      settings: state.settings,
    };
  }

  return {
    dispatch, subscribe,
    getWeek, getWeekOrEmpty, getCastWeeks, getState,
    getDirtyKeys, getDirtyWeek,
    getAuditQueue, clearAuditQueue,
    getCastList, getStaffList, getCastStores, getCastAlias, getCastAliases, getSettings,
    isMasterDirty, clearMasterDirty, getMaster,
    emptyWeek,
  };
})();

// 監査ログを読みやすい文字列に変換
function _auditDetail(a){
  const b=a.before||{}, af=a.after||{};
  switch(a.action){
    case 'CONFIRM_WEEK': return 'シフトを確定';
    case 'ACCEPT_CHANGE': return '変更リクエストを受理';
    case 'REJECT_CHANGE': return '変更リクエストを却下';
    case 'DELETE_WEEK': return 'シフトを削除';
    case 'DELETE_CAST': return 'キャストを削除（退店）';
    case 'RESTORE_WEEK': return 'シフトを復元';
    case 'SUBMIT_WEEK': return 'シフトを提出';
    case 'CAST_SUBMIT': return 'シフトを提出';
    default: return a.action;
  }
}

const StaffGas = {
  // ★ リトライ付きfetch（GAS応答の一時的な不安定さに対応）
  _showBusyMsg(){
    try{
      const lt=document.getElementById('loadingText');
      if(lt) lt.textContent='🌸 サーバーが混雑しています。少々お待ちください…';
      const cl=document.querySelector('.cal-loading');
      if(cl) cl.innerHTML='<span class="spinner"></span>🌸 混雑しています。少々お待ちください…';
    }catch(_){}
  },
  async _fetchWithRetry(url, options, maxRetries=2){
    let lastErr;
    for(let attempt=0; attempt<=maxRetries; attempt++){
      // 3秒返らなければ「混雑中」案内を出す（リクエストは切らずに待つ）
      const busyTimer = setTimeout(()=>this._showBusyMsg(), 3000);
      try{
        const ctrl = new AbortController();
        const timer = setTimeout(()=>ctrl.abort(), 40000);
        const res = await fetch(url, Object.assign({}, options, {signal:ctrl.signal}));
        clearTimeout(timer);
        clearTimeout(busyTimer);
        const text = await res.text();
        if(text.trim().startsWith('<')){ throw new Error('GAS_HTML_ERROR'); }
        return JSON.parse(text);
      }catch(e){
        clearTimeout(busyTimer);
        lastErr = e;
        if(attempt < maxRetries){
          // リトライ中は「混雑中」メッセージに切り替え
          try{
            const lt=document.getElementById('loadingText');
            if(lt) lt.textContent='サーバーが混雑しています。再試行中…';
            const cl=document.querySelector('.cal-loading');
            if(cl) cl.innerHTML='<span class="spinner"></span>🌸 混雑中、再試行しています…';
          }catch(_){}
          await new Promise(r=>setTimeout(r, 1000*(attempt+1)));
        }
      }
    }
    throw lastErr;
  },
  async _get(params){
    const sess = sessionStorage.getItem('staffSession') || '';
    const p = Object.assign({token:CONFIG.TOKEN, session:sess, _t:Date.now()}, params);
    const qs = new URLSearchParams(p).toString();
    return this._fetchWithRetry(CONFIG.GAS_URL + '?' + qs, {});
  },
  async _post(params){
    const buildBody = ()=>{
      const body = new FormData();
      for(const k in params) body.append(k, params[k]);
      body.append('token', CONFIG.TOKEN);
      body.append('session', sessionStorage.getItem('staffSession') || '');
      return body;
    };
    // 冪等な操作のみリトライ（saveWeek/saveMaster/通知系）
    const idempotent = ['saveWeek','saveMaster','addNotification','sendEmail','saveStaffNotes','saveRecruitInfo'].includes(params.action);
    const retries = idempotent ? 2 : 0;
    return this._fetchWithRetry(CONFIG.GAS_URL, {method:'POST', body:buildBody()}, retries);
  },
  async loadMaster(){
    try{
      const r = await this._get({action:'loadMaster'});
      if(r && r.master) Store.dispatch('LOAD_MASTER', r.master);
      return r && r.master;
    }catch(e){ console.warn('マスタ読込エラー',e); return null; }
  },
  async loadMonthAll(yearMonth){
    const weeks = weeksInMonth(yearMonth);
    try{
      const r = await this._get({action:'loadAllMonth', weeks:weeks.join(',')});
      if(r && r.weeks){ Store.dispatch('LOAD_WEEKS', {weeks:r.weeks}); }
      return true;
    }catch(e){ console.warn('月読込エラー',e); return false; }
  },
  async loadAllWeeks(){
    try{
      // ★ 軽量化：直近3ヶ月分の週だけ読む（データ増加に強い）
      const d=new Date(); d.setMonth(d.getMonth()-3);
      // 3ヶ月前が属する週の月曜を求める
      const dow=d.getDay(); const diff=dow===0?-6:1-dow;
      d.setDate(d.getDate()+diff);
      const sinceWk=ymd(d);
      const r = await this._get({action:'loadAllWeeks', sinceWk});
      if(r && r.weeks){ Store.dispatch('LOAD_WEEKS', {weeks:r.weeks}); }
      return true;
    }catch(e){ console.warn('全週読込エラー',e); return false; }
  },
  async flushNow(){
    const keys = Store.getDirtyKeys();
    let allOk=true;
    for(const key of keys){
      const {cast,wk,data}=Store.getDirtyWeek(key);
      if(!data){ Store.dispatch('CLEAR_DIRTY',{key}); continue; }
      try{
        const resp=await this._post({action:'saveWeek',cast,wk,data:JSON.stringify(data)});
        if(resp&&resp.success) Store.dispatch('CLEAR_DIRTY',{key});
        else allOk=false;
      }catch(e){ allOk=false; console.warn('保存エラー',key,e); }
    }
    // 操作ログをGASに送信（確定・変更受理・削除など）
    try{
      const audits = Store.getAuditQueue();
      if(audits.length>0){
        for(const a of audits){
          const detail = _auditDetail(a);
          this._post({action:'addLog', type:a.action, cast:a.castName||'', week:a.weekKey||'', detail, by:a.by||''}).catch(()=>{});
        }
        Store.clearAuditQueue();
      }
    }catch(e){ /* ログ送信失敗は保存を妨げない */ }
    return allOk;
  },
  // 通知送信（キャストへ）
  async notify(castName, type, message){
    try{
      await this._post({action:'addNotification', role:'cast', castName, type, message});
      // メール送信（キャストへ：メールアドレス未登録なら無視される）
      this._post({action:'sendEmail', toRole:'cast', toCast:castName,
        subject:'【サクラシフト】'+message,
        htmlBody:'<div style="font-family:-apple-system,sans-serif;padding:20px;max-width:480px;margin:0 auto">'
          +'<div style="background:linear-gradient(135deg,#A7E8C8,#5FD0A0);border-radius:14px;padding:16px 20px;margin-bottom:18px">'
          +'<span style="font-size:22px">🌸</span>'
          +'<span style="font-size:16px;font-weight:800;color:#fff;margin-left:10px">サクラシフト</span>'
          +'</div>'
          +'<p style="font-size:15px;color:#4A5560;margin:0 0 12px">'+castName+'さん、</p>'
          +'<div style="background:#F0FBF4;border-radius:12px;padding:14px 16px;font-size:14px;color:#4A5560;margin-bottom:18px">'+message+'</div>'
          +'<p style="font-size:12px;color:#9CAAB5;border-top:1px solid #E4F4EC;padding-top:12px;margin:0">'
          +'このメールはサクラシフトから自動送信されています</p>'
          +'</div>'
      }).catch(()=>{});
    }catch(e){ console.warn('通知送信エラー',e); }
  },
  async loadStaffNotes(weeks){
    try{
      const r = await this._get({action:'loadStaffNotes', weeks:weeks.join(',')});
      return (r && r.notes) || {};
    }catch(e){ console.warn('ノート読込エラー',e); return {}; }
  },
  async saveStaffNotes(wk, data){
    try{
      await this._post({action:'saveStaffNotes', wk, data:JSON.stringify(data)});
    }catch(e){ console.warn('ノート保存エラー',e); }
  },
};

const StaffApp = (function(){
  let viewYM = currentMonthYM();
  let staffName = '';
  let role = 'staff';
  let expandedCast = null;
  let filter = 'all';
  let searchQuery = '';
  let hideRest = false;  // ⑨ 休日折りたたみ

  function currentMonthYM(){
    const d=new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  }

  async function init(opts){
    role = (opts && opts.role) || 'staff';
    setBusy(true,'読み込み中…');
    try{
      await Promise.all([
        StaffGas.loadMaster(),
        StaffGas.loadMonthAll(viewYM),       // チェック画面用（表示中の月）
        StaffGas.loadAllWeeks(),              // 受信ボックス用（全期間）
      ]);
    }catch(e){ /* 個別のcatchで握るが念のため */ }
    // マスタが読めなかった場合は再試行案内を表示
    const castList = Store.getCastList();
    if(!castList || castList.length===0){
      _showRetryScreen(opts);
      return;
    }
    staffName = (opts && opts.staffName) || (Store.getStaffList()[0] && Store.getStaffList()[0].name) || '';
    Store.dispatch('SET_USER',{user:{type:role,name:staffName}});
    Store.dispatch('SET_STAFF_NAME',{name:staffName});
    setBusy(false);
    renderAll();
  }

  // 読み込み失敗時：再試行画面
  function _showRetryScreen(opts){
    const ov=document.getElementById('loadingOverlay');
    const txt=document.getElementById('loadingText');
    if(txt){
      txt.innerHTML='😥 サーバーが混雑していて読み込めませんでした。<br><span style="font-size:12px;color:#9AA5B0">時間をおくと改善することがあります</span>';
    }
    // 再試行ボタンを差し込む
    let btn=document.getElementById('retryLoadBtn');
    if(!btn && ov){
      btn=document.createElement('button');
      btn.id='retryLoadBtn';
      btn.textContent='🔄 もう一度読み込む';
      btn.style.cssText='margin-top:16px;padding:12px 28px;border:none;border-radius:12px;background:linear-gradient(135deg,#7EC8E3,#5FB0D0);color:#fff;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(95,176,208,.4)';
      btn.addEventListener('click',()=>{ btn.remove(); init(opts); });
      const box=ov.querySelector('.loading-box')||ov;
      box.appendChild(btn);
    }
  }

  function nextMonthYM(n){
    let [y,m] = viewYM.split('-').map(Number);
    m+=n; if(m>12){m-=12;y++;}
    return `${y}-${String(m).padStart(2,'0')}`;
  }

  function setBusy(on, text){
    const ov=document.getElementById('loadingOverlay');
    const txt=document.getElementById('loadingText');
    if(txt && text) txt.textContent=text;
    if(ov) ov.classList.toggle('show', !!on);
  }

  function setStaffName(name){
    staffName=name;
    Store.dispatch('SET_USER',{user:{type:role,name}});
    Store.dispatch('SET_STAFF_NAME',{name});
  }

  /* ============ 受信ボックス ============ */
  function collectInbox(){
    const inbox=[];
    const _inboxToday=ymd(new Date());
    Store.getCastList().forEach(c=>{
      const castItems = [];
      const castWeeks = Store.getCastWeeks(c.name);
      const allWks = Object.keys(castWeeks).sort();
      const vacReqs = [];
      allWks.forEach(wk=>{
        const w=castWeeks[wk];
        if(!w) return;
        // 長期休暇申請
        if(w.vacationRequests && w.vacationRequests.length){
          w.vacationRequests.forEach(r=>{ if(!vacReqs.find(x=>x.ds===r.ds)) vacReqs.push(r); });
        }
        // 提出：シフトが全て今日より前なら受信ボックスに出さない
        if(w.status==='waiting'){
          const shiftDates=Object.keys(w.shifts||{});
          const allPast=shiftDates.length>0&&shiftDates.every(ds=>ds<_inboxToday);
          if(!allPast) castItems.push({cast:c.name,wk,type:'submit',status:w.status,sortKey:wk});
        } else if(w.status==='change_requested'){
          castItems.push({cast:c.name,wk,type:'change',status:w.status,changeDates:w.changeRequest||{},sortKey:wk});
        }
      });
      if(vacReqs.length>0){
        const sorted=[...vacReqs].sort((a,b)=>a.ds.localeCompare(b.ds));
        const first=sorted[0].ds, last=sorted[sorted.length-1].ds;
        const memo=sorted[0].memo||'';
        const d1=new Date(first+'T12:00:00'), d2=new Date(last+'T12:00:00');
        const label=`${d1.getMonth()+1}/${d1.getDate()}〜${d2.getMonth()+1}/${d2.getDate()}`;
        castItems.push({cast:c.name,type:'vacation',label,memo,dates:sorted.map(r=>r.ds),sortKey:first});
      }
      castItems.sort((a,b)=>a.sortKey.localeCompare(b.sortKey));
      castItems.forEach(it=>inbox.push(it));
    });
    return inbox;
  }

  /* 過去シフトのwaitingを自動確定（サイレント） */
  async function autoConfirmPastWeeks(){
    const today=ymd(new Date());
    let changed=false;
    Store.getCastList().forEach(c=>{
      const castWeeks=Store.getCastWeeks(c.name);
      Object.entries(castWeeks).forEach(([wk,w])=>{
        if(!w||w.status!=='waiting') return;
        const shiftDates=Object.keys(w.shifts||{});
        const allPast=shiftDates.length>0&&shiftDates.every(ds=>ds<today);
        if(allPast){ Store.dispatch('CONFIRM_WEEK',{cast:c.name,wk,by:'auto'}); changed=true; }
      });
    });
    if(changed) await StaffGas.flushNow();
  }

  function renderInbox(){
    const el=document.getElementById('inboxBox');
    if(!el)return;
    const items=collectInbox();
    const badge=document.getElementById('inboxCount');
    if(badge) badge.textContent=items.length;
    const bulkBtn=document.getElementById('inboxBulkBtn');
    const submitCount=items.filter(it=>it.type==='submit').length;
    if(bulkBtn) bulkBtn.classList.toggle('show', submitCount>0);
    if(!items.length){ el.innerHTML='<div class="inbox-empty">✨ 未処理の提出はありません</div>'; return; }
    el.innerHTML=items.map(it=>{
      const isChange=it.type==='change';
      const isVac=it.type==='vacation';
      if(isVac){
        const firstDs = it.dates[0]||'';
        const firstWk = firstDs ? weekKeyOf(firstDs) : '';
        return `<div class="inbox-item vacation" onclick="StaffApp.jumpToCast('${esc(it.cast)}','${firstWk}','${firstDs}')">
          <span class="inbox-icon">🏖</span>
          <span class="inbox-cast">${esc(it.cast)}</span>
          <span class="inbox-week">${esc(it.label)}${it.memo?' 「'+esc(it.memo)+'」':''}</span>
          <div class="inbox-vac-btns">
            <span class="tag-submit" style="padding:4px 10px;border-radius:8px;font-size:10px;font-weight:800;cursor:pointer;background:#D7F5E6;color:#2E7D32"
              onclick="event.stopPropagation();StaffApp.acceptVacation('${esc(it.cast)}',${JSON.stringify(it.dates).replace(/"/g,'&quot;')},'${esc(it.memo)}')">✅ 受理</span>
            <span class="tag-submit" style="padding:4px 10px;border-radius:8px;font-size:10px;font-weight:800;cursor:pointer;background:#FFE0EC;color:#C62828"
              onclick="event.stopPropagation();StaffApp.rejectVacation('${esc(it.cast)}',${JSON.stringify(it.dates).replace(/"/g,'&quot;')},'${esc(it.memo)}')">🙅 却下</span>
          </div>
        </div>`;
      }
      return `<div class="inbox-item ${isChange?'change':'submit'}" onclick="StaffApp.jumpToCast('${esc(it.cast)}','${it.wk}',${isChange?`'${Object.keys(it.changeDates||{})[0]||''}'`:`''`})">
        <span class="inbox-icon">${isChange?'🔄':'📥'}</span>
        <span class="inbox-cast">${esc(it.cast)}</span>
        <span class="inbox-week">${esc(weekLabel(it.wk))}</span>
        <span class="inbox-tag ${isChange?'tag-change':'tag-submit'}">${isChange?'変更申請':'入力待ち'}</span>
      </div>`;
    }).join('');
  }

  async function jumpToCast(name, wk, targetDs){
    expandedCast=name;
    // wkが表示中の月と異なる場合は自動で月を切り替え
    if(wk){
      // ★ A方式：週の所属月＝月曜が属する月（週キーの月）で統一
      // 「最も多い月」で判定すると月マタギ週でズレるため、週キーの月を使う
      const targetYM = wk.slice(0,7);
      if(targetYM !== viewYM){
        // 月を切り替えてから再ロード
        viewYM = targetYM;
        const lbl=document.getElementById('staffMonthLabel');
        if(lbl){ const[y,m]=viewYM.split('-').map(Number); lbl.textContent=`${y}年 ${m}月`; }
        setBusy(true,'読み込み中…');
        await StaffGas.loadMonthAll(viewYM);
        setBusy(false);
      }
    }
    renderCastList();
    setTimeout(()=>{
      const el=document.getElementById('cast-'+cssEscape(name));
      if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
      if(targetDs){
        _spinRow(name, targetDs);
      } else if(wk){
        // 提出など：確定ボタンにジャンプ＆メタリックキラキラ
        _spinConfirmBtn(name, wk);
      } else {
        _jumpToFirstEditable(name);
      }
    },120);
  }

  // 確定ボタンにジャンプ＆メタリックキラキラ
  function _spinConfirmBtn(name, wk){
    const castEl = document.getElementById('cast-'+cssEscape(name));
    if(!castEl) return;
    const btn = castEl.querySelector(`.confirm-btn[data-confirm-wk="${wk}"]`);
    if(btn){
      btn.scrollIntoView({behavior:'smooth', block:'center'});
      btn.classList.add('metal-glow');
      // 確定するまで光り続ける（押すとrenderで再描画され自然に消える）
    } else {
      // 確定ボタンが無ければ（既に確定済み等）その週の日にジャンプ
      const w=Store.getWeek(name,wk);
      let firstDs=null;
      if(w&&w.shifts){
        for(const ds of weekDates(wk)){
          if(w.shifts[ds]&&w.shifts[ds].start!=null){ firstDs=ds; break; }
        }
      }
      if(firstDs) _spinRow(name, firstDs);
      else _jumpToFirstEditable(name);
    }
  }

  // 指定日付の行をメタリックくるくる
  function _spinRow(name, ds){
    const castEl = document.getElementById('cast-'+cssEscape(name));
    if(!castEl) return;
    const targetRow = castEl.querySelector(`.check-row[data-ds="${ds}"]`);
    if(targetRow){
      targetRow.scrollIntoView({behavior:'smooth', block:'center'});
      targetRow.classList.add('row-spin');
      setTimeout(()=>targetRow.classList.remove('row-spin'), 2400);
    }
  }

  // 最短入力可能日の行全体をメタリックピンクでくるくる3周
  function _jumpToFirstEditable(name){
    const castEl = document.getElementById('cast-'+cssEscape(name));
    if(!castEl) return;
    const today = ymd(new Date());
    const curWk = weekKeyOf(today);

    // 未チェック日を探す（今日以降・表示中の月のみ）
    const castStores = Store.getCastStores(name);
    const dayStores = ['記録簿','サクラムーン','ラナ鶯谷','ラナ錦糸町','ドレスガーデン','ピーチムーン','逆AF倶楽部','キューティー','18','極門','ヘブンラナ','ヘブンサクラ','(キュ)ぴゅあらば','(キュ)情報局','(極)ぴゅあらば','(極)情報局'].filter(m=>castStores.includes(m));
    const weeks = weeksInMonth(viewYM); // 表示中の月のみ（DOMに存在する範囲）
    let targetDs=null;
    for(const wk of weeks){
      const w=Store.getWeek(name,wk);
      if(!w) continue;
      if(!['waiting','inputting','change_inputting','confirmed','change_confirmed'].includes(w.status)) continue;
      for(const ds of weekDates(wk)){
        if(ds<today) continue;
        const sh=w.shifts&&w.shifts[ds];
        if(!sh||sh.start==null) continue;
        const allChecked=dayStores.length>0&&dayStores.every(m=>w.checks&&w.checks[ds+'_'+m]&&w.checks[ds+'_'+m].checked);
        if(!allChecked){ targetDs=ds; break; }
      }
      if(targetDs) break;
    }

    if(targetDs){
      // 最短未チェック日の行にジャンプ＋くるくる（data-ds で確実マッチ）
      const targetRow=castEl.querySelector(`.check-row[data-ds="${targetDs}"]`);
      if(targetRow){
        targetRow.scrollIntoView({behavior:'smooth',block:'center'});
        targetRow.classList.add('row-spin');
        setTimeout(()=>targetRow.classList.remove('row-spin'),2400);
      }
    } else {
      // 未チェックなし→今週ブロック全体をくるくる（data-wk で確実マッチ）
      const curBlock=castEl.querySelector(`.week-block[data-wk="${curWk}"]`);
      if(curBlock){
        curBlock.scrollIntoView({behavior:'smooth',block:'center'});
        curBlock.classList.add('row-spin');
        setTimeout(()=>curBlock.classList.remove('row-spin'),2400);
      } else {
        castEl.scrollIntoView({behavior:'smooth',block:'center'});
      }
    }
  }

  /* ============ キャスト一覧（アコーディオン） ============ */
  /* ⑤⑥ フィルター件数カウント */
  /* 今日に未チェックがあるか判定 */
  function _hasUncheckedToday(castName){
    // 今日〜5週間先（35日）までに「シフトあり＆未チェック」の日があるか
    // ★ 過去日は含めない（今日以降のみ）
    const todayD=new Date(); todayD.setHours(0,0,0,0);
    const todayStr=ymd(todayD);
    const castStores=Store.getCastStores(castName);
    const dayStores=['記録簿','サクラムーン','ラナ鶯谷','ラナ錦糸町','ドレスガーデン','ピーチムーン','逆AF倶楽部','キューティー','18','極門','ヘブンラナ','ヘブンサクラ','(キュ)ぴゅあらば','(キュ)情報局','(極)ぴゅあらば','(極)情報局'].filter(m=>castStores.includes(m));
    // ★ 店舗が0個のキャストは「チェックしようがない」ので対象外（誤判定防止）
    if(dayStores.length===0) return false;
    for(let i=0;i<35;i++){
      const d=new Date(todayD); d.setDate(todayD.getDate()+i);
      const ds=ymd(d);
      // 念のため過去日を明示的にスキップ（今日以降のみ対象）
      if(ds < todayStr) continue;
      const wk=weekKeyOf(ds);
      const w=Store.getWeek(castName,wk);
      if(!w||!w.shifts||!w.shifts[ds]||w.shifts[ds].start==null) continue;
      const allChecked=dayStores.every(m=>w.checks&&w.checks[ds+'_'+m]&&w.checks[ds+'_'+m].checked);
      if(!allChecked) return true;
    }
    return false;
  }

  function countFilter(f){
    const today = ymd(new Date());
    let count = 0;
    Store.getCastList().forEach(c=>{
      const weeks = weeksInMonth(viewYM);
      const hit = weeks.some(wk=>{
        const w = Store.getWeek(c.name, wk);
        if(!w) return false;
        if(f==='today'){
          return _hasUncheckedToday(c.name);
        }
        if(f==='waiting') return w.status==='waiting'||w.status==='inputting';
        if(f==='change') return w.status==='change_requested';
        return false;
      });
      if(hit) count++;
    });
    return count;
  }

  function renderCastList(){
    const cont=document.getElementById('castContainer');
    if(!cont)return;
    const today = ymd(new Date());
    let list=[...Store.getCastList()].sort((a,b)=>a.name.localeCompare(b.name,'ja'));
    if(searchQuery) list=list.filter(c=>c.name.includes(searchQuery));
    if(filter!=='all'){
      list=list.filter(c=>{
        const weeks=weeksInMonth(viewYM);
        return weeks.some(wk=>{
          const w=Store.getWeek(c.name,wk);
          if(!w)return false;
          if(filter==='today'){
            return _hasUncheckedToday(c.name);
          }
          if(filter==='waiting') return w.status==='waiting'||w.status==='inputting';
          if(filter==='change') return w.status==='change_requested';
          return false;
        });
      });

    if(!list.length){ cont.innerHTML='<div class="inbox-empty">該当するキャストがいません</div>'; return; }

    expandedCast = (expandedCast===name)?null:name;
    renderCastList();
    if(expandedCast===name){
